<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHMAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --g1: #00ff41;
  --g2: #00cc33;
  --g3: #00742a;
  --g4: #002d0d;
  --bg: #050905;
  --card: #070e08;
  --text: #9ed49a;
  --border: #0c2410;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  min-height: 100svh;
  font-family: 'Share Tech Mono', monospace;
  color: var(--g1);
  overflow: hidden;
  position: relative;
}

/* Scanlines overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px
  );
  pointer-events: none;
  z-index: 500;
}

/* ── SCREENS ─────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: var(--bg);
}
.screen.hidden { display: none; }

/* ── TITLE SCREEN ────────────────────────── */
#screen-title {
  flex-direction: column;
  gap: 0;
}
.title-terminal {
  width: 100%;
  max-width: 560px;
  padding: 48px 40px 40px;
  position: relative;
}
.title-terminal::before {
  content: '';
  position: absolute;
  inset: -60px;
  background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(0,255,65,0.045) 0%, rgba(0,255,65,0.012) 50%, transparent 100%);
  pointer-events: none;
}
.prompt { font-size: 13px; color: var(--g3); margin-bottom: 22px; }
.prompt-sigil { color: var(--g2); }
.name-row { display: block; line-height: 0.9; margin-bottom: 12px; white-space: nowrap; }
.name {
  font-family: 'VT323', monospace;
  font-size: clamp(54px, 13vw, 80px);
  color: var(--g1);
  text-shadow: 0 0 6px rgba(0,255,65,1), 0 0 18px rgba(0,255,65,0.6), 0 0 40px rgba(0,255,65,0.25);
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
  width: 0;
  vertical-align: bottom;
  animation: type-in 1.1s steps(8, end) forwards 0.7s;
}
@keyframes type-in { to { width: 8ch; } }
.cursor {
  font-family: 'VT323', monospace;
  font-size: clamp(54px, 13vw, 80px);
  color: var(--g1);
  text-shadow: 0 0 8px rgba(0,255,65,0.9);
  display: inline-block;
  vertical-align: bottom;
  line-height: 0.9;
  animation: blink 0.85s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.subtitle {
  font-size: clamp(11px, 2.4vw, 13px);
  color: var(--g3);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 1.9s;
}
@keyframes fade-up { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

.btn-primary {
  display: block;
  width: 100%;
  padding: 14px 20px;
  background: transparent;
  border: 1px solid var(--g3);
  color: var(--g1);
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s, text-shadow 0.2s;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 2.1s;
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,255,65,0.08) 0%, rgba(0,255,65,0.03) 60%, transparent 100%);
  transform: translateX(-105%);
  transition: transform 0.32s ease;
}
.btn-primary:hover::before { transform: translateX(0); }
.btn-primary:hover {
  border-color: var(--g1);
  box-shadow: 0 0 20px rgba(0,255,65,0.12);
  text-shadow: 0 0 10px rgba(0,255,65,0.5);
}

/* ── CHARACTER SELECT ────────────────────── */
#screen-charselect { flex-direction: column; gap: 32px; }
.charselect-title {
  font-family: 'VT323', monospace;
  font-size: 32px;
  color: var(--g2);
  letter-spacing: 0.2em;
  text-align: center;
  text-shadow: 0 0 12px rgba(0,255,65,0.4);
}
.charselect-prompt { font-size: 12px; color: var(--g3); text-align: center; letter-spacing: 0.15em; }
.char-cards {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.char-card {
  width: 160px;
  border: 1px solid var(--border);
  padding: 20px 16px;
  cursor: pointer;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: var(--card);
}
.char-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,255,65,0.06) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.2s;
}
.char-card:hover::before, .char-card.selected::before { opacity: 1; }
.char-card:hover, .char-card.selected {
  border-color: var(--g2);
  box-shadow: 0 0 18px rgba(0,255,65,0.1);
}
.char-card.selected { border-color: var(--g1); box-shadow: 0 0 24px rgba(0,255,65,0.18); }
.char-icon { font-size: 40px; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 8px rgba(0,255,65,0.3)); }
.char-name { font-size: 13px; color: var(--g1); margin-bottom: 8px; letter-spacing: 0.08em; }
.char-desc { font-size: 10px; color: var(--text); line-height: 1.5; }
.char-stat { font-size: 10px; color: var(--g3); margin-top: 6px; }
.charselect-btn { opacity: 1; animation: none; }

/* ── GAME CANVAS ─────────────────────────── */
#game-canvas {
  position: fixed;
  inset: 0;
  display: none;
  pointer-events: none;
}
#game-canvas.active { display: block; }

/* ── LEVEL UP SCREEN ─────────────────────── */
#screen-levelup {
  background: rgba(5, 9, 5, 0.92);
  flex-direction: column;
  gap: 24px;
}
.levelup-header {
  text-align: center;
}
.levelup-title {
  font-family: 'VT323', monospace;
  font-size: 48px;
  color: var(--g1);
  text-shadow: 0 0 20px rgba(0,255,65,0.6);
  animation: levelup-pulse 1s ease-in-out infinite alternate;
}
@keyframes levelup-pulse {
  from { text-shadow: 0 0 10px rgba(0,255,65,0.4); }
  to   { text-shadow: 0 0 30px rgba(0,255,65,0.9), 0 0 60px rgba(0,255,65,0.3); }
}
.levelup-sub { font-size: 11px; color: var(--g3); letter-spacing: 0.2em; margin-top: 4px; }
.reroll-row { text-align: center; margin-top: 4px; }
.btn-reroll {
  background: transparent;
  border: 1px solid var(--g3);
  color: var(--g3);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.12em;
  padding: 7px 22px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-reroll:hover:not(:disabled) { color: var(--g1); border-color: var(--g1); }
.btn-reroll:disabled { opacity: 0.28; cursor: default; }
.upgrade-cards {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.card-slot {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  width: 190px;
}
.btn-ban {
  width: 100%;
  margin-top: 6px;
  padding: 5px 0;
  font-size: 9px;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.14em;
  background: transparent;
  border: 1px solid #3a1818;
  color: #664444;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  text-transform: uppercase;
}
.btn-ban:hover:not(:disabled) { color: #ff4444; border-color: #882222; }
.btn-ban:disabled { opacity: 0.22; cursor: default; }
.ban-counter { font-size: 11px; color: #884444; letter-spacing: 0.08em; margin-left: 14px; }
.upgrade-card {
  width: 190px;
  height: 270px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  border: 1px solid var(--border);
  padding: 18px 16px;
  cursor: pointer;
  text-align: center;
  background: var(--card);
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}
.upgrade-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,255,65,0.07) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.2s;
}
.upgrade-card:hover::before { opacity: 1; }
.upgrade-card:hover {
  border-color: var(--g1);
  box-shadow: 0 0 22px rgba(0,255,65,0.15);
  transform: translateY(-2px);
}
.upgrade-icon { font-size: 32px; margin-bottom: 10px; display: block; }
.upgrade-name { font-size: 13px; color: var(--g1); margin-bottom: 8px; }
.upgrade-type { font-size: 10px; color: var(--g3); margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
.upgrade-cycle { font-size: 9px; margin-bottom: 5px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.85; }
.cycle-fire      { color: #ff7733; }
.cycle-ice       { color: #66ddff; }
.cycle-lightning { color: #ffee44; }
.cycle-death     { color: #cc66ff; }
.cycle-arcane    { color: #44ffbb; }
.cycle-demon     { color: #ff4466; }
.cycle-blade     { color: #cccccc; }
.cycle-life      { color: #66ff99; }
.upgrade-desc { font-size: 10px; color: var(--text); line-height: 1.5; flex: 1; overflow: hidden; }

/* ── SYNERGY (COMBO) CARDS ──────────────── */
.upgrade-card.synergy {
  border-color: #ccaa00;
  background: rgba(18, 13, 0, 0.95);
}
.upgrade-card.synergy::before {
  background: linear-gradient(180deg, rgba(255,200,0,0.12) 0%, transparent 100%);
}
.upgrade-card.synergy:hover {
  border-color: #ffdd44;
  box-shadow: 0 0 28px rgba(255,200,0,0.35);
  transform: translateY(-3px);
}
.upgrade-card.synergy .upgrade-type { color: #ffcc44; }
.upgrade-card.synergy .upgrade-name { color: #ffee88; font-size: 14px; }

/* ── EMPOWERED UPGRADE CARDS (weapon boosted by active combo) ── */
.upgrade-card.empowered {
  border-color: #8844cc;
  background: rgba(10, 0, 18, 0.95);
}
.upgrade-card.empowered::before {
  background: linear-gradient(180deg, rgba(140,70,255,0.1) 0%, transparent 100%);
}
.upgrade-card.empowered:hover {
  border-color: #bb66ff;
  box-shadow: 0 0 26px rgba(140,70,255,0.35);
}
.upgrade-card.empowered .upgrade-type { color: #bb66ff; }

/* ── INLINE HINTS ON CARDS ────────────── */
.combo-potential {
  display: block;
  margin-top: 7px;
  font-size: 9px;
  color: #33ddbb;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.empowered-label {
  display: block;
  margin-top: 7px;
  font-size: 9px;
  color: #aa66ff;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── WAVE BANNER ─────────────────────────── */
#wave-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
#wave-banner.visible { opacity: 1; }
.wave-banner-title {
  font-family: 'VT323', monospace;
  font-size: 56px;
  color: var(--g1);
  text-shadow: 0 0 20px rgba(0,255,65,0.7);
  letter-spacing: 0.1em;
}
.wave-banner-sub { font-size: 13px; color: var(--g2); letter-spacing: 0.3em; text-transform: uppercase; }

/* ── GAME OVER / VICTORY ─────────────────── */
#screen-gameover, #screen-victory {
  flex-direction: column;
  gap: 28px;
}
.endgame-terminal {
  width: 100%;
  max-width: 480px;
  border: 1px solid var(--border);
  background: var(--card);
  padding: 36px 32px;
  position: relative;
}
.endgame-title {
  font-family: 'VT323', monospace;
  font-size: 52px;
  text-align: center;
  margin-bottom: 6px;
  text-shadow: 0 0 16px currentColor;
}
.endgame-title.over { color: #ff4136; text-shadow: 0 0 16px rgba(255,65,54,0.6); }
.endgame-title.victory { color: var(--g1); }
.endgame-sub { font-size: 11px; color: var(--g3); text-align: center; letter-spacing: 0.2em; margin-bottom: 24px; }
.endgame-stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text);
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.stat-val { color: var(--g1); }

/* ── SPEED BAR ───────────────────────────── */
#speed-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 64px;
  display: none;
  align-items: center;
  gap: 4px;
  z-index: 50;
  pointer-events: auto;
}
#speed-bar.visible { display: flex; }
.speed-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--g4);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 4px 9px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, text-shadow 0.15s;
  line-height: 1;
}
.speed-btn:hover {
  color: var(--g2);
  border-color: var(--g3);
}
.speed-btn.active {
  color: var(--g1);
  border-color: var(--g2);
  text-shadow: 0 0 8px rgba(0,255,65,0.5);
}

/* ── PAUSE ───────────────────────────────── */
#pause-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,9,5,0.88);
  z-index: 150;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-y: auto;
  padding: 40px 24px 48px;
  gap: 28px;
}
#pause-overlay.visible { display: flex; }
.pause-text {
  font-family: 'VT323', monospace;
  font-size: 52px;
  color: var(--g1);
  text-shadow: 0 0 20px rgba(0,255,65,0.5);
  animation: blink 1s step-end infinite;
  flex-shrink: 0;
}
.pause-hint {
  font-size: 10px;
  color: var(--g3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: -18px;
  flex-shrink: 0;
}
.pause-section-title {
  font-size: 11px;
  color: var(--g3);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  width: 100%;
  max-width: 820px;
  flex-shrink: 0;
}
#pause-cycle-grid {
  display: grid;
  grid-template-columns: repeat(4, 190px);
  gap: 12px;
  max-width: 820px;
  width: 100%;
}
.pause-cycle-card {
  border: 1px solid var(--border);
  background: var(--card);
  padding: 14px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
  overflow: hidden;
}
.pause-cycle-card.active {
  border-color: var(--cycle-color, var(--border));
  box-shadow: 0 0 14px color-mix(in srgb, var(--cycle-color, #0f0) 20%, transparent);
}
.pause-cycle-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, color-mix(in srgb, var(--cycle-color, #0f0) 8%, transparent) 0%, transparent 60%);
  pointer-events: none;
}
.pause-cycle-header {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 600;
  color: var(--cycle-color, var(--g1));
  letter-spacing: 0.06em;
}
.pause-cycle-weapons {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  min-height: 22px;
}
.pause-cycle-weapon {
  font-size: 14px;
  opacity: 0.4;
  transition: opacity 0.15s;
}
.pause-cycle-weapon.owned { opacity: 1; }
.pause-cycle-bonus {
  font-size: 9px;
  color: var(--g3);
  letter-spacing: 0.05em;
  line-height: 1.4;
  border-top: 1px solid var(--border);
  padding-top: 6px;
  margin-top: 2px;
}
.pause-cycle-stacks {
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--cycle-color, var(--g1));
  opacity: 0.9;
}
.pause-cycle-ring {
  font-size: 7.5px;
  color: var(--g3);
  font-style: italic;
  line-height: 1.5;
  opacity: 0.7;
  margin-bottom: 1px;
}
.pause-cycle-synergies {
  border-top: 1px solid var(--border);
  padding-top: 6px;
  margin-top: 2px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.pcs-title {
  font-size: 7px;
  letter-spacing: 0.12em;
  color: var(--g3);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.pause-cycle-synergy {
  padding: 3px 4px;
  border-left: 2px solid transparent;
  opacity: 0.35;
}
.pause-cycle-synergy.partial { opacity: 0.65; }
.pause-cycle-synergy.ready {
  opacity: 1;
  border-left-color: color-mix(in srgb, var(--cycle-color, #0f0) 60%, transparent);
  background: color-mix(in srgb, var(--cycle-color, #0f0) 5%, transparent);
}
.pause-cycle-synergy.unlocked {
  opacity: 1;
  border-left-color: var(--cycle-color, var(--g1));
  background: color-mix(in srgb, var(--cycle-color, #0f0) 8%, transparent);
}
.pcs-name {
  font-size: 8.5px;
  font-weight: 600;
  color: var(--g1);
  display: flex;
  align-items: center;
  gap: 3px;
  line-height: 1.3;
}
.pcs-check {
  font-size: 8px;
  color: var(--cycle-color, #0f0);
  margin-left: auto;
  flex-shrink: 0;
}
.pcs-reqs {
  font-size: 7.5px;
  color: var(--g3);
  line-height: 1.3;
  margin-top: 1px;
}
@media (max-width: 820px) {
  #pause-cycle-grid { grid-template-columns: repeat(2, 1fr); max-width: 420px; }
}

@media (max-width: 500px) {
  .title-terminal { padding: 28px 20px 28px; }
  .char-card { width: 130px; }
  .upgrade-card { width: 150px; height: 280px; }
}

/* ── TOUCH CONTROLS ─────────────────────────────────────────── */
#touch-controls {
  display: none;
  position: fixed;
  bottom: 24px; left: 24px;
  z-index: 80;
  pointer-events: auto;
}
#touch-controls.tc-visible { display: block; }
@media (hover: none) and (pointer: coarse) {
  #touch-controls.tc-visible { display: block; }
}
#dpad {
  display: grid;
  grid-template-columns: repeat(3, 56px);
  grid-template-rows: repeat(3, 56px);
  gap: 4px;
}
.dpad-btn {
  width: 56px; height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(0,255,65,0.4);
  background: rgba(0,255,65,0.08);
  color: rgba(0,255,65,0.85);
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.08s, border-color 0.08s, color 0.08s, text-shadow 0.08s;
}
.dpad-btn.active {
  background: rgba(0,255,65,0.22);
  border-color: var(--g1);
  color: var(--g1);
  text-shadow: 0 0 8px rgba(0,255,65,0.8);
}
</style>
</head>
<body>

<!-- ── TITLE SCREEN ─────────────────────── -->
<div id="screen-title" class="screen">
  <div class="title-terminal">
    <div class="prompt"><span class="prompt-sigil">~/archmage $</span> ./run</div>
    <span class="name-row">
      <span class="name">ARCHMAGE</span><span class="cursor">_</span>
    </span>
    <div class="subtitle">Wave Survival · Mage Arena · 20 Waves</div>
    <button class="btn-primary" id="btn-start">[ ENTER THE ARENA ]</button>
  </div>
</div>

<!-- ── CHARACTER SELECT ─────────────────── -->
<div id="screen-charselect" class="screen hidden">
  <div class="charselect-title">CHOOSE YOUR MAGE</div>
  <div class="charselect-prompt">SELECT AN ARCHETYPE TO BEGIN</div>
  <div class="char-cards" id="char-cards"></div>
  <button class="btn-primary charselect-btn" id="btn-play" style="max-width:320px;opacity:0;pointer-events:none">[ BEGIN RITUAL ]</button>
</div>

<!-- ── SPEED BAR ─────────────────────────── -->
<div id="speed-bar">
  <button class="speed-btn active" data-speed="1">1×</button>
  <button class="speed-btn" data-speed="2">2×</button>
  <button class="speed-btn" data-speed="5">5×</button>
  <button class="speed-btn" data-speed="10">10×</button>
</div>

<!-- ── GAME CANVAS ──────────────────────── -->
<canvas id="game-canvas"></canvas>

<!-- ── LEVEL UP SCREEN ──────────────────── -->
<div id="screen-levelup" class="screen hidden">
  <div class="levelup-header">
