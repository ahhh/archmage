          Player.health = Math.min(Player.maxHealth, Player.health + Math.round(finalDmg * p.lifesteal));
        }

        // Area damage
        if (p.areaRadius > 0) {
          for (const e2 of enemies) {
            if (e2.dead || e2.id === e.id) continue;
            if (dist(p.x, p.y, e2.x, e2.y) < p.areaRadius + e2.radius) {
              applyDamage(e2, Math.round(p.damage * p.areaDamageMultiplier), p.armorPen, null, 0);
            }
          }
          Particles.emit(p.x, p.y, '#ff6600', 12, 5);
          if (p.groundEffect) {
            GroundEffects.add(p.x, p.y, p.areaRadius, p.groundEffect.type, p.groundEffect.duration, p.groundEffect.dps);
          }
          // Followup meteors
          if (p.followupMeteors > 0) {
            for (let fm = 0; fm < p.followupMeteors; fm++) {
              const randomEnemy = enemies.filter(e => !e.dead)[rndInt(0, enemies.filter(e => !e.dead).length - 1)];
              if (randomEnemy) {
                const angle = Math.atan2(randomEnemy.y - p.y, randomEnemy.x - p.x);
                toAdd.push({
                  id: mkId(), x: p.x, y: p.y,
                  vx: Math.cos(angle) * 18, vy: Math.sin(angle) * 18,
                  damage: Math.round(p.damage * p.followupDamageMultiplier),
                  armorPen: p.armorPen, pierce: 10, pierceLeft: 10, bounce: 0, bounceLeft: 0, bounceCount: 0,
                  range: 900, traveledSq: 0, chainCount: 0, chainRange: 0,
                  areaRadius: p.areaRadius * 0.6, areaDamageMultiplier: 0.4,
                  pullRadius: 0, pullStrength: 0, weaponId: 'meteor_sigil',
                  statusEffect: null, hitIds: new Set(), dead: false, icon: '☄️',
                  splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
                  finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
                  followupMeteors: 0, followupDamageMultiplier: 0,
                  isMeteor: true, targetEnemy: randomEnemy, targetX: randomEnemy.x, targetY: randomEnemy.y
                });
              }
            }
          }
        }

        // Babbage Blast: detonate into radial rune burst at impact point
        if (p.runeBlastCount > 0) {
          Particles.emit(p.x, p.y, '#aa88ff', 18, 5);
          for (let r = 0; r < p.runeBlastCount; r++) {
            const ra = (Math.PI * 2 / p.runeBlastCount) * r;
            toAdd.push({
              id: mkId(), x: p.x, y: p.y,
              vx: Math.cos(ra) * p.runeBlastSpeed, vy: Math.sin(ra) * p.runeBlastSpeed,
              damage: p.runeBlastDamage, armorPen: p.armorPen,
              pierce: p.runeBlastPierce, pierceLeft: p.runeBlastPierce,
              bounce: 0, bounceLeft: 0, bounceCount: 0,
              range: p.runeBlastRange, traveledSq: 0,
              chainCount: 0, chainRange: 0, areaRadius: 0, areaDamageMultiplier: 0,
              pullRadius: 0, pullStrength: 0, weaponId: p.weaponId,
              statusEffect: p.statusEffect ? { ...p.statusEffect } : null,
              hitIds: new Set([e.id]), dead: false, icon: '🔵',
              splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
              finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
              followupMeteors: 0, followupDamageMultiplier: 0,
              isMeteor: false, isOrbit: false, isBox: false, isWhirl: false,
              isShadowBolt: false, isMagicMissile: false, isBoneSpear: false,
              runeBlastCount: 0, acceleration: 1,
            });
          }
          p.dead = true;
          continue;
        }

        // Split projectiles
        if (p.splitProjectiles > 0 && !e.dead) {
          for (let s = 0; s < p.splitProjectiles; s++) {
            const sa = Math.atan2(p.vy, p.vx) + rnd(-Math.PI / 2, Math.PI / 2);
            const sp = Math.hypot(p.vx, p.vy);
            toAdd.push({
              ...JSON.parse(JSON.stringify(p)),
              id: mkId(),
              vx: Math.cos(sa) * sp, vy: Math.sin(sa) * sp,
              damage: Math.round(p.damage * p.splitDamageMultiplier),
              traveledSq: 0, hitIds: new Set([e.id]), dead: false,
              splitProjectiles: 0, pierce: 0, pierceLeft: 0
            });
          }
        }

        // Chain lightning
        if (p.chainCount > 0) {
          const nextTargets = enemies.filter(e2 => !e2.dead && e2.id !== e.id && !p.hitIds.has(e2.id) && dist(e.x, e.y, e2.x, e2.y) < p.chainRange);
          nextTargets.sort((a, b) => dist(e.x, e.y, a.x, a.y) - dist(e.x, e.y, b.x, b.y));
          if (nextTargets.length > 0) {
            const nt = nextTargets[0];
            const ca = Math.atan2(nt.y - p.x, nt.x - p.x);
            const newChain = {
              ...p, id: mkId(), x: e.x, y: e.y,
              vx: Math.cos(Math.atan2(nt.y - e.y, nt.x - e.x)) * Math.hypot(p.vx, p.vy),
              vy: Math.sin(Math.atan2(nt.y - e.y, nt.x - e.x)) * Math.hypot(p.vx, p.vy),
              chainCount: p.chainCount - 1,
              hitIds: new Set(p.hitIds),
              traveledSq: 0, dead: false
            };
            // Final chain stun
            if (p.chainCount === 1 && p.finalHitDamageMultiplier > 1) {
              newChain.damage = Math.round(newChain.damage * p.finalHitDamageMultiplier);
              if (p.finalHitStun > 0) {
                applyStatusEffect(nt, { type: 'stun', duration: p.finalHitStun });
              }
            }
            toAdd.push(newChain);
          }
          p.dead = true;
          continue;
        }

        // Pierce
        if (p.pierceLeft > 0) { p.pierceLeft--; }
        else { p.dead = true; }
      }
    }

    // Meteor auto-arrival
    if (p.isMeteor) {
      const d = dist(p.x, p.y, p.targetX, p.targetY);
      if (d < 10) {
        p.dead = true;
        Particles.emit(p.targetX, p.targetY, '#ff6600', 20, 8);
        // Area damage at target
        if (p.areaRadius > 0) {
          for (const e of enemies) {
            if (e.dead) continue;
            if (dist(p.targetX, p.targetY, e.x, e.y) < p.areaRadius + e.radius) {
              applyDamage(e, p.damage, p.armorPen, null, 0);
            }
          }
          if (p.groundEffect) {
            GroundEffects.add(p.targetX, p.targetY, p.areaRadius, p.groundEffect.type, p.groundEffect.duration, p.groundEffect.dps);
          }
        }
      } else {
        // Steer toward target
        const tx = p.targetX - p.x, ty = p.targetY - p.y;
        const len = Math.hypot(tx, ty);
        const sp = Math.hypot(p.vx, p.vy);
        p.vx = (tx / len) * sp;
        p.vy = (ty / len) * sp;
      }
    }
  }

  for (const p of toAdd) Projectiles.push(p);
}

// ── DAMAGE HELPERS ────────────────────────────────────────────

function applyDamage(enemy, damage, armorPen, statusEffect, stunDuration) {
  if (enemy.dead) return;
  const effArmor = Math.max(0, enemy.armor - (armorPen || 0));
  const finalDmg = Math.max(1, damage - effArmor);
  enemy.hp -= finalDmg;
  enemy.flashTimer = 0.1;
  Particles.emitText(enemy.x, enemy.y - enemy.radius, `-${finalDmg}`, '#00ff41');
  Particles.emit(enemy.x, enemy.y, '#00ff41', 3, 2.5);
  if (statusEffect) applyStatusEffect(enemy, statusEffect);
  if (stunDuration > 0) applyStatusEffect(enemy, { type: 'stun', duration: stunDuration });
  if (enemy.hp <= 0) killEnemy(enemy);
}

function applyStatusEffect(enemy, effect) {
  const existing = enemy.statusEffects.find(s => s.type === effect.type);
  if (existing) { existing.remaining = Math.max(existing.remaining, effect.duration); }
  else { enemy.statusEffects.push({ type: effect.type, remaining: effect.duration, amount: effect.amount || 0 }); }
}

function killEnemy(enemy) {
  if (enemy.dead) return;
  enemy.dead = true;
  enemy.deathTimer = 3.0;
  Player.kills++;
  Player.addXp(Math.round(enemy.xp * (1 + Game.wave * 0.05) + enemy.maxHp * 0.04));
  if (Player.killHeal > 0) {
    Player.health = Math.min(Player.maxHealth, Player.health + Player.killHeal);
  }
  for (const g of Grimoires) {
    if (!g.dead && g.feedOnKill) g.charges = Math.min(g.maxCharges, g.charges + 1);
  }
  Particles.emit(enemy.x, enemy.y, '#00ff41', 8, 3.5);
  if (enemy.configId === 'dragon_boss') Game.victory();
}

// ── ENEMIES ───────────────────────────────────────────────────

let Enemies = [];

function spawnEnemy(configId, waveNum) {
  const cfg = CONFIG.monsters.find(m => m.id === configId);
  if (!cfg) return;
  // Extra scaling for the final 7 waves (+8% HP and strength per wave above 13)
  const lateBonus = waveNum >= 14 ? 1 + (waveNum - 13) * 0.08 : 1;
  const hpMult  = (1 + waveNum * 0.12) * lateBonus;
  const strMult = (1 + waveNum * 0.08) * lateBonus;
  // Spawn at edge
  let x, y;
  const side = rndInt(0, 3);
  const margin = 50;
  if (side === 0) { x = rnd(margin, CONFIG.WORLD_W - margin); y = -margin; }
  else if (side === 1) { x = CONFIG.WORLD_W + margin; y = rnd(margin, CONFIG.WORLD_H - margin); }
  else if (side === 2) { x = rnd(margin, CONFIG.WORLD_W - margin); y = CONFIG.WORLD_H + margin; }
  else { x = -margin; y = rnd(margin, CONFIG.WORLD_H - margin); }

  const hp = Math.ceil(cfg.health * hpMult);
  Enemies.push({
    id: mkId(),
    configId: cfg.id,
    name: cfg.name,
    icon: cfg.icon,
    x, y,
    hp,
    maxHp: hp,
    speed: cfg.speed,
    armor: cfg.armor,
    strength: Math.round(cfg.strength * strMult),
    xp: cfg.xp,
    radius: cfg.radius,
    abilities: cfg.abilities,
    statusEffects: [],
    dead: false,
    flashTimer: 0,
    fireBreathTimer: rnd(3, 6),
    chargeTimer: rnd(4, 8),
    chargeVx: 0, chargeVy: 0, chargeActive: false, chargeRemaining: 0,
    regenTimer: 0,
    rangedTimer: rnd(2, 4),
  });
}

function updateEnemies(dt) {
  for (const e of Enemies) {
    if (e.dead) {
      if (e.deathTimer > 0) e.deathTimer -= dt;
      continue;
    }

    // Status effects
    for (let i = e.statusEffects.length - 1; i >= 0; i--) {
      const se = e.statusEffects[i];
      se.remaining -= dt;
      if (se.type === 'poison') {
        se.poisonTimer = (se.poisonTimer || 0) + dt;
        if (se.poisonTimer >= 0.5) {
          se.poisonTimer -= 0.5;
          e.hp -= se.amount * 0.5;
          e.flashTimer = 0.1;
          Particles.emit(e.x, e.y, '#88ff44', 2, 1.5);
          if (e.hp <= 0) { killEnemy(e); break; }
        }
      }
      if (se.remaining <= 0) e.statusEffects.splice(i, 1);
    }
    const stunned = e.statusEffects.some(s => s.type === 'stun');
    const slowEffect = e.statusEffects.find(s => s.type === 'slow');
    const slowMult = slowEffect ? (1 - slowEffect.amount * (Player.charConfig.bonus.slowDurationMultiplier ? 1 : 1)) : 1;

    if (e.flashTimer > 0) e.flashTimer -= dt;

    if (stunned) continue;

    // Regeneration
    if (e.abilities.includes('regeneration')) {
      e.regenTimer += dt;
      if (e.regenTimer >= 1) { e.regenTimer = 0; e.hp = Math.min(e.hp + 4, e.maxHp); }
    }

    // Charge ability
    if (e.abilities.includes('charge')) {
      e.chargeTimer -= dt;
      if (e.chargeActive) {
        e.x += e.chargeVx;
        e.y += e.chargeVy;
        e.chargeRemaining -= dt;
        if (e.chargeRemaining <= 0) { e.chargeActive = false; e.chargeTimer = rnd(3, 6); }
      } else if (e.chargeTimer <= 0) {
        const chargeDecoy = getDecoyTarget();
        const chargeTx = chargeDecoy ? chargeDecoy.x : Player.x;
        const chargeTy = chargeDecoy ? chargeDecoy.y : Player.y;
        const dx = chargeTx - e.x, dy = chargeTy - e.y;
        const len = Math.hypot(dx, dy) || 1;
        const spd = e.speed * 5;
        e.chargeVx = (dx / len) * spd;
        e.chargeVy = (dy / len) * spd;
        e.chargeActive = true;
        e.chargeRemaining = 0.3;
      }
    }

    // Ranged attack (beholderkin fires projectile toward player)
    if (e.abilities.includes('ranged')) {
      e.rangedTimer -= dt;
      if (e.rangedTimer <= 0) {
        e.rangedTimer = rnd(2.5, 4.5);
        const rangedDecoy = getDecoyTarget();
        const rangedTx = rangedDecoy ? rangedDecoy.x : Player.x;
        const rangedTy = rangedDecoy ? rangedDecoy.y : Player.y;
        const dx = rangedTx - e.x, dy = rangedTy - e.y;
        const len = Math.hypot(dx, dy) || 1;
        const spd = 5;
        Projectiles.push({
          id: mkId(), x: e.x, y: e.y,
          vx: (dx / len) * spd, vy: (dy / len) * spd,
          damage: e.strength, armorPen: 1, pierce: 0, pierceLeft: 0,
          bounce: 0, bounceLeft: 0, bounceCount: 0, range: 400, traveledSq: 0,
          chainCount: 0, chainRange: 0, areaRadius: 0, areaDamageMultiplier: 0,
          pullRadius: 0, pullStrength: 0, weaponId: 'enemy_ranged',
          statusEffect: null, hitIds: new Set([e.id]), dead: false, icon: '👁️',
          splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
          finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
          followupMeteors: 0, followupDamageMultiplier: 0,
          isMeteor: false, isEnemyProjectile: true,
          targetX: Player.x, targetY: Player.y
        });
      }
    }

    // Fire breath (dragon) - aimed cone
    if (e.abilities.includes('fireBreath')) {
      e.fireBreathTimer -= dt;
      if (e.fireBreathTimer <= 0) {
        e.fireBreathTimer = rnd(3, 5);
        const fbDecoy = getDecoyTarget();
        const fbTx = fbDecoy ? fbDecoy.x : Player.x;
        const fbTy = fbDecoy ? fbDecoy.y : Player.y;
        const dx = fbTx - e.x, dy = fbTy - e.y;
        const len = Math.hypot(dx, dy) || 1;
        for (let fb = 0; fb < 5; fb++) {
          const angleOffset = rnd(-0.35, 0.35);
          const baseAngle = Math.atan2(dy, dx) + angleOffset;
          Projectiles.push({
            id: mkId(), x: e.x, y: e.y,
            vx: Math.cos(baseAngle) * 8, vy: Math.sin(baseAngle) * 8,
            damage: e.strength * 0.6, armorPen: 3, pierce: 5, pierceLeft: 5,
            bounce: 0, bounceLeft: 0, bounceCount: 0, range: 350, traveledSq: 0,
            chainCount: 0, chainRange: 0, areaRadius: 30, areaDamageMultiplier: 0.3,
            pullRadius: 0, pullStrength: 0, weaponId: 'fire_breath',
            statusEffect: null, hitIds: new Set([e.id]), dead: false, icon: '🔥',
            splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
            finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
            followupMeteors: 0, followupDamageMultiplier: 0,
            isMeteor: false, isEnemyProjectile: true,
            targetX: Player.x, targetY: Player.y
          });
        }
      }
    }

    // Move toward decoy (if one exists) or player
    if (!e.chargeActive) {
      const decoyTarget = getDecoyTarget();
      const tx = decoyTarget ? decoyTarget.x : Player.x;
      const ty = decoyTarget ? decoyTarget.y : Player.y;
      const dx = tx - e.x, dy = ty - e.y;
      const len = Math.hypot(dx, dy) || 1;
      e.x += (dx / len) * e.speed * slowMult;
      e.y += (dy / len) * e.speed * slowMult;
    }
  }

  // Handle enemy projectiles hitting decoys first, then player
  for (let i = Projectiles.length - 1; i >= 0; i--) {
    const p = Projectiles[i];
    if (!p.isEnemyProjectile || p.dead) continue;
    // Check decoys
    let hitDecoy = false;
    for (const d of Decoys) {
      if (!d.dead && dist(p.x, p.y, d.x, d.y) < d.radius + 8) {
        p.dead = true;
        d.hp -= p.damage;
        d.flashTimer = 0.15;
        Particles.emit(d.x, d.y, '#ff4136', 4, 2);
        if (d.hp <= 0) _killDecoy(d);
        hitDecoy = true;
        break;
      }
    }
    if (hitDecoy) continue;
    if (dist(p.x, p.y, Player.x, Player.y) < Player.radius + 8) {
      p.dead = true;
      if (Player.iFrameTimer <= 0) {
        if (Player.shieldActive) {
          Player.shieldActive = false;
          Player.shieldTimer = Player.shieldCooldown;
          Particles.emit(Player.x, Player.y, '#ffd700', 20, 6);
        } else if (Player.blockChance > 0 && Math.random() < Player.blockChance) {
          Particles.emit(Player.x, Player.y, '#ffd700', 10, 4);
          Player.iFrameTimer = 0.15;
        } else {
          const dmg = Math.max(1, p.damage - Player.armor);
          Player.health -= dmg;
          Player.flashTimer = 0.15;
          Player.iFrameTimer = 0.3;
          Particles.emit(Player.x, Player.y, '#ff4136', 6, 3);
          if (Player.health <= 0) Game.gameOver();
        }
      }
    }
  }
}

// ── WAVE SPAWNER ──────────────────────────────────────────────

const WaveSpawner = {
  spawnTimer: 0,
  spawnedCount: 0,
  totalToSpawn: 0,
  spawnInterval: 1.5,
  bossPending: null,
  miniBossesPending: [],

  startWave(waveNum) {
    const milestone = CONFIG.waveMilestones[waveNum - 1];
    this.spawnedCount = 0;
    this.totalToSpawn = milestone.monstersTotal;
    // Fit all spawns into the first 35% of the wave
    const spawnWindow = Game.waveDurationFor(waveNum) * 0.35;
    this.spawnInterval = Math.max(0.25, spawnWindow / milestone.monstersTotal);
    this.spawnTimer = 0.3;
    this.bossPending = milestone.boss || null;
    // Support both miniBosses array and legacy miniBoss string
    this.miniBossesPending = milestone.miniBosses
      ? [...milestone.miniBosses]
      : milestone.miniBoss ? [milestone.miniBoss] : [];
  },

  update(dt, waveNum) {
    if (this.spawnedCount >= this.totalToSpawn) return;
    // Boss/mini-boss can spawn any time; regular enemies only in first 35% of wave
    const inSpawnWindow = (this.bossPending || this.miniBossesPending.length > 0) ||
                          Game.waveTimer > Game.waveDuration * 0.65;
    if (!inSpawnWindow) return;
    this.spawnTimer -= dt;
    if (this.spawnTimer > 0) return;
    this.spawnTimer = this.spawnInterval;

    // Boss wave
    if (this.bossPending) {
      spawnEnemy(this.bossPending, waveNum);
      this.bossPending = null;
      this.spawnedCount++;
      return;
    }
    // Mini-boss(es) — spawn one per tick until queue is drained
    if (this.miniBossesPending.length > 0) {
      spawnEnemy(this.miniBossesPending.shift(), waveNum);
      this.spawnedCount++;
    }

    // Regular enemy from weighted pool
    const pool = CONFIG.monsters.filter(m => m.waveMin <= waveNum && m.spawnWeight > 0);
    if (pool.length === 0) return;
    const totalWeight = pool.reduce((s, m) => s + m.spawnWeight, 0);
    let r = Math.random() * totalWeight;
    for (const m of pool) {
      r -= m.spawnWeight;
      if (r <= 0) { spawnEnemy(m.id, waveNum); break; }
    }
    this.spawnedCount++;
  }
};

// ── LEVEL UP SYSTEM ───────────────────────────────────────────

// Returns a stable ban key for a choice object
function getBanId(choice) {
  if (choice.type === 'newWeapon')     return 'w:' + choice.weaponId;
  if (choice.type === 'weaponUpgrade') return 'u:' + choice.weaponId + ':' + choice.upgradeId;
  if (choice.type === 'passive')       return 'p:' + choice.passiveId;
  if (choice.type === 'combo')         return 'c:' + choice.comboId;
  return 'x:' + choice.label;
}

function getWeaponCycle(weaponId) {
  for (const [key, cycle] of Object.entries(CONFIG.cycles || {})) {
    if (cycle.weapons.includes(weaponId)) return key;
  }
  return null;
}

const CYCLE_BONUS_LABELS = {
  fire:      '+1 projectile per stack',
  ice:       '+10% status duration per stack',
  lightning: '−4% cooldown per stack',
  death:     '+5% damage per stack',
  arcane:    '+6% range per stack',
  demon:     '+1 armor per stack',
  blade:     '+1.5 armor pen per stack',
  life:      '+5 max HP per stack',
};

function buildPauseScreen() {
  const grid = document.getElementById('pause-cycle-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const ownedIds = new Set(Player.weapons.map(w => w.weaponId));
  const unlockedCombos = Player.unlockedCombos || new Set();

  for (const [key, cycle] of Object.entries(CONFIG.cycles || {})) {
    const stacks = Player.cycleBonus?.[key] || 0;
    const active = cycle.weapons.some(id => ownedIds.has(id));
    const card = document.createElement('div');
    card.className = 'pause-cycle-card' + (active ? ' active' : '');
    card.style.setProperty('--cycle-color', cycle.color);

    // Weapon ring order string
    const wNames = cycle.weapons.map(id => CONFIG.weapons.find(w => w.id === id)?.name || id);
    const ringStr = wNames.join(' → ') + ' → (back to ' + wNames[0] + ')';

    // Weapon icons
    const weaponIcons = cycle.weapons.map(id => {
      const w = CONFIG.weapons.find(w => w.id === id);
      return `<span class="pause-cycle-weapon${ownedIds.has(id) ? ' owned' : ''}" title="${w?.name || id}">${w?.icon || '?'}</span>`;
    }).join('');

    // Stack / set bonus lines
    const stackLine = stacks > 0
      ? `<div class="pause-cycle-stacks">▪ ${stacks} stack${stacks !== 1 ? 's' : ''} — ${CYCLE_BONUS_LABELS[key] || ''}</div>`
      : `<div class="pause-cycle-bonus">Set bonus: ${CYCLE_BONUS_LABELS[key] || ''}</div>`;

    // Synergies relevant to this cycle
    const relevantCombos = (CONFIG.combos || []).filter(combo =>
      combo.requires.some(wId => cycle.weapons.includes(wId))
    );

    let synergiesHtml = '';
    if (relevantCombos.length > 0) {
      const rows = relevantCombos.map(combo => {
        const [wA, wB] = combo.requires;
        const ownsA = ownedIds.has(wA);
        const ownsB = ownedIds.has(wB);
        const isUnlocked = unlockedCombos.has(combo.id);
        const isReady = ownsA && ownsB && !isUnlocked;
        const isPartial = (ownsA || ownsB) && !(ownsA && ownsB);
        let cls = '';
        if (isUnlocked) cls = 'unlocked';
        else if (isReady) cls = 'ready';
        else if (ownsA || ownsB) cls = 'partial';
        const nameA = CONFIG.weapons.find(w => w.id === wA)?.name || wA;
        const nameB = CONFIG.weapons.find(w => w.id === wB)?.name || wB;
        const checkMark = isUnlocked ? `<span class="pcs-check">✓</span>` : (isReady ? `<span class="pcs-check">!</span>` : '');
        return `<div class="pause-cycle-synergy ${cls}">
          <div class="pcs-name">${combo.icon} ${combo.name}${checkMark}</div>
          <div class="pcs-reqs">${nameA} + ${nameB}</div>
        </div>`;
      }).join('');
      synergiesHtml = `<div class="pause-cycle-synergies"><div class="pcs-title">Synergies</div>${rows}</div>`;
    }

    card.innerHTML = `
      <div class="pause-cycle-header">${cycle.icon} ${cycle.name}</div>
      <div class="pause-cycle-ring">${ringStr}</div>
      <div class="pause-cycle-weapons">${weaponIcons}</div>
      ${stackLine}
      ${synergiesHtml}
    `;
    grid.appendChild(card);
  }
}

function computeCyclePassives() {
  const cb = Player.cycleBonus;
  for (const key of Object.keys(cb)) cb[key] = 0;

  for (const wi of Player.weapons) {
    for (const [key, cycle] of Object.entries(CONFIG.cycles || {})) {
      if (cycle.weapons.includes(wi.weaponId)) { cb[key]++; break; }
    }
  }
  // Stacks = weapons beyond the first
  for (const key of Object.keys(cb)) cb[key] = Math.max(0, cb[key] - 1);

  // Life: +5 max HP per stack
  const lifeHP = cb.life * 5;
  const lifeHPDelta = lifeHP - (Player.cycleLifeMaxHPApplied || 0);
  if (lifeHPDelta !== 0) {
    Player.maxHealth += lifeHPDelta;
    Player.health = Math.min(Player.health + Math.max(0, lifeHPDelta), Player.maxHealth);
    Player.cycleLifeMaxHPApplied = lifeHP;
  }

  // Demon: +1 armor per stack
  const demonArmor = cb.demon * 1;
  const demonArmorDelta = demonArmor - (Player.cycleDemonArmorApplied || 0);
  if (demonArmorDelta !== 0) {
    Player.armor += demonArmorDelta;
    Player.cycleDemonArmorApplied = demonArmor;
  }

  // Recompute all weapon stats so new stacks take effect
  for (const wi of Player.weapons) {
    const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
    if (wConfig) wi.computedStats = Player.computeWeaponStats(wConfig, wi.appliedUpgrades);
  }
}

const LevelSystem = {
  generateChoices() {
    const banned = Game.bannedIds || new Set();
    const choices = [];

    // New weapons — only offered if the player hasn't hit the cap
    const atWeaponCap = Player.weapons.length >= (CONFIG.MAX_WEAPONS ?? 10);
    for (const w of CONFIG.weapons) {
      if (!atWeaponCap && !Player.hasWeapon(w.id)) {
        const candidate = { type: 'newWeapon', weaponId: w.id, label: w.name, icon: w.icon, desc: w.description, sub: 'New Spell', cycle: getWeaponCycle(w.id), comboPotentials: [] };
        if (banned.has(getBanId(candidate))) continue;
        for (const combo of (CONFIG.combos || [])) {
          if (Player.unlockedCombos.has(combo.id)) continue;
          const [wA, wB] = combo.requires;
          if (wA === w.id || wB === w.id) {
            const partnerId = wA === w.id ? wB : wA;
            if (Player.weapons.some(pw => pw.weaponId === partnerId)) {
              const partnerName = CONFIG.weapons.find(pw => pw.id === partnerId)?.name || partnerId;
              candidate.comboPotentials.push({ comboName: combo.name, comboIcon: combo.icon, partnerName });
            }
          }
        }
        choices.push(candidate);
      }
    }

    // Weapon upgrades
    for (const wi of Player.weapons) {
      const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
      if (!wConfig) continue;
      const empoweredBy = [];
      for (const comboId of Player.unlockedCombos) {
        const combo = CONFIG.combos?.find(c => c.id === comboId);
        if (combo?.weaponBoosts?.some(b => b.weaponId === wi.weaponId)) {
          empoweredBy.push({ comboName: combo.name, comboIcon: combo.icon });
        }
      }
      for (const upg of wConfig.upgrades) {
        if (!wi.appliedUpgrades.includes(upg.id)) {
          const candidate = { type: 'weaponUpgrade', weaponId: wi.weaponId, upgradeId: upg.id, label: upg.name, icon: upg.icon, desc: upg.description, sub: `Upgrade: ${wConfig.name}`, cycle: getWeaponCycle(wi.weaponId), empoweredBy };
          if (!banned.has(getBanId(candidate))) choices.push(candidate);
        }
      }
    }

    // Passives
    for (const p of PASSIVES) {
      if (!Player.passivesApplied.includes(p.id)) {
        if (p.condition && !p.condition(Player)) continue;
        const candidate = { type: 'passive', passiveId: p.id, label: p.name, icon: p.icon, desc: p.description, sub: 'Passive' };
        if (!banned.has(getBanId(candidate))) choices.push(candidate);
      }
    }

    // Synergy combos — always shown first if available (player owns both weapons, combo not yet taken)
    const synergies = [];
    for (const combo of (CONFIG.combos || [])) {
      if (Player.unlockedCombos.has(combo.id)) continue;
      const [wA, wB] = combo.requires;
      if (Player.weapons.some(w => w.weaponId === wA) && Player.weapons.some(w => w.weaponId === wB)) {
        const candidate = { type: 'combo', comboId: combo.id, label: combo.name, icon: combo.icon, desc: combo.description, sub: `✦ SYNERGY: ${CONFIG.weapons.find(w => w.id === wA)?.name || wA} + ${CONFIG.weapons.find(w => w.id === wB)?.name || wB}` };
        if (!banned.has(getBanId(candidate))) synergies.push(candidate);
      }
    }

    // Separate weapon candidates from upgrades/passives for guaranteed weapon slots
    const weaponChoices = shuffle(choices.filter(c => c.type === 'newWeapon'));
    const otherChoices  = shuffle(choices.filter(c => c.type !== 'newWeapon'));

    const picks = [];
    // Synergies always first
    for (const s of synergies.slice(0, 3)) picks.push(s);

    // Guarantee at least 2 new-weapon cards when not at cap and slots remain
    if (!atWeaponCap) {
      const needed = Math.max(0, 2 - picks.filter(p => p.type === 'newWeapon').length);
      for (let i = 0; i < needed && picks.length < 3 && i < weaponChoices.length; i++) {
        picks.push(weaponChoices[i]);
      }
    }

    // Fill remaining slots: upgrades/passives first, then leftover weapon choices
    const usedWeaponIds = new Set(picks.filter(p => p.type === 'newWeapon').map(p => p.weaponId));
    const remaining = [...otherChoices, ...weaponChoices.filter(w => !usedWeaponIds.has(w.weaponId))];
    for (const c of remaining) {
      if (picks.length >= 3) break;
      picks.push(c);
    }

    // Fallback: guarantee at least 1
    if (picks.length === 0) {
      picks.push({ type: 'passive', passiveId: 'heal', label: 'Mending Sigil', icon: '✨', desc: 'Restore 35% of max HP.', sub: 'Passive' });
    }
    return picks;
  },

  applyChoice(choice) {
    if (choice.type === 'newWeapon') {
      Player.addWeapon(choice.weaponId);
    } else if (choice.type === 'weaponUpgrade') {
      Player.applyUpgrade(choice.weaponId, choice.upgradeId);
    } else if (choice.type === 'passive') {
      const p = PASSIVES.find(p => p.id === choice.passiveId);
      if (p) { p.apply(Player); Player.passivesApplied.push(p.id); }
    } else if (choice.type === 'combo') {
      Player.unlockedCombos.add(choice.comboId);
      // Recompute stats for all weapons so boosts take effect immediately
      for (const wi of Player.weapons) {
        const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
        if (wConfig) wi.computedStats = Player.computeWeaponStats(wConfig, wi.appliedUpgrades);
      }
    }
  }
};

// ── RENDERER ──────────────────────────────────────────────────

const Renderer = {
  drawWorld() {
    // Background
    ctx.fillStyle = '#050905';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    Camera.apply(ctx);

    // World bounds indicator
    ctx.strokeStyle = '#0c2410';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, CONFIG.WORLD_W, CONFIG.WORLD_H);

    // Dot grid
    ctx.fillStyle = 'rgba(0,100,30,0.18)';
    const gridSpacing = 80;
    const startX = Math.floor(Math.max(0, Camera.x - canvas.width / 2) / gridSpacing) * gridSpacing;
    const startY = Math.floor(Math.max(0, Camera.y - canvas.height / 2) / gridSpacing) * gridSpacing;
    for (let gx = startX; gx < Math.min(CONFIG.WORLD_W, Camera.x + canvas.width / 2); gx += gridSpacing) {
      for (let gy = startY; gy < Math.min(CONFIG.WORLD_H, Camera.y + canvas.height / 2); gy += gridSpacing) {
        ctx.beginPath();
        ctx.arc(gx, gy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Ground effects
    GroundEffects.draw(ctx);

    // Arcane Rifts (drawn on ground before enemies)
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const r of Rifts) {
      if (r.dead) continue;
      const fade = Math.min(1, r.timer / r.maxTimer);
      const pulse = Math.sin(Date.now() * 0.007 + r.x * 0.05) * 0.35 + 0.65;
      const emp = r.empowered || false;
      // Outer glow
      ctx.beginPath();
      r.points.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
      ctx.strokeStyle = emp ? `rgba(255,170,0,${0.45 * fade * pulse})` : `rgba(100,200,255,${0.3 * fade * pulse})`;
      ctx.lineWidth = emp ? 22 : 16; ctx.stroke();
      // Inner crack
      ctx.beginPath();
      r.points.forEach((pt, i) => i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y));
      ctx.strokeStyle = emp ? `rgba(255,230,100,${0.95 * fade})` : `rgba(200,240,255,${0.92 * fade})`;
      ctx.lineWidth = emp ? 4 : 2.5;
      if (emp) { ctx.shadowBlur = 18; ctx.shadowColor = '#ffcc00'; }
      ctx.stroke();
      ctx.shadowBlur = 0;
      // Trigger zone dot
      ctx.beginPath(); ctx.arc(r.x, r.y, (emp ? 9 : 6) * fade, 0, Math.PI * 2);
      ctx.fillStyle = emp ? `rgba(255,200,50,${0.9 * pulse * fade})` : `rgba(160,230,255,${0.75 * pulse * fade})`;
      ctx.fill();
    }
    ctx.restore();

    // Arcane Spikes (ground layer, before enemies)
    ctx.save();
    for (const sp of Spikes) {
      if (sp.dead) continue;
      const fade = Math.min(1, sp.timer / sp.maxTimer);
      const pulse = Math.sin(Date.now() * 0.005 + sp.x * 0.07) * 0.2 + 0.8;
      const empowered = sp.empowered || false;
      ctx.save();
      ctx.translate(sp.x, sp.y);
      if (empowered) {
        // Electric outer ring
        ctx.beginPath();
        ctx.arc(0, 0, sp.radius * 1.4, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,220,50,${0.45 * fade * pulse})`;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 18; ctx.shadowColor = '#ffdd00';
        ctx.stroke(); ctx.shadowBlur = 0;
      }
      ctx.shadowBlur = empowered ? 26 : 14;
      ctx.shadowColor = empowered ? '#ffaa00' : '#ff4422';
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        const tip = sp.radius * (empowered ? 1.1 : 0.9);
        const base = sp.radius * 0.38;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * tip, Math.sin(a) * tip);
        ctx.lineTo(Math.cos(a + 0.5) * base, Math.sin(a + 0.5) * base);
        ctx.lineTo(Math.cos(a - 0.5) * base, Math.sin(a - 0.5) * base);
        ctx.closePath();
        ctx.fillStyle = empowered ? `rgba(255,180,0,${0.92 * fade * pulse})` : `rgba(210,55,35,${0.85 * fade * pulse})`;
        ctx.fill();
        ctx.strokeStyle = empowered ? `rgba(255,255,100,${0.8 * fade})` : `rgba(255,140,80,${0.6 * fade})`;
        ctx.lineWidth = empowered ? 2.5 : 1.5;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    ctx.restore();

    // Ward Shells (drawn around player position)
    ctx.save();
    for (const sh of WardShells) {
      if (sh.dead) continue;
      const fade = Math.min(1, sh.timer / sh.maxTimer);
      const pulse = Math.sin(Date.now() * 0.008) * 0.18 + 0.82;
      const empowered = sh.empowered || false;
      ctx.save();
      ctx.translate(sh.x, sh.y);
      if (empowered) {
        // Rainbow outer corona — rotates over time
        const rot = Date.now() * 0.002;
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2 - Math.PI / 6 + rot;
          const hue = (i * 60 + Date.now() * 0.1) % 360;
          const r = sh.radius * (pulse + 0.12);
          const nx = Math.cos(a) * r, ny = Math.sin(a) * r;
          ctx.beginPath();
          ctx.arc(nx, ny, 7, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${hue},100%,65%,${0.7 * fade})`;
          ctx.shadowBlur = 16; ctx.shadowColor = `hsl(${hue},100%,60%)`;
          ctx.fill(); ctx.shadowBlur = 0;
        }
      }
      ctx.shadowBlur = empowered ? 35 : 20;
      ctx.shadowColor = empowered ? '#ffffff' : '#33aaff';
      // Hexagonal shell border
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const r = sh.radius * pulse;
        if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
        else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.strokeStyle = empowered ? `rgba(200,255,255,${0.9 * fade})` : `rgba(80,180,255,${0.75 * fade})`;
      ctx.lineWidth = empowered ? 5 : 3.5;
      ctx.stroke();
      // Inner fill glow
      ctx.fillStyle = empowered ? `rgba(100,220,255,${0.12 * fade})` : `rgba(40,120,255,${0.06 * fade})`;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }
    ctx.restore();

    // Enemies
    ctx.font = '24px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const e of Enemies) {
      if (e.dead) continue;
      const isBoss = e.abilities.includes('boss');
      const isMiniBoss = e.abilities.includes('miniboss');
      const iconSize = isBoss ? 72 : isMiniBoss ? 48 : (e.radius > 18 ? 32 : 24);
      ctx.font = `${iconSize}px serif`;

      // Visibility glow behind the emoji
      const glowR = e.radius * 1.1;
      const glowGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
      glowGrad.addColorStop(0, 'rgba(255,255,200,0.22)');
      glowGrad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(e.x, e.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      if (e.flashTimer > 0) {
        ctx.globalAlpha = 0.6;
        ctx.filter = 'brightness(3) sepia(1) hue-rotate(280deg)';
      } else {
        ctx.filter = 'brightness(1.6)';
      }
      ctx.fillText(e.icon, e.x, e.y);
      ctx.globalAlpha = 1;
      ctx.filter = 'none';

      // Health bar
      const bw = e.radius * 2;
      const bh = 4;
      const bx = e.x - e.radius;
      const by = e.y - e.radius - 10;
      ctx.fillStyle = '#001a06';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = isBoss ? '#ff4136' : isMiniBoss ? '#ff9500' : '#00cc33';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);

      // Status indicators
      let sxOffset = 0;
      for (const se of e.statusEffects) {
        if (se.type === 'slow') { ctx.font = '10px serif'; ctx.fillText('❄️', e.x - e.radius + sxOffset, e.y - e.radius - 18); sxOffset += 14; }
        if (se.type === 'stun') { ctx.font = '10px serif'; ctx.fillText('⚡', e.x - e.radius + sxOffset, e.y - e.radius - 18); sxOffset += 14; }
        if (se.type === 'poison') { ctx.font = '10px serif'; ctx.fillText('☠️', e.x - e.radius + sxOffset, e.y - e.radius - 18); sxOffset += 14; }
      }
    }

    // Projectiles
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const p of Projectiles) {
      if (p.dead) continue;
      if (p.isEnemyProjectile) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4136';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,65,54,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else if (p.isBox) {
        // Draw traced wall segment (start corner → current position)
        const bs = p.boxSize;
        const emp = p.empowered || false;
        let sx, sy; // start corner of this wall (flips with boxReverse)
        if (p.boxReverse) {
          if      (p.boxWall === 0) { sx = Player.x + bs; sy = Player.y - bs; }
          else if (p.boxWall === 1) { sx = Player.x - bs; sy = Player.y + bs; }
          else if (p.boxWall === 2) { sx = Player.x + bs; sy = Player.y + bs; }
          else                      { sx = Player.x + bs; sy = Player.y + bs; }
        } else {
          if      (p.boxWall === 0) { sx = Player.x - bs; sy = Player.y - bs; }
          else if (p.boxWall === 1) { sx = Player.x - bs; sy = Player.y - bs; }
          else if (p.boxWall === 2) { sx = Player.x - bs; sy = Player.y + bs; }
          else                      { sx = Player.x + bs; sy = Player.y - bs; }
        }
        ctx.save();
        ctx.lineCap = 'round';
        // Outer glow
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = emp ? 'rgba(255,160,0,0.35)' : 'rgba(100,200,255,0.25)';
        ctx.lineWidth = emp ? 22 : 14;
        if (emp) { ctx.shadowBlur = 16; ctx.shadowColor = '#ffaa00'; }
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Inner bright line
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = emp ? 'rgba(255,230,100,0.96)' : 'rgba(160,230,255,0.92)';
        ctx.lineWidth = emp ? 6 : 4;
        ctx.stroke();
        ctx.restore();
        // Bright leading orb
        ctx.beginPath();
        ctx.arc(p.x, p.y, emp ? 10 : 7, 0, Math.PI * 2);
        ctx.fillStyle = emp ? 'rgba(255,220,80,0.98)' : 'rgba(220,245,255,0.95)';
        if (emp) { ctx.shadowBlur = 18; ctx.shadowColor = '#ffcc00'; }
        ctx.fill();
        ctx.shadowBlur = 0;
      } else if (p.isOrbit) {
        if (p.isPhasing && p.phased) {
          // Ethereal: faint ghost ring
          ctx.save();
          ctx.beginPath();
          ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(160,120,255,0.25)';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        } else {
          // Solid: glowing blade line
          const tx = -Math.sin(p.orbitAngle);
          const ty =  Math.cos(p.orbitAngle);
          const len = p.isPhasing ? 22 : (p.empowered ? 42 : 28);
          ctx.save();
          if (p.empowered) {
            // Double-ring aura around the blade
            ctx.beginPath();
            ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(100,200,255,0.3)';
            ctx.lineWidth = 8;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00aaff';
            ctx.stroke();
            ctx.shadowBlur = 0;
          }
          ctx.beginPath();
          ctx.moveTo(p.x - tx * len / 2, p.y - ty * len / 2);
          ctx.lineTo(p.x + tx * len / 2, p.y + ty * len / 2);
          ctx.strokeStyle = p.empowered ? 'rgba(80,220,255,0.98)' : (p.isPhasing ? 'rgba(200,160,255,0.95)' : 'rgba(180,230,255,0.9)');
          ctx.lineWidth = p.empowered ? 8 : (p.isPhasing ? 6 : 5);
          ctx.lineCap = 'round';
          ctx.shadowBlur = p.empowered ? 30 : 16;
          ctx.shadowColor = p.empowered ? '#00ddff' : (p.isPhasing ? '#cc88ff' : '#88ccff');
          ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.restore();
        }
      } else if (p.isPulse) {
        const fade = 1 - (p.pulseRadius / p.range);
        const emp = p.empowered || false;
        ctx.save();
        // Outer soft ring
        ctx.beginPath();
        ctx.arc(Player.x, Player.y, p.pulseRadius, 0, Math.PI * 2);
        ctx.strokeStyle = emp ? `rgba(255,180,50,${0.45 * fade})` : `rgba(120,210,255,${0.35 * fade})`;
        ctx.lineWidth = emp ? 26 : 18;
        if (emp) { ctx.shadowBlur = 20; ctx.shadowColor = '#ffaa00'; }
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Inner crisp ring
        ctx.beginPath();
        ctx.arc(Player.x, Player.y, p.pulseRadius, 0, Math.PI * 2);
        ctx.strokeStyle = emp ? `rgba(255,240,150,${0.95 * fade})` : `rgba(200,240,255,${0.9 * fade})`;
        ctx.lineWidth = emp ? 5 : 3;
        ctx.stroke();
        ctx.restore();
      } else if (p.isSlash) {
        const angle = Math.atan2(p.vy, p.vx);
        const slashLen = p.empowered ? 72 : 56;
        const returning = p.returning;
        // Outbound: gold/white. Returning: crimson. Empowered: violet/white.
        const glowColor  = p.empowered ? '#cc44ff' : (returning ? '#ff2200' : '#fffbe0');
        const outerColor = p.empowered ? `rgba(180,60,255,0.65)` : (returning ? `rgba(255,60,20,0.55)` : `rgba(255,230,120,0.5)`);
        const coreColor  = p.empowered ? `rgba(255,200,255,0.98)` : (returning ? `rgba(255,120,80,0.95)` : `rgba(255,255,240,0.95)`);
        const dotColor   = p.empowered ? `rgba(220,100,255,0.95)` : (returning ? `rgba(255,80,40,0.9)` : `rgba(255,255,200,0.8)`);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        if (p.empowered) {
          // Ghost afterimage behind the main slash
          ctx.strokeStyle = 'rgba(160,0,255,0.25)';
          ctx.lineWidth = 22;
          ctx.lineCap = 'round';
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.moveTo(-slashLen * 0.6, -5);
          ctx.lineTo(slashLen * 0.6, 5);
          ctx.stroke();
        }
        // Outer glow sweep
        ctx.shadowBlur = p.empowered ? 40 : 26;
        ctx.shadowColor = glowColor;
        ctx.strokeStyle = outerColor;
        ctx.lineWidth = p.empowered ? 20 : 14;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-slashLen * 0.5, -3);
        ctx.lineTo(slashLen * 0.5, 3);
        ctx.stroke();
        // Bright core
        ctx.shadowBlur = 0;
        ctx.strokeStyle = coreColor;
        ctx.lineWidth = p.empowered ? 5 : 3;
        ctx.beginPath();
        ctx.moveTo(-slashLen * 0.5, -3);
        ctx.lineTo(slashLen * 0.5, 3);
        ctx.stroke();
        // Leading edge flash
        ctx.fillStyle = dotColor;
        ctx.shadowBlur = p.empowered ? 18 : 0;
        ctx.shadowColor = glowColor;
        ctx.beginPath();
        ctx.arc(slashLen * 0.5, 3, p.empowered ? 7 : 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (p.isMagmaOrb) {
        // Large pulsing magma fireball
        const pulse = Math.sin(Date.now() * 0.006 + p.x) * 0.3 + 0.7;
        const sz = p.empowered ? 1.5 : 1;
        ctx.save();
        if (p.empowered) {
          // Outer superheated corona
          ctx.beginPath(); ctx.arc(p.x, p.y, 58 * pulse, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,50,0,${0.18 * pulse})`;
          ctx.shadowBlur = 40; ctx.shadowColor = '#ff2200';
          ctx.fill(); ctx.shadowBlur = 0;
        }
        // Outer heat shimmer
        ctx.beginPath(); ctx.arc(p.x, p.y, 32 * sz, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,100,20,${0.22 * pulse})`;
        ctx.fill();
        // Mid glow
        ctx.beginPath(); ctx.arc(p.x, p.y, 22 * sz, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,60,0,${0.45 * pulse})`;
        ctx.fill();
        // Core
        ctx.beginPath(); ctx.arc(p.x, p.y, 13 * sz, 0, Math.PI * 2);
        ctx.fillStyle = p.empowered ? 'rgba(255,255,100,0.95)' : 'rgba(255,200,50,0.8)';
        ctx.fill();
        ctx.font = `${p.empowered ? 36 : 28}px serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.filter = p.empowered ? 'brightness(2.5) saturate(2)' : 'brightness(1.8)';
        ctx.fillText('🌋', p.x, p.y);
        ctx.filter = 'none';
        ctx.restore();
      } else if (p.isHammer) {
        const rot = (Date.now() * 0.009) % (Math.PI * 2);
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.empowered) {
          // Fire aura rings spinning around the hammer
          const t = Date.now() * 0.006;
          for (let fi = 0; fi < 3; fi++) {
            const fa = t + (fi / 3) * Math.PI * 2;
            const fr = 28;
            ctx.beginPath();
            ctx.arc(Math.cos(fa) * fr * 0.4, Math.sin(fa) * fr * 0.4, 5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,${100 + fi * 50},0,0.85)`;
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#ff6600';
            ctx.fill();
          }
          ctx.shadowBlur = 0;
        }
        ctx.rotate(rot);
        // Outer impact glow
        ctx.shadowBlur = p.empowered ? 40 : 22;
        ctx.shadowColor = p.empowered ? '#ff4400' : '#ff8800';
        // Handle
        ctx.strokeStyle = p.empowered ? 'rgba(220,80,0,0.95)' : 'rgba(160,100,30,0.95)';
        ctx.lineWidth = p.empowered ? 7 : 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(0, 14);
        ctx.stroke();
        // Head
        ctx.fillStyle = p.empowered ? 'rgba(255,160,40,0.98)' : 'rgba(190,190,210,0.95)';
        ctx.shadowBlur = p.empowered ? 30 : 18;
        ctx.shadowColor = p.empowered ? '#ff2200' : '#dd6600';
        ctx.fillRect(p.empowered ? -18 : -15, -26, p.empowered ? 36 : 30, p.empowered ? 14 : 11);
        // Bright highlight on head top
        ctx.fillStyle = p.empowered ? 'rgba(255,220,100,0.7)' : 'rgba(255,255,255,0.45)';
        ctx.fillRect(p.empowered ? -18 : -15, -26, p.empowered ? 36 : 30, 3);
        ctx.shadowBlur = 0;
        ctx.restore();
      } else if (p.isDashBlade) {
        // Arcane blade slash sweeping perpendicular
        const angle = Math.atan2(p.vy, p.vx);
        const emp = p.empowered;
        const slashLen = emp ? 60 : 46;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.shadowBlur = emp ? 36 : 20;
        ctx.shadowColor = emp ? '#ffdd88' : '#44ffbb';
        ctx.strokeStyle = emp ? 'rgba(255,230,100,0.55)' : 'rgba(68,255,187,0.45)';
        ctx.lineWidth = emp ? 18 : 12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-slashLen * 0.5, -2);
        ctx.lineTo(slashLen * 0.5, 2);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = emp ? 'rgba(255,255,200,0.95)' : 'rgba(180,255,240,0.92)';
        ctx.lineWidth = emp ? 5 : 3;
        ctx.beginPath();
        ctx.moveTo(-slashLen * 0.5, -2);
        ctx.lineTo(slashLen * 0.5, 2);
        ctx.stroke();
        ctx.fillStyle = emp ? 'rgba(255,240,150,0.9)' : 'rgba(150,255,220,0.85)';
        ctx.beginPath();
        ctx.arc(slashLen * 0.5, 2, emp ? 6 : 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (p.isRecall) {
        // Arcane bolt flying toward the caster — draw as trailing teal streak
        const angle = Math.atan2(p.vy, p.vx);
        const emp = p.empowered;
        const len = emp ? 52 : 38;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.shadowBlur = emp ? 32 : 18;
        ctx.shadowColor = emp ? '#ffdd88' : '#44ffbb';
        ctx.strokeStyle = emp ? 'rgba(255,220,80,0.5)' : 'rgba(68,255,187,0.4)';
        ctx.lineWidth = emp ? 16 : 11;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(len, 0); // trail behind (toward spawn point = forward in velocity direction)
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = emp ? 'rgba(255,255,180,0.95)' : 'rgba(160,255,230,0.9)';
        ctx.lineWidth = emp ? 5 : 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(len, 0);
        ctx.stroke();
        ctx.fillStyle = emp ? 'rgba(255,240,120,0.9)' : 'rgba(100,255,200,0.9)';
        ctx.shadowBlur = emp ? 16 : 10;
        ctx.shadowColor = emp ? '#ffdd44' : '#44ffbb';
        ctx.beginPath();
        ctx.arc(0, 0, emp ? 7 : 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (p.isCorpse) {
        // Dead enemy flying as projectile — spinning with glow aura
        const rot = (Date.now() * 0.012) % (Math.PI * 2);
        const emp = p.empowered;
        ctx.save();
        ctx.translate(p.x, p.y);
        // Arcane explosion aura
        ctx.beginPath();
        ctx.arc(0, 0, emp ? 26 : 20, 0, Math.PI * 2);
        ctx.fillStyle = emp ? 'rgba(255,150,0,0.18)' : 'rgba(68,255,187,0.15)';
        ctx.shadowBlur = emp ? 28 : 18;
        ctx.shadowColor = emp ? '#ffaa00' : '#44ffbb';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.rotate(rot);
        ctx.font = '20px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.filter = emp ? 'brightness(2.5)' : 'brightness(1.6)';
        ctx.fillText(p.icon, 0, 0);
        ctx.filter = 'none';
        ctx.restore();
      } else if (p.isBoltgunShell) {
        // Infernal artillery shell — chunky, directional, trailing fire
        const ang = Math.atan2(p.vy, p.vx);
        const emp = p.empowered;
        const sz = emp ? 1.4 : 1;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(ang);
        // Outer blast glow
        ctx.beginPath(); ctx.arc(0, 0, 18 * sz, 0, Math.PI * 2);
        ctx.fillStyle = emp ? 'rgba(255,80,0,0.28)' : 'rgba(255,60,0,0.18)';
        ctx.fill();
        if (emp) { ctx.shadowBlur = 32; ctx.shadowColor = '#ff1100'; }
        else      { ctx.shadowBlur = 18; ctx.shadowColor = '#ff4422'; }
        // Shell body (elongated ellipse)
        ctx.fillStyle = emp ? '#ff8800' : '#cc3300';
        ctx.beginPath();
        ctx.ellipse(0, 0, 12 * sz, 5 * sz, 0, 0, Math.PI * 2);
        ctx.fill();
        // Nose cone (bright forward tip)
        ctx.beginPath(); ctx.arc(10 * sz, 0, 4 * sz, 0, Math.PI * 2);
        ctx.fillStyle = emp ? '#ffffff' : '#ff7744';
        ctx.shadowBlur = 22; ctx.shadowColor = emp ? '#ffcc00' : '#ff5500';
        ctx.fill();
        // Exhaust trail (behind the shell)
        ctx.beginPath(); ctx.arc(-13 * sz, 0, 3.5 * sz, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,140,40,0.5)';
        ctx.shadowBlur = 10; ctx.shadowColor = '#ff8800';
        ctx.fill();
        ctx.beginPath(); ctx.arc(-18 * sz, 0, 2 * sz, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,80,20,0.3)';
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
      } else {
        // Bone spear: grows larger with each pierce hit
        const boneScale = p.isBoneSpear ? 1 + (p.pierceHitCount || 0) * 0.4 : 1;
        const empScale = p.empowered ? 1.35 : 1;
        const glowR = 13 * boneScale * empScale;
        const fontSize = Math.round(22 * boneScale * empScale);
        const glowColor = p.isShadowBolt     ? (p.empowered ? 'rgba(200,0,255,0.55)' : 'rgba(160,80,220,0.35)')
                        : p.isWhirl          ? (p.empowered ? 'rgba(0,200,255,0.5)'  : 'rgba(120,200,255,0.3)')
                        : p.isViceroyMissile ? (p.empowered ? 'rgba(255,50,220,0.6)' : 'rgba(255,100,180,0.4)')
                        : p.isBlackSauce     ? (p.empowered ? 'rgba(80,0,120,0.75)'  : 'rgba(40,0,60,0.55)')
                        : p.empowered        ? 'rgba(255,220,80,0.5)'
                        : 'rgba(180,255,200,0.28)';
        if (p.empowered) {
          // Outer empowered ring
          ctx.beginPath();
          ctx.arc(p.x, p.y, glowR * 1.7, 0, Math.PI * 2);
          ctx.fillStyle = glowColor.replace(/[\d.]+\)$/, '0.18)');
          ctx.shadowBlur = 22;
          ctx.shadowColor = '#ffdd44';
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
        ctx.fillStyle = glowColor;
        ctx.fill();
        ctx.font = `${fontSize}px serif`;
        ctx.filter = p.empowered ? 'brightness(3.5) saturate(1.5)' : 'brightness(2)';
        ctx.fillText(p.icon, p.x, p.y);
        ctx.filter = 'none';
      }

      // Universal empowered spark ring — orbiting gold sparks for all empowered projectiles
      if (p.empowered && !p.isPulse && !p.isBox) {
        const t = Date.now() * 0.0045;
        ctx.save();
        for (let si = 0; si < 4; si++) {
          const sa = t * 2.8 + (si / 4) * Math.PI * 2;
          const sr = 20 + Math.sin(t * 3.5 + si * 1.4) * 5;
          ctx.beginPath();
          ctx.arc(p.x + Math.cos(sa) * sr, p.y + Math.sin(sa) * sr, 2.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,220,60,${0.75 + Math.sin(t * 5 + si) * 0.25})`;
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ffdd22';
          ctx.fill();
        }
        ctx.restore();
      }
    }

    // Astral Triad orbs
    ctx.save();
    for (const t of TriadOrbs) {
      const emp = t.empowered;
      const pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
      const primaryColor = emp ? '#ffdd88' : '#44ffbb';
      const subColor     = emp ? '#ffaa44' : '#88ffdd';
      for (const orb of t.orbs) {
        const px = Player.x + Math.cos(orb.angle) * t.primaryRadius;
        const py = Player.y + Math.sin(orb.angle) * t.primaryRadius;
        // Faint tether from player to primary
        ctx.beginPath();
        ctx.moveTo(Player.x, Player.y);
        ctx.lineTo(px, py);
        ctx.strokeStyle = `rgba(68,255,187,${0.1 * pulse})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        // Primary orb glow
        ctx.beginPath();
        ctx.arc(px, py, emp ? 18 : 14, 0, Math.PI * 2);
        ctx.fillStyle = emp ? `rgba(255,210,100,${0.2 * pulse})` : `rgba(68,255,187,${0.2 * pulse})`;
        ctx.shadowBlur = emp ? 24 : 14;
        ctx.shadowColor = primaryColor;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Primary orb core
        ctx.beginPath();
        ctx.arc(px, py, emp ? 8 : 6, 0, Math.PI * 2);
        ctx.fillStyle = emp ? 'rgba(255,240,180,0.95)' : 'rgba(180,255,230,0.95)';
        ctx.fill();
        for (const sub of orb.subs) {
          const sx = px + Math.cos(sub.angle) * t.subRadius;
          const sy = py + Math.sin(sub.angle) * t.subRadius;
          // Tether from primary to sub
          ctx.beginPath();
          ctx.moveTo(px, py);
          ctx.lineTo(sx, sy);
          ctx.strokeStyle = `rgba(68,255,187,${0.18 * pulse})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
          // Sub orb glow
          ctx.beginPath();
          ctx.arc(sx, sy, emp ? 9 : 7, 0, Math.PI * 2);
          ctx.fillStyle = emp ? `rgba(255,180,80,${0.2 * pulse})` : `rgba(68,255,187,${0.18 * pulse})`;
          ctx.shadowBlur = emp ? 14 : 10;
          ctx.shadowColor = subColor;
          ctx.fill();
          ctx.shadowBlur = 0;
          // Sub orb core
          ctx.beginPath();
          ctx.arc(sx, sy, emp ? 4 : 3, 0, Math.PI * 2);
          ctx.fillStyle = emp ? 'rgba(255,230,150,0.95)' : 'rgba(200,255,240,0.95)';
          ctx.fill();
        }
      }
    }
    ctx.restore();

    // Weapon range rings
    if (Game.phase === 'playing') {
      ctx.save();
      ctx.setLineDash([6, 10]);
      ctx.lineWidth = 1;
      const ringColors = ['#00ff41','#00aaff','#ffaa00','#cc44ff','#ff6644'];
      for (let wi = 0; wi < Player.weapons.length; wi++) {
        const w = Player.weapons[wi];
        const r = w.computedStats.range;
        const pulse = Math.sin(Player.glowPulse + wi * 1.2) * 0.5 + 0.5;
        ctx.beginPath();
        ctx.arc(Player.x, Player.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = ringColors[wi % ringColors.length].replace(')', `,${0.10 + pulse * 0.07})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace('rgba(', 'rgba(').replace('00ff41)', '0,255,65,').replace('00aaff)', '0,170,255,').replace('ffaa00)', '255,170,0,').replace('cc44ff)', '204,68,255,').replace('ff6644)', '255,102,68,');
        // simpler approach:
        ctx.strokeStyle = `rgba(0,255,65,${0.10 + pulse * 0.07})`;
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.restore();

      // Mouse-aim crosshair in manual mode
      if (!Input.autoAim) {
        const mw = Input.mouseWorld();
        ctx.save();
        ctx.strokeStyle = 'rgba(0,255,65,0.7)';
        ctx.lineWidth = 1;
        const cs = 10;
        ctx.beginPath();
        ctx.moveTo(mw.x - cs, mw.y); ctx.lineTo(mw.x + cs, mw.y);
        ctx.moveTo(mw.x, mw.y - cs); ctx.lineTo(mw.x, mw.y + cs);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(mw.x, mw.y, 5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,255,65,0.45)';
        ctx.stroke();
        // Aim line from player to cursor
        ctx.beginPath();
        ctx.moveTo(Player.x, Player.y);
        ctx.lineTo(mw.x, mw.y);
        ctx.setLineDash([4, 8]);
        ctx.strokeStyle = 'rgba(0,255,65,0.15)';
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    // Beams (Jake's Lament)
    for (const b of Beams) {
      const alpha = b.life / b.maxLife;
      ctx.save();
      ctx.lineCap = 'round';
      if (b.empowered) {
        // Outer violet aura
        ctx.shadowBlur = 50;
        ctx.shadowColor = '#cc00ff';
        ctx.strokeStyle = `rgba(200,0,255,${alpha * 0.45})`;
        ctx.lineWidth = b.width * alpha * 2.2;
        ctx.globalAlpha = 1;
        ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke();
        // Mid magenta
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#ff44ff';
        ctx.strokeStyle = b.color;
        ctx.lineWidth = b.width * alpha;
        ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke();
      } else {
        ctx.shadowBlur = 28;
        ctx.shadowColor = b.color;
        ctx.strokeStyle = b.color;
        ctx.lineWidth = b.width * alpha;
        ctx.globalAlpha = alpha * 0.85;
        ctx.beginPath(); ctx.moveTo(b.x1, b.y1); ctx.lineTo(b.x2, b.y2); ctx.stroke();
      }
      // Bright white core (always)
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.9})`;
      ctx.lineWidth = 2 * alpha;
      ctx.beginPath();
      ctx.moveTo(b.x1, b.y1);
      ctx.lineTo(b.x2, b.y2);
      ctx.stroke();
      ctx.restore();
    }

    // Chrono Needle marks (purple pulsing ring on target)
    ctx.save();
    for (const m of ChronoMarks) {
      if (m.enemy.dead) continue;
      const progress = 1 - (m.timer / m.maxTimer);
      const pulse = Math.sin(Date.now() * 0.008) * 0.5 + 0.5;
      ctx.globalAlpha = 0.5 + pulse * 0.4;
      ctx.strokeStyle = '#cc88ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(m.enemy.x, m.enemy.y, m.enemy.radius + 6 + pulse * 3, 0, Math.PI * 2 * progress);
      ctx.stroke();
    }
    ctx.restore();

    // Leyline Harp beams
    for (const h of HarpBeams) {
      const fade = Math.min(1, h.timer / 0.3) * Math.min(1, (h.maxTimer - h.timer) / 0.3);
      const pairs = [[h.x1, h.y1, h.x2, h.y2]];
      if (h.third) { pairs.push([h.x2, h.y2, h.x3, h.y3]); pairs.push([h.x3, h.y3, h.x1, h.y1]); }
      const emp = h.empowered || false;
      ctx.save();
      ctx.globalAlpha = (0.5 + fade * 0.5) * 0.85;
      ctx.lineCap = 'round';
      for (const [ax, ay, bx, by] of pairs) {
        ctx.shadowBlur = emp ? 24 : 14;
        ctx.shadowColor = emp ? '#ff66ff' : '#ffdd44';
        ctx.strokeStyle = emp ? '#ff88ff' : '#ffdd44';
        ctx.lineWidth = emp ? 6 : 4;
        ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = emp ? 'rgba(255,200,255,0.75)' : 'rgba(255,255,200,0.7)';
        ctx.lineWidth = emp ? 2.5 : 1.5;
        ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
        // Anchor dots
        ctx.fillStyle = emp ? '#ffaaff' : '#ffee88';
        ctx.beginPath(); ctx.arc(ax, ay, emp ? 7 : 5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(bx, by, emp ? 7 : 5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }

    // Hungry Grimoire books
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const g of Grimoires) {
      if (g.dead) continue;
      const chargeFrac = g.charges / g.maxCharges;
      ctx.save();
      // Charge glow ring
      ctx.beginPath(); ctx.arc(g.x, g.y, 18, -Math.PI / 2, -Math.PI / 2 + chargeFrac * Math.PI * 2);
      ctx.strokeStyle = '#ffaa44'; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#ffaa44'; ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.font = '22px serif';
      ctx.fillText('📖', g.x, g.y);
      ctx.restore();
    }

    // Mirror Glyphs
    for (const m of Mirrors) {
      if (m.dead) continue;
      ctx.save();
      // Outer shimmer ring
      ctx.beginPath(); ctx.arc(m.x, m.y, 15, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(150,220,255,0.5)'; ctx.lineWidth = 2;
      ctx.shadowBlur = 12; ctx.shadowColor = '#aaddff'; ctx.stroke();
      // Gleam line (mirror face)
      ctx.shadowBlur = 0;
      ctx.save();
      ctx.translate(m.x, m.y);
      ctx.rotate(m.angle + Math.PI / 2);
      const gleam = Math.sin(Date.now() * 0.004) * 0.4 + 0.6;
      ctx.globalAlpha = gleam;
      ctx.strokeStyle = '#ddeeff'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, -11); ctx.lineTo(0, 11); ctx.stroke();
      ctx.restore();
      ctx.font = '16px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = 0.85;
      ctx.fillText('🪞', m.x, m.y);
      ctx.restore();
    }

    // Jake's Lament compass needle (drawn near player)
    if (Player.jakesDir) {
      const needleLen = 38;
      const needleBase = Player.radius + 6;
      const nx = Player.x + Player.jakesDir.x;
      const ny = Player.y + Player.jakesDir.y;
      // Find cooldown for pulse brightness
      const jakesWi = Player.weapons.find(w => w.weaponId === 'jakes_lament');
      const needleReady = jakesWi && jakesWi.cooldownRemaining <= 0;
      const needlePulse = Math.sin(Date.now() * 0.006) * 0.5 + 0.5;
      const needleAlpha = needleReady ? 0.6 + needlePulse * 0.4 : 0.3;
      ctx.save();
      ctx.globalAlpha = needleAlpha;
      ctx.strokeStyle = needleReady ? '#ffee44' : '#887733';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.shadowBlur = needleReady ? 10 : 0;
      ctx.shadowColor = '#ffee44';
      ctx.beginPath();
      ctx.moveTo(Player.x + Player.jakesDir.x * needleBase,
                 Player.y + Player.jakesDir.y * needleBase);
      ctx.lineTo(Player.x + Player.jakesDir.x * (needleBase + needleLen),
                 Player.y + Player.jakesDir.y * (needleBase + needleLen));
      ctx.stroke();
      // Arrowhead
      const perpX = -Player.jakesDir.y, perpY = Player.jakesDir.x;
      const tipX = Player.x + Player.jakesDir.x * (needleBase + needleLen);
      const tipY = Player.y + Player.jakesDir.y * (needleBase + needleLen);
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - Player.jakesDir.x * 8 + perpX * 5,
                 tipY - Player.jakesDir.y * 8 + perpY * 5);
      ctx.lineTo(tipX - Player.jakesDir.x * 8 - perpX * 5,
                 tipY - Player.jakesDir.y * 8 - perpY * 5);
      ctx.closePath();
      ctx.fillStyle = needleReady ? '#ffee44' : '#887733';
      ctx.fill();
      ctx.restore();
    }

    // Decoys
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const d of Decoys) {
      if (d.dead) continue;
      ctx.save();
      // Pulsing blue-white halo to distinguish from real player
      const dp = Math.sin(Date.now() * 0.004) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.radius + 10 + dp * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(100,200,255,${0.5 + dp * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      // Flash red when hit
      if (d.flashTimer > 0) {
        ctx.filter = 'brightness(3) saturate(0) sepia(1) hue-rotate(200deg)';
      } else {
        ctx.globalAlpha = 0.75;
      }
      ctx.font = '32px serif';
      ctx.fillText(d.icon, d.x, d.y);
      ctx.filter = 'none';
      ctx.globalAlpha = 1;
      // HP bar
      const barW = 36, barH = 4;
      const hpFrac = Math.max(0, d.hp / d.maxHp);
      ctx.fillStyle = '#222';
      ctx.fillRect(d.x - barW / 2, d.y - d.radius - 10, barW, barH);
      ctx.fillStyle = hpFrac > 0.5 ? '#00ff41' : hpFrac > 0.25 ? '#ffaa00' : '#ff3300';
      ctx.fillRect(d.x - barW / 2, d.y - d.radius - 10, barW * hpFrac, barH);
      ctx.restore();
    }

    // Player
    Player.draw(ctx);

    // Particles
    Particles.draw(ctx);

    Camera.restore(ctx);
  },

  drawHUD() {
    const PAD = 16;
    const W = canvas.width;

    // Top bar background
    ctx.fillStyle = 'rgba(5,9,5,0.75)';
    ctx.fillRect(0, 0, W, 64);
    ctx.strokeStyle = '#0c2410';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 64); ctx.lineTo(W, 64); ctx.stroke();

    // Health bar
    const hbW = Math.min(260, W * 0.35);
    const hbH = 10;
    const hbX = PAD;
    const hbY = PAD + 4;
    ctx.fillStyle = '#001a06';
    ctx.fillRect(hbX, hbY, hbW, hbH);
    const hpPct = Math.max(0, Player.health / Player.maxHealth);
    const hpColor = hpPct > 0.5 ? '#00cc33' : hpPct > 0.25 ? '#aacc00' : '#ff4136';
    ctx.fillStyle = hpColor;
    ctx.fillRect(hbX, hbY, hbW * hpPct, hbH);
    ctx.strokeStyle = '#0c2410';
    ctx.lineWidth = 1;
    ctx.strokeRect(hbX, hbY, hbW, hbH);
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = '#9ed49a';
    ctx.textAlign = 'left';
    ctx.fillText(`HP  ${Math.ceil(Player.health)} / ${Player.maxHealth}`, hbX, hbY - 3);

    // XP bar
    const xbY = hbY + hbH + 8;
    ctx.fillStyle = '#001a06';
    ctx.fillRect(hbX, xbY, hbW, 6);
    ctx.fillStyle = '#00742a';
    ctx.fillRect(hbX, xbY, hbW * (Player.xp / Player.xpToNext), 6);
    ctx.strokeStyle = '#0c2410';
    ctx.strokeRect(hbX, xbY, hbW, 6);
    ctx.font = '9px "Share Tech Mono", monospace';
    ctx.fillStyle = '#00742a';
    ctx.fillText(`LVL ${Player.level}  XP ${Player.xp}/${Player.xpToNext}`, hbX, xbY - 2);

    // Wave / kill info (right side)
    ctx.textAlign = 'right';
    ctx.font = '12px "Share Tech Mono", monospace';
    ctx.fillStyle = '#00742a';
    ctx.fillText(`WAVE ${Game.wave} / 20`, W - PAD, PAD + 12);
    ctx.fillStyle = '#9ed49a';
    ctx.fillText(`KILLS: ${Player.kills}`, W - PAD, PAD + 28);
    if (Game.wavePhase === 'playing') {
      ctx.fillStyle = '#00742a';
      const timeLeft = Math.max(0, Math.ceil(Game.waveTimer));
      if (Game.wave < 20) ctx.fillText(`${timeLeft}s`, W - PAD, PAD + 44);
    }

    // Wave timer countdown bar (below HUD bar)
    if (Game.wave < 20 && Game.wavePhase === 'playing') {
      const wavePct = Math.max(0, Game.waveTimer / Game.waveDuration);
      ctx.fillStyle = 'rgba(0,116,42,0.15)';
      ctx.fillRect(0, 64, W * wavePct, 2);
    }

    // Active weapons (bottom left)
    const wY = canvas.height - 60;
    ctx.textAlign = 'left';
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = '#0c2410';
    let wX = PAD;
    for (const wi of Player.weapons) {
      const wCfg = CONFIG.weapons.find(w => w.id === wi.weaponId);
      if (!wCfg) continue;
      const bw = 48, bh = 48;
      ctx.fillStyle = 'rgba(7,14,8,0.85)';
      ctx.fillRect(wX, wY, bw, bh);
      ctx.strokeStyle = '#0c2410';
      ctx.lineWidth = 1;
      ctx.strokeRect(wX, wY, bw, bh);
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.fillText(wCfg.icon, wX + bw / 2, wY + bh / 2 + 2);
      // Cooldown overlay
      if (wi.cooldownRemaining > 0) {
        const cdPct = wi.cooldownRemaining / wi.computedStats.cooldown;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(wX, wY, bw, bh * cdPct);
      }
      // Upgrade dots
      const upgCount = wi.appliedUpgrades.length;
      for (let u = 0; u < upgCount; u++) {
        ctx.beginPath();
        ctx.arc(wX + 6 + u * 8, wY + bh - 6, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#00ff41';
        ctx.fill();
      }
      wX += bw + 6;
    }

    // Enemy count (bottom center)
    const alive = Enemies.filter(e => !e.dead).length;
    ctx.textAlign = 'center';
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = '#002d0d';
    ctx.fillText(`ENEMIES: ${alive}`, W / 2, canvas.height - 8);

    // Aim mode indicator (bottom right)
    ctx.textAlign = 'right';
    ctx.font = '10px "Share Tech Mono", monospace';
    if (Input.autoAim) {
      ctx.fillStyle = '#00742a';
      ctx.fillText('[V] AUTO-AIM', W - PAD, canvas.height - 8);
    } else {
      ctx.fillStyle = '#00ff41';
      ctx.fillText('[V] MOUSE-AIM', W - PAD, canvas.height - 8);
    }

    // Armor indicator
    if (Player.armor > 0) {
      ctx.textAlign = 'left';
      ctx.font = '10px "Share Tech Mono", monospace';
      ctx.fillStyle = '#00742a';
      ctx.fillText(`ARM ${Player.armor}`, PAD, hbY + hbH + 22);
    }
  }
};

// ── MUSIC ─────────────────────────────────────────────────────

const CringeSound = {
  _ctx: null,
  play() {
    if (Music.muted) return;
    try {
      if (!this._ctx) this._ctx = new AudioContext();
      const ac = this._ctx;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(260, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(55, ac.currentTime + 0.28);
      gain.gain.setValueAtTime(0.22, ac.currentTime);
      gain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.28);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.3);
    } catch(e) {}
  }
};

const Music = {
  audio: null,
  lossAudio: null,
  muted: false,
  _lossFadeId: null,

  init() {
    this.audio = new Audio('Archmage_Loop.mp3');
    this.audio.loop = true;
    this.audio.volume = 0.55;
    this.lossAudio = new Audio('Archmage_Loss.mp3');
    this.lossAudio.loop = true;
    this.lossAudio.volume = 0;
  },

  play() {
    if (!this.audio) this.init();
    this._stopLoss();
    this.audio.currentTime = 0;
    if (!this.muted) this.audio.play().catch(() => {});
  },

  playLoss() {
    if (!this.lossAudio) this.init();
    this._stop(this.audio);
    this._stopLoss();

    this.lossAudio.currentTime = 0;
    this.lossAudio.volume = 0;
    this.lossAudio.playbackRate = 0.6;   // half-tempo — slow, pitch-dropped, creepy

    if (this.muted) return;
    this.lossAudio.play().catch(() => {});

    // Fade in from silence to target volume over ~5 seconds
    const TARGET = 0.55;
    const TICK   = 60;   // ms between steps
    const STEPS  = (5000 / TICK);
    const DELTA  = TARGET / STEPS;
    this._lossFadeId = setInterval(() => {
      if (!this.lossAudio) { clearInterval(this._lossFadeId); return; }
      this.lossAudio.volume = Math.min(TARGET, this.lossAudio.volume + DELTA);
      if (this.lossAudio.volume >= TARGET) {
        clearInterval(this._lossFadeId);
        this._lossFadeId = null;
      }
    }, TICK);
  },

  stop() {
    this._stop(this.audio);
    this._stopLoss();
  },

  _stop(track) {
    if (!track) return;
    track.pause();
    track.currentTime = 0;
  },

  _stopLoss() {
    if (this._lossFadeId) { clearInterval(this._lossFadeId); this._lossFadeId = null; }
    if (this.lossAudio) { this.lossAudio.pause(); this.lossAudio.currentTime = 0; this.lossAudio.volume = 0; }
  },

  toggleMute() {
    this.muted = !this.muted;
    if (!this.audio) return;
    if (this.muted) {
      this.audio.pause();
      if (this.lossAudio) this.lossAudio.pause();
    } else {
      if (this.audio.currentTime > 0) this.audio.play().catch(() => {});
      if (this.lossAudio && this.lossAudio.currentTime > 0) this.lossAudio.play().catch(() => {});
    }
  },
};

// ── GAME CONTROLLER ───────────────────────────────────────────

const Game = {
  phase: 'title',          // title | charselect | playing | levelup | gameover | victory
  wavePhase: 'break',      // playing | break
  wave: 1,
  waveTimer: 0,
  waveDuration: 0,         // duration of current wave (grows 10% each wave)
  breakTimer: 0,
  paused: false,
  lastTime: 0,
  pendingLevelUps: 0,
  rerollsLeft: 0,
  bansLeft: 0,
  bannedIds: new Set(),
  selectedChar: null,
  waveDurationFor(w) { return CONFIG.WAVE_DURATION * Math.pow(1.1, w - 1); },
  animFrameId: null,
  firstWave: true,
  speedMultiplier: 1,

  init() {
    Input.init();
    SpriteSheet.load();
    this.setupUI();
  },

  setupUI() {
    document.getElementById('btn-start').addEventListener('click', () => this.showCharSelect());
    document.getElementById('btn-play').addEventListener('click', () => this.startGame());
    document.getElementById('btn-restart-over').addEventListener('click', () => this.restart());
    document.getElementById('btn-restart-vic').addEventListener('click', () => this.restart());

    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.speedMultiplier = parseFloat(btn.dataset.speed);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    const dpadMap = [
      { id: 'dpad-up',    code: 'KeyW' },
      { id: 'dpad-down',  code: 'KeyS' },
      { id: 'dpad-left',  code: 'KeyA' },
      { id: 'dpad-right', code: 'KeyD' },
    ];
    dpadMap.forEach(({ id, code }) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', () => {
        const wasActive = !!Input.keys[code];
        // clear all directions
        dpadMap.forEach(({ id: oid, code: oc }) => {
          Input.keys[oc] = false;
          const oel = document.getElementById(oid);
          if (oel) oel.classList.remove('active');
        });
        // toggle this one on unless it was already active
        if (!wasActive) {
          Input.keys[code] = true;
          el.classList.add('active');
        }
      });
    });
  },

  clearDpadToggles() {
    ['KeyW','KeyS','KeyA','KeyD'].forEach(code => { Input.keys[code] = false; });
    ['dpad-up','dpad-down','dpad-left','dpad-right'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });
  },

  showCharSelect() {
    document.getElementById('screen-title').classList.add('hidden');
    document.getElementById('screen-charselect').classList.remove('hidden');

    const container = document.getElementById('char-cards');
    container.innerHTML = '';
    for (const char of CONFIG.characters) {
      const card = document.createElement('div');
      card.className = 'char-card';
      const startWeapon = CONFIG.weapons.find(w => w.id === char.startingWeapon);
      card.innerHTML = `
        <span class="char-icon">${char.icon}</span>
        <div class="char-name">${char.name}</div>
        <div class="char-desc">${char.desc}</div>
        <div class="char-stat">HP ${char.health} &middot; SPD ${char.speed} &middot; ARM ${char.armor}</div>
        <div class="char-stat">${startWeapon ? startWeapon.icon + ' ' + startWeapon.name : ''}</div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        this.selectedChar = char;
        const btn = document.getElementById('btn-play');
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      });
      container.appendChild(card);
    }
  },

  startGame() {
    if (!this.selectedChar) return;
    document.getElementById('screen-charselect').classList.add('hidden');
    canvas.classList.add('active');
    document.getElementById('touch-controls').classList.add('tc-visible');
    Music.play();
    this.phase = 'playing';
    this.wave = 1;
    this.wavePhase = 'playing';
    this.waveDuration = this.waveDurationFor(1);
    this.waveTimer = this.waveDuration;
    this.paused = false;
    this.pendingLevelUps = 0;
    this.rerollsLeft = CONFIG.REROLLS;
    this.bansLeft = CONFIG.BANS ?? 3;
    this.bannedIds = new Set();
    this.firstWave = true;
    this.speedMultiplier = 1;
    Input.autoAim = true;

    // Reset speed bar to 1×
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.speed-btn[data-speed="1"]').classList.add('active');
    document.getElementById('speed-bar').classList.add('visible');

    Enemies = [];
    Projectiles = [];
    Decoys = [];
    Beams = [];
    ChronoMarks = [];
    HarpBeams = [];
    Grimoires = [];
    Mirrors = [];
    Rifts = [];
    WardShells = [];
    Spikes = [];
    TriadOrbs = [];
    MirrorEchoTemplate = null;
    Particles.list = [];
    GroundEffects.list = [];

    Player.init(this.selectedChar);
    Camera.follow(Player);
    WaveSpawner.startWave(this.wave);
    this.showWaveBanner(this.wave);
    this.lastTime = performance.now();
    this.loop(performance.now());
  },

  loop(timestamp) {
    const rawDt = Math.min((timestamp - this.lastTime) / 1000, 0.05);
    this.lastTime = timestamp;

    if (!this.paused && this.phase === 'playing') {
      const steps = Math.round(this.speedMultiplier);
      for (let i = 0; i < steps; i++) {
        this.update(rawDt);
      }
      Camera.follow(Player);
    }

    this.render();
    this.animFrameId = requestAnimationFrame(ts => this.loop(ts));
  },

  update(dt) {
    // Clean dead entities periodically
    if (Enemies.length > 500) Enemies = Enemies.filter(e => !e.dead);
    if (Projectiles.length > 1000) Projectiles = Projectiles.filter(p => !p.dead);

    if (this.wavePhase === 'playing') {
      WaveSpawner.update(dt, this.wave);
      Player.update(dt, Enemies);
      updateEnemies(dt);
      updateDecoys(dt, Enemies);
      updateProjectiles(dt, Enemies);
      updateBeams(dt);
      updateChronoMarks(dt, Enemies);
      updateHarpBeams(dt, Enemies);
      updateGrimoires(dt, Enemies);
      updateMirrors(dt, Enemies);
      updateRifts(dt, Enemies);
      updateWardShells(dt, Enemies);
      updateSpikes(dt, Enemies);
      updateTriadOrbs(dt, Enemies);
      GroundEffects.update(dt, Enemies);
      Particles.update(dt);

      // Wave 20 ends on boss kill (handled in killEnemy → victory)
      // Other waves end on timer or when all enemies are dead
      if (this.wave < 20) {
        this.waveTimer -= dt;
        // Spawn is "done" when all have been queued OR the spawn window has closed
        const spawnDone = WaveSpawner.spawnedCount >= WaveSpawner.totalToSpawn ||
                          (this.waveTimer < this.waveDuration * 0.65 &&
                           !WaveSpawner.bossPending && !WaveSpawner.miniBossPending);
