<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHMAGE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --g1: #00ff41;
  --g2: #00cc33;
  --g3: #00742a;
  --g4: #002d0d;
  --bg: #050905;
  --card: #070e08;
  --text: #9ed49a;
  --border: #0c2410;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  min-height: 100svh;
  font-family: 'Share Tech Mono', monospace;
  color: var(--g1);
  overflow: hidden;
  position: relative;
}

/* Scanlines overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.13) 2px, rgba(0,0,0,0.13) 4px
  );
  pointer-events: none;
  z-index: 500;
}

/* ── SCREENS ─────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: var(--bg);
}
.screen.hidden { display: none; }

/* ── TITLE SCREEN ────────────────────────── */
#screen-title {
  flex-direction: column;
  gap: 0;
}
.title-terminal {
  width: 100%;
  max-width: 560px;
  padding: 48px 40px 40px;
  position: relative;
}
.title-terminal::before {
  content: '';
  position: absolute;
  inset: -60px;
  background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(0,255,65,0.045) 0%, rgba(0,255,65,0.012) 50%, transparent 100%);
  pointer-events: none;
}
.prompt { font-size: 13px; color: var(--g3); margin-bottom: 22px; }
.prompt-sigil { color: var(--g2); }
.name-row { display: block; line-height: 0.9; margin-bottom: 12px; white-space: nowrap; }
.name {
  font-family: 'VT323', monospace;
  font-size: clamp(54px, 13vw, 80px);
  color: var(--g1);
  text-shadow: 0 0 6px rgba(0,255,65,1), 0 0 18px rgba(0,255,65,0.6), 0 0 40px rgba(0,255,65,0.25);
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
  width: 0;
  vertical-align: bottom;
  animation: type-in 1.1s steps(8, end) forwards 0.7s;
}
@keyframes type-in { to { width: 8ch; } }
.cursor {
  font-family: 'VT323', monospace;
  font-size: clamp(54px, 13vw, 80px);
  color: var(--g1);
  text-shadow: 0 0 8px rgba(0,255,65,0.9);
  display: inline-block;
  vertical-align: bottom;
  line-height: 0.9;
  animation: blink 0.85s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.subtitle {
  font-size: clamp(11px, 2.4vw, 13px);
  color: var(--g3);
  letter-spacing: 0.28em;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 1.9s;
}
@keyframes fade-up { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

.btn-primary {
  display: block;
  width: 100%;
  padding: 14px 20px;
  background: transparent;
  border: 1px solid var(--g3);
  color: var(--g1);
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.2s, box-shadow 0.2s, text-shadow 0.2s;
  opacity: 0;
  animation: fade-up 0.5s ease forwards 2.1s;
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,255,65,0.08) 0%, rgba(0,255,65,0.03) 60%, transparent 100%);
  transform: translateX(-105%);
  transition: transform 0.32s ease;
}
.btn-primary:hover::before { transform: translateX(0); }
.btn-primary:hover {
  border-color: var(--g1);
  box-shadow: 0 0 20px rgba(0,255,65,0.12);
  text-shadow: 0 0 10px rgba(0,255,65,0.5);
}

/* ── CHARACTER SELECT ────────────────────── */
#screen-charselect { flex-direction: column; gap: 32px; }
.charselect-title {
  font-family: 'VT323', monospace;
  font-size: 32px;
  color: var(--g2);
  letter-spacing: 0.2em;
  text-align: center;
  text-shadow: 0 0 12px rgba(0,255,65,0.4);
}
.charselect-prompt { font-size: 12px; color: var(--g3); text-align: center; letter-spacing: 0.15em; }
.char-cards {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.char-card {
  width: 160px;
  border: 1px solid var(--border);
  padding: 20px 16px;
  cursor: pointer;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: var(--card);
}
.char-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,255,65,0.06) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.2s;
}
.char-card:hover::before, .char-card.selected::before { opacity: 1; }
.char-card:hover, .char-card.selected {
  border-color: var(--g2);
  box-shadow: 0 0 18px rgba(0,255,65,0.1);
}
.char-card.selected { border-color: var(--g1); box-shadow: 0 0 24px rgba(0,255,65,0.18); }
.char-icon { font-size: 40px; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 8px rgba(0,255,65,0.3)); }
.char-name { font-size: 13px; color: var(--g1); margin-bottom: 8px; letter-spacing: 0.08em; }
.char-desc { font-size: 10px; color: var(--text); line-height: 1.5; }
.char-stat { font-size: 10px; color: var(--g3); margin-top: 6px; }
.charselect-btn { opacity: 1; animation: none; }

/* ── GAME CANVAS ─────────────────────────── */
#game-canvas {
  position: fixed;
  inset: 0;
  display: none;
  pointer-events: none;
}
#game-canvas.active { display: block; }

/* ── LEVEL UP SCREEN ─────────────────────── */
#screen-levelup {
  background: rgba(5, 9, 5, 0.92);
  flex-direction: column;
  gap: 24px;
}
.levelup-header {
  text-align: center;
}
.levelup-title {
  font-family: 'VT323', monospace;
  font-size: 48px;
  color: var(--g1);
  text-shadow: 0 0 20px rgba(0,255,65,0.6);
  animation: levelup-pulse 1s ease-in-out infinite alternate;
}
@keyframes levelup-pulse {
  from { text-shadow: 0 0 10px rgba(0,255,65,0.4); }
  to   { text-shadow: 0 0 30px rgba(0,255,65,0.9), 0 0 60px rgba(0,255,65,0.3); }
}
.levelup-sub { font-size: 11px; color: var(--g3); letter-spacing: 0.2em; margin-top: 4px; }
.reroll-row { text-align: center; margin-top: 4px; }
.btn-reroll {
  background: transparent;
  border: 1px solid var(--g3);
  color: var(--g3);
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.12em;
  padding: 7px 22px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-reroll:hover:not(:disabled) { color: var(--g1); border-color: var(--g1); }
.btn-reroll:disabled { opacity: 0.28; cursor: default; }
.upgrade-cards {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.upgrade-card {
  width: 190px;
  border: 1px solid var(--border);
  padding: 18px 16px;
  cursor: pointer;
  text-align: center;
  background: var(--card);
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
}
.upgrade-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,255,65,0.07) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.2s;
}
.upgrade-card:hover::before { opacity: 1; }
.upgrade-card:hover {
  border-color: var(--g1);
  box-shadow: 0 0 22px rgba(0,255,65,0.15);
  transform: translateY(-2px);
}
.upgrade-icon { font-size: 32px; margin-bottom: 10px; display: block; }
.upgrade-name { font-size: 13px; color: var(--g1); margin-bottom: 8px; }
.upgrade-type { font-size: 10px; color: var(--g3); margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
.upgrade-desc { font-size: 10px; color: var(--text); line-height: 1.5; }

/* ── WAVE BANNER ─────────────────────────── */
#wave-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
#wave-banner.visible { opacity: 1; }
.wave-banner-title {
  font-family: 'VT323', monospace;
  font-size: 56px;
  color: var(--g1);
  text-shadow: 0 0 20px rgba(0,255,65,0.7);
  letter-spacing: 0.1em;
}
.wave-banner-sub { font-size: 13px; color: var(--g2); letter-spacing: 0.3em; text-transform: uppercase; }

/* ── GAME OVER / VICTORY ─────────────────── */
#screen-gameover, #screen-victory {
  flex-direction: column;
  gap: 28px;
}
.endgame-terminal {
  width: 100%;
  max-width: 480px;
  border: 1px solid var(--border);
  background: var(--card);
  padding: 36px 32px;
  position: relative;
}
.endgame-title {
  font-family: 'VT323', monospace;
  font-size: 52px;
  text-align: center;
  margin-bottom: 6px;
  text-shadow: 0 0 16px currentColor;
}
.endgame-title.over { color: #ff4136; text-shadow: 0 0 16px rgba(255,65,54,0.6); }
.endgame-title.victory { color: var(--g1); }
.endgame-sub { font-size: 11px; color: var(--g3); text-align: center; letter-spacing: 0.2em; margin-bottom: 24px; }
.endgame-stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--text);
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.stat-val { color: var(--g1); }

/* ── SPEED BAR ───────────────────────────── */
#speed-bar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  height: 64px;
  display: none;
  align-items: center;
  gap: 4px;
  z-index: 50;
  pointer-events: auto;
}
#speed-bar.visible { display: flex; }
.speed-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--g4);
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 4px 9px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, text-shadow 0.15s;
  line-height: 1;
}
.speed-btn:hover {
  color: var(--g2);
  border-color: var(--g3);
}
.speed-btn.active {
  color: var(--g1);
  border-color: var(--g2);
  text-shadow: 0 0 8px rgba(0,255,65,0.5);
}

/* ── PAUSE ───────────────────────────────── */
#pause-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,9,5,0.7);
  z-index: 150;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}
#pause-overlay.visible { display: flex; }
.pause-text {
  font-family: 'VT323', monospace;
  font-size: 52px;
  color: var(--g1);
  text-shadow: 0 0 20px rgba(0,255,65,0.5);
  animation: blink 1s step-end infinite;
}

@media (max-width: 500px) {
  .title-terminal { padding: 28px 20px 28px; }
  .char-card { width: 130px; }
  .upgrade-card { width: 150px; }
}

/* ── TOUCH CONTROLS ─────────────────────────────────────────── */
#touch-controls {
  display: none;
  position: fixed;
  bottom: 24px; left: 24px;
  z-index: 80;
  pointer-events: auto;
}
#touch-controls.tc-visible { display: block; }
@media (hover: none) and (pointer: coarse) {
  #touch-controls.tc-visible { display: block; }
}
#dpad {
  display: grid;
  grid-template-columns: repeat(3, 56px);
  grid-template-rows: repeat(3, 56px);
  gap: 4px;
}
.dpad-btn {
  width: 56px; height: 56px;
  border-radius: 10px;
  border: 1px solid rgba(0,255,65,0.4);
  background: rgba(0,255,65,0.08);
  color: rgba(0,255,65,0.85);
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.08s, border-color 0.08s, color 0.08s, text-shadow 0.08s;
}
.dpad-btn.active {
  background: rgba(0,255,65,0.22);
  border-color: var(--g1);
  color: var(--g1);
  text-shadow: 0 0 8px rgba(0,255,65,0.8);
}
</style>
</head>
<body>

<!-- ── TITLE SCREEN ─────────────────────── -->
<div id="screen-title" class="screen">
  <div class="title-terminal">
    <div class="prompt"><span class="prompt-sigil">~/archmage $</span> ./run</div>
    <span class="name-row">
      <span class="name">ARCHMAGE</span><span class="cursor">_</span>
    </span>
    <div class="subtitle">Wave Survival · Mage Arena · 20 Waves</div>
    <button class="btn-primary" id="btn-start">[ ENTER THE ARENA ]</button>
  </div>
</div>

<!-- ── CHARACTER SELECT ─────────────────── -->
<div id="screen-charselect" class="screen hidden">
  <div class="charselect-title">CHOOSE YOUR MAGE</div>
  <div class="charselect-prompt">SELECT AN ARCHETYPE TO BEGIN</div>
  <div class="char-cards" id="char-cards"></div>
  <button class="btn-primary charselect-btn" id="btn-play" style="max-width:320px;opacity:0;pointer-events:none">[ BEGIN RITUAL ]</button>
</div>

<!-- ── SPEED BAR ─────────────────────────── -->
<div id="speed-bar">
  <button class="speed-btn active" data-speed="1">1×</button>
  <button class="speed-btn" data-speed="1.2">1.2×</button>
  <button class="speed-btn" data-speed="1.5">1.5×</button>
  <button class="speed-btn" data-speed="2">2×</button>
  <button class="speed-btn" data-speed="2.5">2.5×</button>
</div>

<!-- ── GAME CANVAS ──────────────────────── -->
<canvas id="game-canvas"></canvas>

<!-- ── LEVEL UP SCREEN ──────────────────── -->
<div id="screen-levelup" class="screen hidden">
  <div class="levelup-header">
    <div class="levelup-title">LEVEL UP</div>
    <div class="levelup-sub" id="levelup-sub">CHOOSE AN ENHANCEMENT</div>
  </div>
  <div class="upgrade-cards" id="upgrade-cards"></div>
  <div class="reroll-row">
    <button class="btn-reroll" id="btn-reroll">↺ REROLL <span id="reroll-count">(3)</span></button>
  </div>
</div>

<!-- ── WAVE BANNER ──────────────────────── -->
<div id="wave-banner">
  <div class="wave-banner-title" id="wave-banner-title">WAVE 1</div>
  <div class="wave-banner-sub" id="wave-banner-sub">SURVIVE</div>
</div>

<!-- ── PAUSE OVERLAY ────────────────────── -->
<div id="pause-overlay">
  <div class="pause-text">[ PAUSED ]</div>
</div>

<!-- ── GAME OVER ────────────────────────── -->
<div id="screen-gameover" class="screen hidden">
  <div class="endgame-terminal">
    <div class="endgame-title over">SLAIN</div>
    <div class="endgame-sub">THE DARKNESS PREVAILS</div>
    <div class="endgame-stats" id="gameover-stats"></div>
    <button class="btn-primary" id="btn-restart-over" style="opacity:1;animation:none">[ RISE AGAIN ]</button>
  </div>
</div>

<!-- ── VICTORY ──────────────────────────── -->
<div id="screen-victory" class="screen hidden">
  <div class="endgame-terminal">
    <div class="endgame-title victory">VICTORY</div>
    <div class="endgame-sub">THE DRAGON FALLS. YOU ARE ARCHMAGE.</div>
    <div class="endgame-stats" id="victory-stats"></div>
    <button class="btn-primary" id="btn-restart-vic" style="opacity:1;animation:none">[ PLAY AGAIN ]</button>
  </div>
</div>

<!-- Game content: characters, weapons, monsters, waves, passives -->
<script src="data.js"></script>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
// ARCHMAGE — Full Game Implementation
// Game content (characters, weapons, monsters) lives in data.js
// ═══════════════════════════════════════════════════════════════

// ── UTILITY ───────────────────────────────────────────────────

function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function lerp(a, b, t) { return a + (b - a) * t; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rndInt(0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let _eid = 0;
function mkId() { return ++_eid; }

// ── CANVAS SETUP ──────────────────────────────────────────────

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── INPUT ─────────────────────────────────────────────────────

const Input = {
  keys: {},
  mouseX: 0,   // screen coords
  mouseY: 0,
  autoAim: true,
  init() {
    window.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (e.code === 'Escape') Game.togglePause();
      if (e.code === 'KeyV' && Game.phase === 'playing') {
        this.autoAim = !this.autoAim;
      }
    });
    window.addEventListener('keyup', e => { this.keys[e.code] = false; });
    window.addEventListener('mousemove', e => {
      this.mouseX = e.clientX;
      this.mouseY = e.clientY;
    });
  },

  isDown(code) { return !!this.keys[code]; },
  mouseWorld() { return Camera.toWorld(this.mouseX, this.mouseY); }
};

// ── SPRITE SHEET ─────────────────────────────────────────────

const SpriteSheet = {
  img: new Image(),
  ready: false,
  load() {
    this.img.onload  = () => { this.ready = true; };
    this.img.onerror = () => { /* falls back to emoji silently */ };
    this.img.src = 'sprites.png';
  }
};

// Sprite source rects per character per direction {x, y, w, h}
const SPRITES = {
  ember_adept: {
    up:    { x: 218, y: 39,   w: 94,  h: 84 },
    right: { x: 217, y: 134,  w: 90,  h: 71 },
    down:  { x: 218, y: 216,  w: 92,  h: 74 },
    left:  { x: 211, y: 301,  w: 86,  h: 74 },
  },
  frost_seer: {
    up:    { x: 213, y: 446,  w: 102, h: 90 },
    right: { x: 219, y: 544,  w: 101, h: 75 },
    down:  { x: 219, y: 631,  w: 100, h: 80 },
    left:  { x: 200, y: 718,  w: 91,  h: 75 },
  },
  storm_caller: {
    up:    { x: 200, y: 846,  w: 131, h: 89 },
    right: { x: 211, y: 949,  w: 120, h: 81 },
    down:  { x: 204, y: 1041, w: 127, h: 85 },
    left:  { x: 200, y: 1133, w: 100, h: 77 },
  },
};

// ── CAMERA ────────────────────────────────────────────────────

const Camera = {
  x: 0, y: 0,
  apply(ctx) {
    ctx.save();
    ctx.translate(canvas.width / 2 - this.x, canvas.height / 2 - this.y);
  },
  restore(ctx) { ctx.restore(); },
  follow(target) {
    this.x = clamp(target.x, canvas.width / 2, CONFIG.WORLD_W - canvas.width / 2);
    this.y = clamp(target.y, canvas.height / 2, CONFIG.WORLD_H - canvas.height / 2);
  },
  toWorld(sx, sy) {
    return { x: sx - canvas.width / 2 + this.x, y: sy - canvas.height / 2 + this.y };
  }
};

// ── PARTICLES ─────────────────────────────────────────────────

const Particles = {
  list: [],
  emit(x, y, color, count = 4, speed = 2.5) {
    for (let i = 0; i < count; i++) {
      const a = rnd(0, Math.PI * 2);
      const s = rnd(0.5, speed);
      this.list.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rnd(0.25, 0.55), maxLife: 0, color, r: rnd(1.5, 3.5) });
      this.list[this.list.length - 1].maxLife = this.list[this.list.length - 1].life;
    }
  },
  emitText(x, y, text, color) {
    this.list.push({ x, y, vx: rnd(-0.5, 0.5), vy: -1.5, life: 0.9, maxLife: 0.9, color, text, r: 0 });
  },
  update(dt) {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const p = this.list[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= dt;
      if (p.life <= 0) this.list.splice(i, 1);
    }
  },
  draw(ctx) {
    for (const p of this.list) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      if (p.text) {
        ctx.font = '11px "Share Tech Mono", monospace';
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
};

// ── GROUND EFFECTS ────────────────────────────────────────────

const GroundEffects = {
  list: [],
  add(x, y, radius, type, duration, dps) {
    this.list.push({ x, y, radius, type, duration, dps, timer: 0, maxDuration: duration });
  },
  update(dt, enemies) {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const g = this.list[i];
      g.duration -= dt;
      g.timer += dt;
      if (g.timer >= 0.5) {
        g.timer = 0;
        for (const e of enemies) {
          if (e.dead) continue;
          if (dist(e.x, e.y, g.x, g.y) < g.radius + e.radius) {
            e.hp -= g.dps * 0.5;
            if (e.hp <= 0) killEnemy(e);
          }
        }
      }
      if (g.duration <= 0) this.list.splice(i, 1);
    }
  },
  draw(ctx) {
    for (const g of this.list) {
      const alpha = 0.35 * (g.duration / g.maxDuration);
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.radius, 0, Math.PI * 2);
      ctx.fillStyle = g.type === 'burn' ? '#ff6600' : '#aa00ff';
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
};

// ── PLAYER ────────────────────────────────────────────────────

const Player = {
  x: CONFIG.WORLD_W / 2,
  y: CONFIG.WORLD_H / 2,
  radius: 16,
  health: 0,
  maxHealth: 0,
  speed: 0,
  armor: 0,
  level: 1,
  xp: 0,
  xpToNext: 0,
  weapons: [],       // { weaponId, cooldownRemaining, computedStats, appliedUpgrades }
  passivesApplied: [],
  kills: 0,
  globalCDMultiplier: 1,
  charConfig: null,
  flashTimer: 0,
  iFrameTimer: 0,    // invincibility frames after taking damage
  contactTimers: {}, // tracks contact damage per enemy

  init(charConfig) {
    this.charConfig = charConfig;
    this.x = CONFIG.WORLD_W / 2;
    this.y = CONFIG.WORLD_H / 2;
    this.health = charConfig.health;
    this.maxHealth = charConfig.health;
    this.speed = charConfig.speed;
    this.armor = charConfig.armor;
    this.level = 1;
    this.xp = 0;
    this.xpToNext = this.calcXpToNext(1);
    this.kills = 0;
    this.globalCDMultiplier = 1;
    this.globalRangeMultiplier = 1;
    this.passivesApplied = [];
    this.flashTimer = 0;
    this.glowPulse = 0;
    this.iFrameTimer = 0;
    this.contactTimers = {};
    this.facing = 'down';
    const startWeapon = CONFIG.weapons.find(w => w.id === charConfig.startingWeapon);
    this.weapons = [this.makeWeaponInstance(startWeapon)];
  },

  makeWeaponInstance(wConfig) {
    return {
      weaponId: wConfig.id,
      cooldownRemaining: 0,
      appliedUpgrades: [],
      computedStats: this.computeWeaponStats(wConfig, [])
    };
  },

  computeWeaponStats(wConfig, appliedUpgrades) {
    const s = {
      damage: wConfig.damage,
      cooldown: wConfig.cooldown,
      projectileSpeed: wConfig.projectileSpeed,
      armorPenetration: wConfig.armorPenetration,
      pierce: wConfig.pierce,
      bounce: wConfig.bounce,
      range: wConfig.range,
      chainCount: wConfig.chainCount || 0,
      chainRange: wConfig.chainRange || 0,
      areaRadius: wConfig.areaRadius || 0,
      statusEffect: wConfig.statusEffect ? { ...wConfig.statusEffect } : null,
      splitProjectiles: 0,
      splitDamageMultiplier: 0,
      projectileCount: wConfig.projectileCount || 1,
      radialCount: wConfig.radialCount || 0,
      damagePerBounce: 1,
      pullRadius: 0,
      pullStrength: 0,
      finalHitDamageMultiplier: 1,
      finalHitStun: 0,
      followupMeteors: 0,
      followupDamageMultiplier: 0,
      groundEffect: null,
      areaDamageMultiplier: 0.5,
    };
    for (const uid of appliedUpgrades) {
      const upg = wConfig.upgrades.find(u => u.id === uid);
      if (!upg) continue;
      const c = upg.changes;
      if (c.damageMultiplier) s.damage = Math.round(s.damage * c.damageMultiplier);
      if (c.projectileSpeedMultiplier) s.projectileSpeed *= c.projectileSpeedMultiplier;
      if (c.cooldownMultiplier) s.cooldown *= c.cooldownMultiplier;
      if (c.areaRadiusMultiplier) s.areaRadius *= c.areaRadiusMultiplier;
      if (c.pierce != null) s.pierce += c.pierce;
      if (c.bounce != null) s.bounce += c.bounce;
      if (c.armorPenetration != null) s.armorPenetration += c.armorPenetration;
      if (c.chainCount != null) s.chainCount += c.chainCount;
      if (c.statusEffect) s.statusEffect = { ...c.statusEffect };
      if (c.areaRadius != null) s.areaRadius = c.areaRadius;
      if (c.areaDamageMultiplier != null) s.areaDamageMultiplier = c.areaDamageMultiplier;
      if (c.splitProjectiles != null) s.splitProjectiles = c.splitProjectiles;
      if (c.splitDamageMultiplier != null) s.splitDamageMultiplier = c.splitDamageMultiplier;
      if (c.projectileCount != null) s.projectileCount += c.projectileCount;
      if (c.radialCount != null) s.radialCount += c.radialCount;
      if (c.damagePerBounce != null) s.damagePerBounce = c.damagePerBounce;
      if (c.pullRadius != null) s.pullRadius = c.pullRadius;
      if (c.pullStrength != null) s.pullStrength = c.pullStrength;
      if (c.finalHitDamageMultiplier != null) s.finalHitDamageMultiplier = c.finalHitDamageMultiplier;
      if (c.finalHitStun != null) s.finalHitStun = c.finalHitStun;
      if (c.followupMeteors != null) s.followupMeteors = c.followupMeteors;
      if (c.followupDamageMultiplier != null) s.followupDamageMultiplier = c.followupDamageMultiplier;
      if (c.groundEffect != null) s.groundEffect = { ...c.groundEffect };
      if (c.rangeMultiplier != null) s.range *= c.rangeMultiplier;
    }
    // Global range multiplier from passive
    s.range *= (this.globalRangeMultiplier || 1);
    // Character bonus
    if (this.charConfig) {
      const b = this.charConfig.bonus;
      if (b.fireDamageMultiplier && (wConfig.id === 'firebolt' || wConfig.id === 'meteor_sigil')) {
        s.damage = Math.round(s.damage * b.fireDamageMultiplier);
      }
    }
    return s;
  },

  recomputeWeapon(wi) {
    const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
    wi.computedStats = this.computeWeaponStats(wConfig, wi.appliedUpgrades);
  },

  calcXpToNext(level) {
    return Math.floor(20 + level * 12 + Math.pow(level, 1.4) * 4);
  },

  addXp(amount) {
    this.xp += amount;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.xpToNext = this.calcXpToNext(this.level);
      Game.triggerLevelUp();
    }
  },

  hasWeapon(id) { return this.weapons.some(w => w.weaponId === id); },
  hasUpgrade(weaponId, upgradeId) {
    const w = this.weapons.find(wi => wi.weaponId === weaponId);
    return w ? w.appliedUpgrades.includes(upgradeId) : false;
  },

  addWeapon(weaponId) {
    const wConfig = CONFIG.weapons.find(w => w.id === weaponId);
    if (!wConfig) return;
    this.weapons.push(this.makeWeaponInstance(wConfig));
  },

  applyUpgrade(weaponId, upgradeId) {
    const wi = this.weapons.find(w => w.weaponId === weaponId);
    if (!wi) return;
    wi.appliedUpgrades.push(upgradeId);
    this.recomputeWeapon(wi);
  },

  update(dt, enemies) {
    // Movement + direction tracking (keyboard + touch joystick combined)
    const goUp    = Input.isDown('KeyW') || Input.isDown('ArrowUp');
    const goDown  = Input.isDown('KeyS') || Input.isDown('ArrowDown');
    const goLeft  = Input.isDown('KeyA') || Input.isDown('ArrowLeft');
    const goRight = Input.isDown('KeyD') || Input.isDown('ArrowRight');
    let dx = (goRight ? 1 : 0) - (goLeft ? 1 : 0);
    let dy = (goDown  ? 1 : 0) - (goUp   ? 1 : 0);
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    this.x = clamp(this.x + dx * this.speed, this.radius, CONFIG.WORLD_W - this.radius);
    this.y = clamp(this.y + dy * this.speed, this.radius, CONFIG.WORLD_H - this.radius);

    // Facing direction (vertical takes priority in diagonals)
    if (goUp   && !goDown)  this.facing = 'up';
    else if (goDown  && !goUp)   this.facing = 'down';
    else if (goLeft  && !goRight) this.facing = 'left';
    else if (goRight && !goLeft)  this.facing = 'right';

    // Flash
    if (this.flashTimer > 0) this.flashTimer -= dt;
    if (this.iFrameTimer > 0) this.iFrameTimer -= dt;

    // Contact damage
    for (const e of enemies) {
      if (e.dead) continue;
      const d = dist(this.x, this.y, e.x, e.y);
      if (d < this.radius + e.radius) {
        const key = e.id;
        if (!this.contactTimers[key]) this.contactTimers[key] = 0;
        this.contactTimers[key] += dt;
        if (this.contactTimers[key] >= CONFIG.CONTACT_DAMAGE_INTERVAL) {
          this.contactTimers[key] = 0;
          if (this.iFrameTimer <= 0) {
            const dmg = Math.max(1, e.strength - this.armor);
            this.health -= dmg;
            this.flashTimer = 0.15;
            Particles.emit(this.x, this.y, '#ff4136', 6, 3);
            if (this.health <= 0) Game.gameOver();
          }
        }
      } else {
        this.contactTimers[e.id] = 0;
      }
    }

    // Weapon cooldowns and firing
    const cdMult = this.globalCDMultiplier * (this.charConfig.bonus.cooldownMultiplier || 1);
    for (const wi of this.weapons) {
      if (wi.cooldownRemaining > 0) {
        wi.cooldownRemaining -= dt;
        continue;
      }
      const fired = WeaponSystem.fire(wi, this, enemies);
      if (fired) {
        wi.cooldownRemaining = wi.computedStats.cooldown * cdMult;
      }
    }
  },

  draw(ctx) {
    this.glowPulse = (this.glowPulse || 0) + 0.04;
    const pulse = Math.sin(this.glowPulse) * 0.5 + 0.5; // 0..1

    // Outer ambient halo (large, faint, pulsing)
    const haloR = this.radius + 18 + pulse * 8;
    const halo = ctx.createRadialGradient(this.x, this.y, this.radius, this.x, this.y, haloR);
    halo.addColorStop(0, `rgba(0,255,65,${0.18 + pulse * 0.12})`);
    halo.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, haloR, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    // Inner rim glow
    const rimR = this.radius + 5 + pulse * 3;
    const rim = ctx.createRadialGradient(this.x, this.y, this.radius - 2, this.x, this.y, rimR);
    rim.addColorStop(0, `rgba(0,255,65,${0.35 + pulse * 0.2})`);
    rim.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, rimR, 0, Math.PI * 2);
    ctx.fillStyle = rim;
    ctx.fill();

    if (SpriteSheet.ready) {
      const spr = SPRITES[this.charConfig.id][this.facing];
      const dh = this.radius * 3.2;
      const dw = dh * (spr.w / spr.h);
      const dx = this.x - dw / 2;
      const dy = this.y - dh * 0.72;  // anchor toward feet

      if (this.flashTimer > 0) {
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.filter = 'brightness(3) saturate(0) sepia(1) hue-rotate(320deg)';
      }
      ctx.drawImage(SpriteSheet.img, spr.x, spr.y, spr.w, spr.h, dx, dy, dw, dh);
      if (this.flashTimer > 0) { ctx.restore(); }
    } else {
      // Fallback: coloured circle + emoji
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.flashTimer > 0 ? '#ff4136' : '#001a06';
      ctx.fill();
      ctx.strokeStyle = this.flashTimer > 0 ? '#ff4136' : `rgba(0,255,65,${0.7 + pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = `${this.radius * 1.3}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.charConfig.icon, this.x, this.y);
    }
  }
};

// ── WEAPON SYSTEM ─────────────────────────────────────────────

const WeaponSystem = {
  fire(wi, player, enemies) {
    const s = wi.computedStats;
    const alive = enemies.filter(e => !e.dead);

    // Radial: always fires a ring in all directions regardless of aim mode
    if (s.targeting === 'radial') {
      const count = s.radialCount || 8;
      for (let i = 0; i < count; i++) {
        this.spawnProjectile(player, (Math.PI * 2 / count) * i, wi, s, null);
      }
      return true;
    }

    // Mouse-aim mode: fire toward cursor regardless of enemy presence
    if (!Input.autoAim) {
      const mw = Input.mouseWorld();
      const angle = Math.atan2(mw.y - player.y, mw.x - player.x);
      for (let t = 0; t < s.projectileCount; t++) {
        const spread = s.projectileCount > 1 ? (t - (s.projectileCount - 1) / 2) * 0.18 : 0;
        this.spawnProjectile(player, angle + spread, wi, s, null);
      }
      return true;
    }

    if (alive.length === 0) return false;
    let targets = this.selectTargets(wi.weaponId, s, player, alive);
    if (!targets || targets.length === 0) return false;

    for (let t = 0; t < s.projectileCount; t++) {
      const tgt = targets[t % targets.length];
      const baseAngle = Math.atan2(tgt.y - player.y, tgt.x - player.x);
      const spread = s.projectileCount > 1 ? (t - (s.projectileCount - 1) / 2) * 0.18 : 0;
      this.spawnProjectile(player, baseAngle + spread, wi, s, tgt);
    }
    return true;
  },

  selectTargets(weaponId, s, player, alive) {
    if (alive.length === 0) return null;
    switch (s.targeting) {
      case 'nearest': {
        let best = null, bestD = Infinity;
        for (const e of alive) {
          const d = dist(player.x, player.y, e.x, e.y);
          if (d < s.range && d < bestD) { bestD = d; best = e; }
        }
        return best ? [best] : null;
      }
      case 'random': {
        const inRange = alive.filter(e => dist(player.x, player.y, e.x, e.y) < s.range);
        if (inRange.length === 0) return null;
        return [inRange[rndInt(0, inRange.length - 1)]];
      }
      case 'highestThreat': {
        let best = null, bestHP = -1;
        for (const e of alive) {
          if (dist(player.x, player.y, e.x, e.y) < s.range && e.hp > bestHP) {
            bestHP = e.hp; best = e;
          }
        }
        return best ? [best] : null;
      }
      default:
        return [alive[0]];
    }
  },

  spawnProjectile(player, angle, wi, s, target) {
    Projectiles.push({
      id: mkId(),
      x: player.x,
      y: player.y,
      vx: Math.cos(angle) * s.projectileSpeed,
      vy: Math.sin(angle) * s.projectileSpeed,
      damage: s.damage,
      armorPen: s.armorPenetration,
      pierce: s.pierce,
      pierceLeft: s.pierce,
      bounce: s.bounce,
      bounceLeft: s.bounce,
      bounceCount: 0,
      range: s.range,
      traveledSq: 0,
      chainCount: s.chainCount,
      chainRange: s.chainRange,
      areaRadius: s.areaRadius,
      areaDamageMultiplier: s.areaDamageMultiplier,
      pullRadius: s.pullRadius || 0,
      pullStrength: s.pullStrength || 0,
      weaponId: wi.weaponId,
      statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
      hitIds: new Set(),
      dead: false,
      icon: CONFIG.weapons.find(w => w.id === wi.weaponId).icon,
      splitProjectiles: s.splitProjectiles || 0,
      splitDamageMultiplier: s.splitDamageMultiplier || 0,
      damagePerBounce: s.damagePerBounce || 1,
      finalHitDamageMultiplier: s.finalHitDamageMultiplier || 1,
      finalHitStun: s.finalHitStun || 0,
      groundEffect: s.groundEffect || null,
      followupMeteors: s.followupMeteors || 0,
      followupDamageMultiplier: s.followupDamageMultiplier || 0,
      isMeteor: wi.weaponId === 'meteor_sigil',
      targetEnemy: target,
      targetX: target ? target.x : player.x,
      targetY: target ? target.y : player.y,
    });
  }
};

// ── PROJECTILES ───────────────────────────────────────────────

let Projectiles = [];

function updateProjectiles(dt, enemies) {
  const toAdd = [];

  for (let i = Projectiles.length - 1; i >= 0; i--) {
    const p = Projectiles[i];
    if (p.dead) { Projectiles.splice(i, 1); continue; }

    // Pull effect
    if (p.pullRadius > 0) {
      for (const e of enemies) {
        if (e.dead) continue;
        const d = dist(p.x, p.y, e.x, e.y);
        if (d < p.pullRadius && d > 1) {
          const pull = p.pullStrength;
          e.x += ((p.x - e.x) / d) * pull;
          e.y += ((p.y - e.y) / d) * pull;
        }
      }
    }

    // Meteor homing phase — track target X/Y
    if (p.isMeteor && p.targetEnemy && !p.targetEnemy.dead) {
      p.targetX = p.targetEnemy.x;
      p.targetY = p.targetEnemy.y;
    }

    p.x += p.vx;
    p.y += p.vy;
    const dx2 = p.vx * p.vx + p.vy * p.vy;
    p.traveledSq += dx2;

    // World bounds / bounce
    let bounced = false;
    if (p.x < 0 || p.x > CONFIG.WORLD_W) {
      p.vx = -p.vx; p.x = clamp(p.x, 0, CONFIG.WORLD_W); bounced = true;
    }
    if (p.y < 0 || p.y > CONFIG.WORLD_H) {
      p.vy = -p.vy; p.y = clamp(p.y, 0, CONFIG.WORLD_H); bounced = true;
    }
    if (bounced) {
      p.bounceCount++;
      p.damage = Math.round(p.damage * p.damagePerBounce);
      if (p.bounceLeft > 0) { p.bounceLeft--; }
      else { p.dead = true; continue; }
    }

    // Range check
    if (p.traveledSq > p.range * p.range && !p.isMeteor) {
      p.dead = true; continue;
    }

    // Collision with enemies
    for (const e of enemies) {
      if (e.dead || p.hitIds.has(e.id)) continue;
      if (dist(p.x, p.y, e.x, e.y) < e.radius + 8) {
        p.hitIds.add(e.id);

        // Damage
        let dmg = p.damage;
        const chainIdx = (p.chainCount - (p.chainCount)) ; // resolved per-chain
        applyDamage(e, dmg, p.armorPen, p.statusEffect, p.finalHitStun && p.chainCount === 0 ? p.finalHitStun : 0);

        // Area damage
        if (p.areaRadius > 0) {
          for (const e2 of enemies) {
            if (e2.dead || e2.id === e.id) continue;
            if (dist(p.x, p.y, e2.x, e2.y) < p.areaRadius + e2.radius) {
              applyDamage(e2, Math.round(p.damage * p.areaDamageMultiplier), p.armorPen, null, 0);
            }
          }
          Particles.emit(p.x, p.y, '#ff6600', 12, 5);
          if (p.groundEffect) {
            GroundEffects.add(p.x, p.y, p.areaRadius, p.groundEffect.type, p.groundEffect.duration, p.groundEffect.dps);
          }
          // Followup meteors
          if (p.followupMeteors > 0) {
            for (let fm = 0; fm < p.followupMeteors; fm++) {
              const randomEnemy = enemies.filter(e => !e.dead)[rndInt(0, enemies.filter(e => !e.dead).length - 1)];
              if (randomEnemy) {
                const angle = Math.atan2(randomEnemy.y - p.y, randomEnemy.x - p.x);
                toAdd.push({
                  id: mkId(), x: p.x, y: p.y,
                  vx: Math.cos(angle) * 18, vy: Math.sin(angle) * 18,
                  damage: Math.round(p.damage * p.followupDamageMultiplier),
                  armorPen: p.armorPen, pierce: 10, pierceLeft: 10, bounce: 0, bounceLeft: 0, bounceCount: 0,
                  range: 900, traveledSq: 0, chainCount: 0, chainRange: 0,
                  areaRadius: p.areaRadius * 0.6, areaDamageMultiplier: 0.4,
                  pullRadius: 0, pullStrength: 0, weaponId: 'meteor_sigil',
                  statusEffect: null, hitIds: new Set(), dead: false, icon: '☄️',
                  splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
                  finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
                  followupMeteors: 0, followupDamageMultiplier: 0,
                  isMeteor: true, targetEnemy: randomEnemy, targetX: randomEnemy.x, targetY: randomEnemy.y
                });
              }
            }
          }
        }

        // Split projectiles
        if (p.splitProjectiles > 0 && !e.dead) {
          for (let s = 0; s < p.splitProjectiles; s++) {
            const sa = Math.atan2(p.vy, p.vx) + rnd(-Math.PI / 2, Math.PI / 2);
            const sp = Math.hypot(p.vx, p.vy);
            toAdd.push({
              ...JSON.parse(JSON.stringify(p)),
              id: mkId(),
              vx: Math.cos(sa) * sp, vy: Math.sin(sa) * sp,
              damage: Math.round(p.damage * p.splitDamageMultiplier),
              traveledSq: 0, hitIds: new Set([e.id]), dead: false,
              splitProjectiles: 0, pierce: 0, pierceLeft: 0
            });
          }
        }

        // Chain lightning
        if (p.chainCount > 0) {
          const nextTargets = enemies.filter(e2 => !e2.dead && e2.id !== e.id && !p.hitIds.has(e2.id) && dist(e.x, e.y, e2.x, e2.y) < p.chainRange);
          nextTargets.sort((a, b) => dist(e.x, e.y, a.x, a.y) - dist(e.x, e.y, b.x, b.y));
          if (nextTargets.length > 0) {
            const nt = nextTargets[0];
            const ca = Math.atan2(nt.y - p.x, nt.x - p.x);
            const newChain = {
              ...p, id: mkId(), x: e.x, y: e.y,
              vx: Math.cos(Math.atan2(nt.y - e.y, nt.x - e.x)) * Math.hypot(p.vx, p.vy),
              vy: Math.sin(Math.atan2(nt.y - e.y, nt.x - e.x)) * Math.hypot(p.vx, p.vy),
              chainCount: p.chainCount - 1,
              hitIds: new Set(p.hitIds),
              traveledSq: 0, dead: false
            };
            // Final chain stun
            if (p.chainCount === 1 && p.finalHitDamageMultiplier > 1) {
              newChain.damage = Math.round(newChain.damage * p.finalHitDamageMultiplier);
              if (p.finalHitStun > 0) {
                applyStatusEffect(nt, { type: 'stun', duration: p.finalHitStun });
              }
            }
            toAdd.push(newChain);
          }
          p.dead = true;
          continue;
        }

        // Pierce
        if (p.pierceLeft > 0) { p.pierceLeft--; }
        else { p.dead = true; }
      }
    }

    // Meteor auto-arrival
    if (p.isMeteor) {
      const d = dist(p.x, p.y, p.targetX, p.targetY);
      if (d < 10) {
        p.dead = true;
        Particles.emit(p.targetX, p.targetY, '#ff6600', 20, 8);
        // Area damage at target
        if (p.areaRadius > 0) {
          for (const e of enemies) {
            if (e.dead) continue;
            if (dist(p.targetX, p.targetY, e.x, e.y) < p.areaRadius + e.radius) {
              applyDamage(e, p.damage, p.armorPen, null, 0);
            }
          }
          if (p.groundEffect) {
            GroundEffects.add(p.targetX, p.targetY, p.areaRadius, p.groundEffect.type, p.groundEffect.duration, p.groundEffect.dps);
          }
        }
      } else {
        // Steer toward target
        const tx = p.targetX - p.x, ty = p.targetY - p.y;
        const len = Math.hypot(tx, ty);
        const sp = Math.hypot(p.vx, p.vy);
        p.vx = (tx / len) * sp;
        p.vy = (ty / len) * sp;
      }
    }
  }

  for (const p of toAdd) Projectiles.push(p);
}

// ── DAMAGE HELPERS ────────────────────────────────────────────

function applyDamage(enemy, damage, armorPen, statusEffect, stunDuration) {
  if (enemy.dead) return;
  const effArmor = Math.max(0, enemy.armor - (armorPen || 0));
  const finalDmg = Math.max(1, damage - effArmor);
  enemy.hp -= finalDmg;
  enemy.flashTimer = 0.1;
  Particles.emitText(enemy.x, enemy.y - enemy.radius, `-${finalDmg}`, '#00ff41');
  Particles.emit(enemy.x, enemy.y, '#00ff41', 3, 2.5);
  if (statusEffect) applyStatusEffect(enemy, statusEffect);
  if (stunDuration > 0) applyStatusEffect(enemy, { type: 'stun', duration: stunDuration });
  if (enemy.hp <= 0) killEnemy(enemy);
}

function applyStatusEffect(enemy, effect) {
  const existing = enemy.statusEffects.find(s => s.type === effect.type);
  if (existing) { existing.remaining = Math.max(existing.remaining, effect.duration); }
  else { enemy.statusEffects.push({ type: effect.type, remaining: effect.duration, amount: effect.amount || 0 }); }
}

function killEnemy(enemy) {
  if (enemy.dead) return;
  enemy.dead = true;
  Player.kills++;
  Player.addXp(Math.round(enemy.xp * (1 + Game.wave * 0.05)));
  Particles.emit(enemy.x, enemy.y, '#00ff41', 8, 3.5);
  if (enemy.configId === 'dragon_boss') Game.victory();
}

// ── ENEMIES ───────────────────────────────────────────────────

let Enemies = [];

function spawnEnemy(configId, waveNum) {
  const cfg = CONFIG.monsters.find(m => m.id === configId);
  if (!cfg) return;
  const hpMult = 1 + waveNum * 0.12;
  const strMult = 1 + waveNum * 0.08;
  // Spawn at edge
  let x, y;
  const side = rndInt(0, 3);
  const margin = 50;
  if (side === 0) { x = rnd(margin, CONFIG.WORLD_W - margin); y = -margin; }
  else if (side === 1) { x = CONFIG.WORLD_W + margin; y = rnd(margin, CONFIG.WORLD_H - margin); }
  else if (side === 2) { x = rnd(margin, CONFIG.WORLD_W - margin); y = CONFIG.WORLD_H + margin; }
  else { x = -margin; y = rnd(margin, CONFIG.WORLD_H - margin); }

  const hp = Math.ceil(cfg.health * hpMult);
  Enemies.push({
    id: mkId(),
    configId: cfg.id,
    name: cfg.name,
    icon: cfg.icon,
    x, y,
    hp,
    maxHp: hp,
    speed: cfg.speed,
    armor: cfg.armor,
    strength: Math.round(cfg.strength * strMult),
    xp: cfg.xp,
    radius: cfg.radius,
    abilities: cfg.abilities,
    statusEffects: [],
    dead: false,
    flashTimer: 0,
    fireBreathTimer: rnd(3, 6),
    chargeTimer: rnd(4, 8),
    chargeVx: 0, chargeVy: 0, chargeActive: false, chargeRemaining: 0,
    regenTimer: 0,
    rangedTimer: rnd(2, 4),
  });
}

function updateEnemies(dt) {
  for (const e of Enemies) {
    if (e.dead) continue;

    // Status effects
    for (let i = e.statusEffects.length - 1; i >= 0; i--) {
      const se = e.statusEffects[i];
      se.remaining -= dt;
      if (se.type === 'poison') {
        se.poisonTimer = (se.poisonTimer || 0) + dt;
        if (se.poisonTimer >= 0.5) {
          se.poisonTimer -= 0.5;
          e.hp -= se.amount * 0.5;
          e.flashTimer = 0.1;
          Particles.emit(e.x, e.y, '#88ff44', 2, 1.5);
          if (e.hp <= 0) { killEnemy(e); break; }
        }
      }
      if (se.remaining <= 0) e.statusEffects.splice(i, 1);
    }
    const stunned = e.statusEffects.some(s => s.type === 'stun');
    const slowEffect = e.statusEffects.find(s => s.type === 'slow');
    const slowMult = slowEffect ? (1 - slowEffect.amount * (Player.charConfig.bonus.slowDurationMultiplier ? 1 : 1)) : 1;

    if (e.flashTimer > 0) e.flashTimer -= dt;

    if (stunned) continue;

    // Regeneration
    if (e.abilities.includes('regeneration')) {
      e.regenTimer += dt;
      if (e.regenTimer >= 1) { e.regenTimer = 0; e.hp = Math.min(e.hp + 4, e.maxHp); }
    }

    // Charge ability
    if (e.abilities.includes('charge')) {
      e.chargeTimer -= dt;
      if (e.chargeActive) {
        e.x += e.chargeVx;
        e.y += e.chargeVy;
        e.chargeRemaining -= dt;
        if (e.chargeRemaining <= 0) { e.chargeActive = false; e.chargeTimer = rnd(3, 6); }
      } else if (e.chargeTimer <= 0) {
        const dx = Player.x - e.x, dy = Player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        const spd = e.speed * 5;
        e.chargeVx = (dx / len) * spd;
        e.chargeVy = (dy / len) * spd;
        e.chargeActive = true;
        e.chargeRemaining = 0.3;
      }
    }

    // Ranged attack (beholderkin fires projectile toward player)
    if (e.abilities.includes('ranged')) {
      e.rangedTimer -= dt;
      if (e.rangedTimer <= 0) {
        e.rangedTimer = rnd(2.5, 4.5);
        const dx = Player.x - e.x, dy = Player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        const spd = 5;
        Projectiles.push({
          id: mkId(), x: e.x, y: e.y,
          vx: (dx / len) * spd, vy: (dy / len) * spd,
          damage: e.strength, armorPen: 1, pierce: 0, pierceLeft: 0,
          bounce: 0, bounceLeft: 0, bounceCount: 0, range: 400, traveledSq: 0,
          chainCount: 0, chainRange: 0, areaRadius: 0, areaDamageMultiplier: 0,
          pullRadius: 0, pullStrength: 0, weaponId: 'enemy_ranged',
          statusEffect: null, hitIds: new Set([e.id]), dead: false, icon: '👁️',
          splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
          finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
          followupMeteors: 0, followupDamageMultiplier: 0,
          isMeteor: false, isEnemyProjectile: true,
          targetX: Player.x, targetY: Player.y
        });
      }
    }

    // Fire breath (dragon) - aimed cone
    if (e.abilities.includes('fireBreath')) {
      e.fireBreathTimer -= dt;
      if (e.fireBreathTimer <= 0) {
        e.fireBreathTimer = rnd(3, 5);
        const dx = Player.x - e.x, dy = Player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        for (let fb = 0; fb < 5; fb++) {
          const angleOffset = rnd(-0.35, 0.35);
          const baseAngle = Math.atan2(dy, dx) + angleOffset;
          Projectiles.push({
            id: mkId(), x: e.x, y: e.y,
            vx: Math.cos(baseAngle) * 8, vy: Math.sin(baseAngle) * 8,
            damage: e.strength * 0.6, armorPen: 3, pierce: 5, pierceLeft: 5,
            bounce: 0, bounceLeft: 0, bounceCount: 0, range: 350, traveledSq: 0,
            chainCount: 0, chainRange: 0, areaRadius: 30, areaDamageMultiplier: 0.3,
            pullRadius: 0, pullStrength: 0, weaponId: 'fire_breath',
            statusEffect: null, hitIds: new Set([e.id]), dead: false, icon: '🔥',
            splitProjectiles: 0, splitDamageMultiplier: 0, damagePerBounce: 1,
            finalHitDamageMultiplier: 1, finalHitStun: 0, groundEffect: null,
            followupMeteors: 0, followupDamageMultiplier: 0,
            isMeteor: false, isEnemyProjectile: true,
            targetX: Player.x, targetY: Player.y
          });
        }
      }
    }

    // Move toward player (if not charging)
    if (!e.chargeActive) {
      const dx = Player.x - e.x, dy = Player.y - e.y;
      const len = Math.hypot(dx, dy) || 1;
      e.x += (dx / len) * e.speed * slowMult;
      e.y += (dy / len) * e.speed * slowMult;
    }
  }

  // Handle enemy projectiles hitting player
  for (let i = Projectiles.length - 1; i >= 0; i--) {
    const p = Projectiles[i];
    if (!p.isEnemyProjectile || p.dead) continue;
    if (dist(p.x, p.y, Player.x, Player.y) < Player.radius + 8) {
      p.dead = true;
      if (Player.iFrameTimer <= 0) {
        const dmg = Math.max(1, p.damage - Player.armor);
        Player.health -= dmg;
        Player.flashTimer = 0.15;
        Player.iFrameTimer = 0.3;
        Particles.emit(Player.x, Player.y, '#ff4136', 6, 3);
        if (Player.health <= 0) Game.gameOver();
      }
    }
  }
}

// ── WAVE SPAWNER ──────────────────────────────────────────────

const WaveSpawner = {
  spawnTimer: 0,
  spawnedCount: 0,
  totalToSpawn: 0,
  spawnInterval: 1.5,
  bossPending: null,
  miniBossPending: null,

  startWave(waveNum) {
    const milestone = CONFIG.waveMilestones[waveNum - 1];
    this.spawnedCount = 0;
    this.totalToSpawn = milestone.monstersTotal;
    // Fit all spawns into the first 35% of the wave
    const spawnWindow = Game.waveDurationFor(waveNum) * 0.35;
    this.spawnInterval = Math.max(0.25, spawnWindow / milestone.monstersTotal);
    this.spawnTimer = 0.3;
    this.bossPending = milestone.boss || null;
    this.miniBossPending = milestone.miniBoss || null;
  },

  update(dt, waveNum) {
    if (this.spawnedCount >= this.totalToSpawn) return;
    // Boss/mini-boss can spawn any time; regular enemies only in first 35% of wave
    const inSpawnWindow = (this.bossPending || this.miniBossPending) ||
                          Game.waveTimer > Game.waveDuration * 0.65;
    if (!inSpawnWindow) return;
    this.spawnTimer -= dt;
    if (this.spawnTimer > 0) return;
    this.spawnTimer = this.spawnInterval;

    // Boss wave
    if (this.bossPending) {
      spawnEnemy(this.bossPending, waveNum);
      this.bossPending = null;
      this.spawnedCount++;
      return;
    }
    // Mini-boss
    if (this.miniBossPending) {
      spawnEnemy(this.miniBossPending, waveNum);
      this.miniBossPending = null;
      this.spawnedCount++;
    }

    // Regular enemy from weighted pool
    const pool = CONFIG.monsters.filter(m => m.waveMin <= waveNum && m.spawnWeight > 0);
    if (pool.length === 0) return;
    const totalWeight = pool.reduce((s, m) => s + m.spawnWeight, 0);
    let r = Math.random() * totalWeight;
    for (const m of pool) {
      r -= m.spawnWeight;
      if (r <= 0) { spawnEnemy(m.id, waveNum); break; }
    }
    this.spawnedCount++;
  }
};

// ── LEVEL UP SYSTEM ───────────────────────────────────────────

const LevelSystem = {
  generateChoices() {
    const choices = [];

    // New weapons
    for (const w of CONFIG.weapons) {
      if (!Player.hasWeapon(w.id)) {
        choices.push({ type: 'newWeapon', weaponId: w.id, label: w.name, icon: w.icon, desc: w.description, sub: 'New Spell' });
      }
    }

    // Weapon upgrades
    for (const wi of Player.weapons) {
      const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
      if (!wConfig) continue;
      for (const upg of wConfig.upgrades) {
        if (!wi.appliedUpgrades.includes(upg.id)) {
          choices.push({ type: 'weaponUpgrade', weaponId: wi.weaponId, upgradeId: upg.id, label: upg.name, icon: upg.icon, desc: upg.description, sub: `Upgrade: ${wConfig.name}` });
        }
      }
    }

    // Passives
    for (const p of PASSIVES) {
      if (!Player.passivesApplied.includes(p.id)) {
        choices.push({ type: 'passive', passiveId: p.id, label: p.name, icon: p.icon, desc: p.description, sub: 'Passive' });
      }
    }

    // Shuffle and take 3
    const shuffled = shuffle(choices);
    let picks = shuffled.slice(0, 3);

    // Guarantee at least 1 (infinite passives as fallback if needed)
    if (picks.length === 0) {
      picks = [{ type: 'passive', passiveId: 'heal', label: 'Mending Sigil', icon: '✨', desc: 'Restore 35% of max HP.', sub: 'Passive' }];
    }
    return picks;
  },

  applyChoice(choice) {
    if (choice.type === 'newWeapon') {
      Player.addWeapon(choice.weaponId);
    } else if (choice.type === 'weaponUpgrade') {
      Player.applyUpgrade(choice.weaponId, choice.upgradeId);
    } else if (choice.type === 'passive') {
      const p = PASSIVES.find(p => p.id === choice.passiveId);
      if (p) { p.apply(Player); Player.passivesApplied.push(p.id); }
    }
  }
};

// ── RENDERER ──────────────────────────────────────────────────

const Renderer = {
  drawWorld() {
    // Background
    ctx.fillStyle = '#050905';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    Camera.apply(ctx);

    // World bounds indicator
    ctx.strokeStyle = '#0c2410';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, CONFIG.WORLD_W, CONFIG.WORLD_H);

    // Dot grid
    ctx.fillStyle = 'rgba(0,100,30,0.18)';
    const gridSpacing = 80;
    const startX = Math.floor(Math.max(0, Camera.x - canvas.width / 2) / gridSpacing) * gridSpacing;
    const startY = Math.floor(Math.max(0, Camera.y - canvas.height / 2) / gridSpacing) * gridSpacing;
    for (let gx = startX; gx < Math.min(CONFIG.WORLD_W, Camera.x + canvas.width / 2); gx += gridSpacing) {
      for (let gy = startY; gy < Math.min(CONFIG.WORLD_H, Camera.y + canvas.height / 2); gy += gridSpacing) {
        ctx.beginPath();
        ctx.arc(gx, gy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Ground effects
    GroundEffects.draw(ctx);

    // Enemies
    ctx.font = '24px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const e of Enemies) {
      if (e.dead) continue;
      const isBoss = e.abilities.includes('boss');
      const iconSize = isBoss ? 48 : (e.radius > 18 ? 32 : 24);
      ctx.font = `${iconSize}px serif`;

      // Visibility glow behind the emoji
      const glowR = e.radius * 1.1;
      const glowGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
      glowGrad.addColorStop(0, 'rgba(255,255,200,0.22)');
      glowGrad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(e.x, e.y, glowR, 0, Math.PI * 2);
      ctx.fillStyle = glowGrad;
      ctx.fill();

      if (e.flashTimer > 0) {
        ctx.globalAlpha = 0.6;
        ctx.filter = 'brightness(3) sepia(1) hue-rotate(280deg)';
      } else {
        ctx.filter = 'brightness(1.6)';
      }
      ctx.fillText(e.icon, e.x, e.y);
      ctx.globalAlpha = 1;
      ctx.filter = 'none';

      // Health bar
      const bw = e.radius * 2;
      const bh = 4;
      const bx = e.x - e.radius;
      const by = e.y - e.radius - 10;
      ctx.fillStyle = '#001a06';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = isBoss ? '#ff4136' : '#00cc33';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);

      // Status indicators
      let sxOffset = 0;
      for (const se of e.statusEffects) {
        if (se.type === 'slow') { ctx.font = '10px serif'; ctx.fillText('❄️', e.x - e.radius + sxOffset, e.y - e.radius - 18); sxOffset += 14; }
        if (se.type === 'stun') { ctx.font = '10px serif'; ctx.fillText('⚡', e.x - e.radius + sxOffset, e.y - e.radius - 18); sxOffset += 14; }
        if (se.type === 'poison') { ctx.font = '10px serif'; ctx.fillText('☠️', e.x - e.radius + sxOffset, e.y - e.radius - 18); sxOffset += 14; }
      }
    }

    // Projectiles
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const p of Projectiles) {
      if (p.dead) continue;
      if (p.isEnemyProjectile) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4136';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, 9, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,65,54,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else {
        // Glow behind projectile
        ctx.beginPath();
        ctx.arc(p.x, p.y, 13, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(180,255,200,0.28)';
        ctx.fill();
        ctx.font = '22px serif';
        ctx.filter = 'brightness(2)';
        ctx.fillText(p.icon, p.x, p.y);
        ctx.filter = 'none';
      }
    }

    // Weapon range rings
    if (Game.phase === 'playing') {
      ctx.save();
      ctx.setLineDash([6, 10]);
      ctx.lineWidth = 1;
      const ringColors = ['#00ff41','#00aaff','#ffaa00','#cc44ff','#ff6644'];
      for (let wi = 0; wi < Player.weapons.length; wi++) {
        const w = Player.weapons[wi];
        const r = w.computedStats.range;
        const pulse = Math.sin(Player.glowPulse + wi * 1.2) * 0.5 + 0.5;
        ctx.beginPath();
        ctx.arc(Player.x, Player.y, r, 0, Math.PI * 2);
        ctx.strokeStyle = ringColors[wi % ringColors.length].replace(')', `,${0.10 + pulse * 0.07})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace('rgba(', 'rgba(').replace('00ff41)', '0,255,65,').replace('00aaff)', '0,170,255,').replace('ffaa00)', '255,170,0,').replace('cc44ff)', '204,68,255,').replace('ff6644)', '255,102,68,');
        // simpler approach:
        ctx.strokeStyle = `rgba(0,255,65,${0.10 + pulse * 0.07})`;
        ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.restore();

      // Mouse-aim crosshair in manual mode
      if (!Input.autoAim) {
        const mw = Input.mouseWorld();
        ctx.save();
        ctx.strokeStyle = 'rgba(0,255,65,0.7)';
        ctx.lineWidth = 1;
        const cs = 10;
        ctx.beginPath();
        ctx.moveTo(mw.x - cs, mw.y); ctx.lineTo(mw.x + cs, mw.y);
        ctx.moveTo(mw.x, mw.y - cs); ctx.lineTo(mw.x, mw.y + cs);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(mw.x, mw.y, 5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(0,255,65,0.45)';
        ctx.stroke();
        // Aim line from player to cursor
        ctx.beginPath();
        ctx.moveTo(Player.x, Player.y);
        ctx.lineTo(mw.x, mw.y);
        ctx.setLineDash([4, 8]);
        ctx.strokeStyle = 'rgba(0,255,65,0.15)';
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    // Player
    Player.draw(ctx);

    // Particles
    Particles.draw(ctx);

    Camera.restore(ctx);
  },

  drawHUD() {
    const PAD = 16;
    const W = canvas.width;

    // Top bar background
    ctx.fillStyle = 'rgba(5,9,5,0.75)';
    ctx.fillRect(0, 0, W, 64);
    ctx.strokeStyle = '#0c2410';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 64); ctx.lineTo(W, 64); ctx.stroke();

    // Health bar
    const hbW = Math.min(260, W * 0.35);
    const hbH = 10;
    const hbX = PAD;
    const hbY = PAD + 4;
    ctx.fillStyle = '#001a06';
    ctx.fillRect(hbX, hbY, hbW, hbH);
    const hpPct = Math.max(0, Player.health / Player.maxHealth);
    const hpColor = hpPct > 0.5 ? '#00cc33' : hpPct > 0.25 ? '#aacc00' : '#ff4136';
    ctx.fillStyle = hpColor;
    ctx.fillRect(hbX, hbY, hbW * hpPct, hbH);
    ctx.strokeStyle = '#0c2410';
    ctx.lineWidth = 1;
    ctx.strokeRect(hbX, hbY, hbW, hbH);
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = '#9ed49a';
    ctx.textAlign = 'left';
    ctx.fillText(`HP  ${Math.ceil(Player.health)} / ${Player.maxHealth}`, hbX, hbY - 3);

    // XP bar
    const xbY = hbY + hbH + 8;
    ctx.fillStyle = '#001a06';
    ctx.fillRect(hbX, xbY, hbW, 6);
    ctx.fillStyle = '#00742a';
    ctx.fillRect(hbX, xbY, hbW * (Player.xp / Player.xpToNext), 6);
    ctx.strokeStyle = '#0c2410';
    ctx.strokeRect(hbX, xbY, hbW, 6);
    ctx.font = '9px "Share Tech Mono", monospace';
    ctx.fillStyle = '#00742a';
    ctx.fillText(`LVL ${Player.level}  XP ${Player.xp}/${Player.xpToNext}`, hbX, xbY - 2);

    // Wave / kill info (right side)
    ctx.textAlign = 'right';
    ctx.font = '12px "Share Tech Mono", monospace';
    ctx.fillStyle = '#00742a';
    ctx.fillText(`WAVE ${Game.wave} / 20`, W - PAD, PAD + 12);
    ctx.fillStyle = '#9ed49a';
    ctx.fillText(`KILLS: ${Player.kills}`, W - PAD, PAD + 28);
    if (Game.wavePhase === 'playing') {
      ctx.fillStyle = '#00742a';
      const timeLeft = Math.max(0, Math.ceil(Game.waveTimer));
      if (Game.wave < 20) ctx.fillText(`${timeLeft}s`, W - PAD, PAD + 44);
    }

    // Wave timer countdown bar (below HUD bar)
    if (Game.wave < 20 && Game.wavePhase === 'playing') {
      const wavePct = Math.max(0, Game.waveTimer / Game.waveDuration);
      ctx.fillStyle = 'rgba(0,116,42,0.15)';
      ctx.fillRect(0, 64, W * wavePct, 2);
    }

    // Active weapons (bottom left)
    const wY = canvas.height - 60;
    ctx.textAlign = 'left';
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = '#0c2410';
    let wX = PAD;
    for (const wi of Player.weapons) {
      const wCfg = CONFIG.weapons.find(w => w.id === wi.weaponId);
      if (!wCfg) continue;
      const bw = 48, bh = 48;
      ctx.fillStyle = 'rgba(7,14,8,0.85)';
      ctx.fillRect(wX, wY, bw, bh);
      ctx.strokeStyle = '#0c2410';
      ctx.lineWidth = 1;
      ctx.strokeRect(wX, wY, bw, bh);
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.fillText(wCfg.icon, wX + bw / 2, wY + bh / 2 + 2);
      // Cooldown overlay
      if (wi.cooldownRemaining > 0) {
        const cdPct = wi.cooldownRemaining / wi.computedStats.cooldown;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(wX, wY, bw, bh * cdPct);
      }
      // Upgrade dots
      const upgCount = wi.appliedUpgrades.length;
      for (let u = 0; u < upgCount; u++) {
        ctx.beginPath();
        ctx.arc(wX + 6 + u * 8, wY + bh - 6, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#00ff41';
        ctx.fill();
      }
      wX += bw + 6;
    }

    // Enemy count (bottom center)
    const alive = Enemies.filter(e => !e.dead).length;
    ctx.textAlign = 'center';
    ctx.font = '10px "Share Tech Mono", monospace';
    ctx.fillStyle = '#002d0d';
    ctx.fillText(`ENEMIES: ${alive}`, W / 2, canvas.height - 8);

    // Aim mode indicator (bottom right)
    ctx.textAlign = 'right';
    ctx.font = '10px "Share Tech Mono", monospace';
    if (Input.autoAim) {
      ctx.fillStyle = '#00742a';
      ctx.fillText('[V] AUTO-AIM', W - PAD, canvas.height - 8);
    } else {
      ctx.fillStyle = '#00ff41';
      ctx.fillText('[V] MOUSE-AIM', W - PAD, canvas.height - 8);
    }

    // Armor indicator
    if (Player.armor > 0) {
      ctx.textAlign = 'left';
      ctx.font = '10px "Share Tech Mono", monospace';
      ctx.fillStyle = '#00742a';
      ctx.fillText(`ARM ${Player.armor}`, PAD, hbY + hbH + 22);
    }
  }
};

// ── GAME CONTROLLER ───────────────────────────────────────────

const Game = {
  phase: 'title',          // title | charselect | playing | levelup | gameover | victory
  wavePhase: 'break',      // playing | break
  wave: 1,
  waveTimer: 0,
  waveDuration: 0,         // duration of current wave (grows 10% each wave)
  breakTimer: 0,
  paused: false,
  lastTime: 0,
  pendingLevelUps: 0,
  rerollsLeft: 3,
  selectedChar: null,
  waveDurationFor(w) { return CONFIG.WAVE_DURATION * Math.pow(1.1, w - 1); },
  animFrameId: null,
  firstWave: true,
  speedMultiplier: 1,

  init() {
    Input.init();
    SpriteSheet.load();
    this.setupUI();
  },

  setupUI() {
    document.getElementById('btn-start').addEventListener('click', () => this.showCharSelect());
    document.getElementById('btn-play').addEventListener('click', () => this.startGame());
    document.getElementById('btn-restart-over').addEventListener('click', () => this.restart());
    document.getElementById('btn-restart-vic').addEventListener('click', () => this.restart());

    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        this.speedMultiplier = parseFloat(btn.dataset.speed);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    const dpadMap = [
      { id: 'dpad-up',    code: 'KeyW' },
      { id: 'dpad-down',  code: 'KeyS' },
      { id: 'dpad-left',  code: 'KeyA' },
      { id: 'dpad-right', code: 'KeyD' },
    ];
    dpadMap.forEach(({ id, code }) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', () => {
        const wasActive = !!Input.keys[code];
        // clear all directions
        dpadMap.forEach(({ id: oid, code: oc }) => {
          Input.keys[oc] = false;
          const oel = document.getElementById(oid);
          if (oel) oel.classList.remove('active');
        });
        // toggle this one on unless it was already active
        if (!wasActive) {
          Input.keys[code] = true;
          el.classList.add('active');
        }
      });
    });
  },

  clearDpadToggles() {
    ['KeyW','KeyS','KeyA','KeyD'].forEach(code => { Input.keys[code] = false; });
    ['dpad-up','dpad-down','dpad-left','dpad-right'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('active');
    });
  },

  showCharSelect() {
    document.getElementById('screen-title').classList.add('hidden');
    document.getElementById('screen-charselect').classList.remove('hidden');

    const container = document.getElementById('char-cards');
    container.innerHTML = '';
    for (const char of CONFIG.characters) {
      const card = document.createElement('div');
      card.className = 'char-card';
      const startWeapon = CONFIG.weapons.find(w => w.id === char.startingWeapon);
      card.innerHTML = `
        <span class="char-icon">${char.icon}</span>
        <div class="char-name">${char.name}</div>
        <div class="char-desc">${char.desc}</div>
        <div class="char-stat">HP ${char.health} &middot; SPD ${char.speed} &middot; ARM ${char.armor}</div>
        <div class="char-stat">${startWeapon ? startWeapon.icon + ' ' + startWeapon.name : ''}</div>
      `;
      card.addEventListener('click', () => {
        document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        this.selectedChar = char;
        const btn = document.getElementById('btn-play');
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
      });
      container.appendChild(card);
    }
  },

  startGame() {
    if (!this.selectedChar) return;
    document.getElementById('screen-charselect').classList.add('hidden');
    canvas.classList.add('active');
    document.getElementById('touch-controls').classList.add('tc-visible');
    this.phase = 'playing';
    this.wave = 1;
    this.wavePhase = 'playing';
    this.waveDuration = this.waveDurationFor(1);
    this.waveTimer = this.waveDuration;
    this.paused = false;
    this.pendingLevelUps = 0;
    this.rerollsLeft = 3;
    this.firstWave = true;
    this.speedMultiplier = 1;
    Input.autoAim = true;

    // Reset speed bar to 1×
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.speed-btn[data-speed="1"]').classList.add('active');
    document.getElementById('speed-bar').classList.add('visible');

    Enemies = [];
    Projectiles = [];
    Particles.list = [];
    GroundEffects.list = [];

    Player.init(this.selectedChar);
    Camera.follow(Player);
    WaveSpawner.startWave(this.wave);
    this.showWaveBanner(this.wave);
    this.lastTime = performance.now();
    this.loop(performance.now());
  },

  loop(timestamp) {
    const rawDt = Math.min((timestamp - this.lastTime) / 1000, 0.05);
    const dt = rawDt * this.speedMultiplier;
    this.lastTime = timestamp;

    if (!this.paused && this.phase === 'playing') {
      this.update(dt);
    }

    this.render();
    this.animFrameId = requestAnimationFrame(ts => this.loop(ts));
  },

  update(dt) {
    // Clean dead entities periodically
    if (Enemies.length > 500) Enemies = Enemies.filter(e => !e.dead);
    if (Projectiles.length > 1000) Projectiles = Projectiles.filter(p => !p.dead);

    Camera.follow(Player);

    if (this.wavePhase === 'playing') {
      WaveSpawner.update(dt, this.wave);
      Player.update(dt, Enemies);
      updateEnemies(dt);
      updateProjectiles(dt, Enemies);
      GroundEffects.update(dt, Enemies);
      Particles.update(dt);

      // Wave 20 ends on boss kill (handled in killEnemy → victory)
      // Other waves end on timer
      if (this.wave < 20) {
        this.waveTimer -= dt;
        if (this.waveTimer <= 0) {
          this.endWave();
        }
      }
    } else {
      // Break between waves
      Particles.update(dt);
      this.breakTimer -= dt;
      if (this.breakTimer <= 0) this.startNextWave();
    }
  },

  render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (this.phase === 'playing') {
      Renderer.drawWorld();
      Renderer.drawHUD();
    }
  },

  endWave() {
    this.wavePhase = 'break';
    this.breakTimer = CONFIG.WAVE_BREAK;
    // Kill remaining enemies silently
    for (const e of Enemies) { e.dead = true; }
    if (this.wave < 20) this.showWaveBanner(this.wave, true);
  },

  startNextWave() {
    if (this.wave >= 20) return;
    this.wave++;
    Enemies = [];
    Projectiles = Projectiles.filter(p => p.isEnemyProjectile || !p.isEnemyProjectile);
    Projectiles = [];
    this.waveDuration = this.waveDurationFor(this.wave);
    this.waveTimer = this.waveDuration;
    this.wavePhase = 'playing';
    WaveSpawner.startWave(this.wave);
    this.showWaveBanner(this.wave);
  },

  showWaveBanner(wave, complete = false) {
    const banner = document.getElementById('wave-banner');
    const title = document.getElementById('wave-banner-title');
    const sub = document.getElementById('wave-banner-sub');
    if (complete) {
      title.textContent = `WAVE ${wave} CLEARED`;
      sub.textContent = 'PREPARE FOR NEXT WAVE';
    } else if (wave === 20) {
      title.textContent = '⚠ WAVE 20 ⚠';
      sub.textContent = 'THE DRAGON AWAKENS';
    } else {
      title.textContent = `WAVE ${wave}`;
      sub.textContent = wave <= 3 ? 'SURVIVE' : wave <= 10 ? 'HOLD THE LINE' : wave <= 18 ? 'THE DARK TIDE RISES' : 'FINAL APPROACH';
    }
    banner.classList.add('visible');
    setTimeout(() => banner.classList.remove('visible'), complete ? 2500 : 3000);
  },

  triggerLevelUp() {
    this.pendingLevelUps++;
    if (this.pendingLevelUps === 1) this.showLevelUp();
  },

  showLevelUp() {
    this.paused = true;
    this.clearDpadToggles();
    const screen = document.getElementById('screen-levelup');
    document.getElementById('levelup-sub').textContent = `LEVEL ${Player.level} — CHOOSE AN ENHANCEMENT`;

    const renderCards = () => {
      const container = document.getElementById('upgrade-cards');
      container.innerHTML = '';
      const choices = LevelSystem.generateChoices();
      for (const choice of choices) {
        const card = document.createElement('div');
        card.className = 'upgrade-card';
        card.innerHTML = `
          <span class="upgrade-icon">${choice.icon}</span>
          <div class="upgrade-type">${choice.sub}</div>
          <div class="upgrade-name">${choice.label}</div>
          <div class="upgrade-desc">${choice.desc}</div>
        `;
        card.addEventListener('click', () => {
          LevelSystem.applyChoice(choice);
          screen.classList.add('hidden');
          this.pendingLevelUps--;
          if (this.pendingLevelUps > 0) { this.showLevelUp(); }
          else { this.paused = false; }
        });
        container.appendChild(card);
      }
    };

    renderCards();

    const rerollBtn = document.getElementById('btn-reroll');
    const rerollCount = document.getElementById('reroll-count');
    const updateRerollBtn = () => {
      rerollCount.textContent = `(${this.rerollsLeft})`;
      rerollBtn.disabled = this.rerollsLeft <= 0;
    };
    updateRerollBtn();
    rerollBtn.onclick = () => {
      if (this.rerollsLeft <= 0) return;
      this.rerollsLeft--;
      renderCards();
      updateRerollBtn();
    };

    screen.classList.remove('hidden');
  },

  togglePause() {
    if (this.phase !== 'playing') return;
    if (document.getElementById('screen-levelup').classList.contains('hidden') === false) return;
    this.paused = !this.paused;
    document.getElementById('pause-overlay').classList.toggle('visible', this.paused);
  },

  gameOver() {
    if (this.phase === 'gameover' || this.phase === 'victory') return;
    this.phase = 'gameover';
    this.clearDpadToggles();
    canvas.classList.remove('active');
    document.getElementById('speed-bar').classList.remove('visible');
    document.getElementById('touch-controls').classList.remove('tc-visible');

    const stats = document.getElementById('gameover-stats');
    stats.innerHTML = buildStatsHTML();
    document.getElementById('screen-gameover').classList.remove('hidden');
    if (this.animFrameId) cancelAnimationFrame(this.animFrameId);
  },

  victory() {
    if (this.phase === 'victory') return;
    this.phase = 'victory';
    this.clearDpadToggles();
    setTimeout(() => {
      canvas.classList.remove('active');
      document.getElementById('speed-bar').classList.remove('visible');
      document.getElementById('touch-controls').classList.remove('tc-visible');
      const stats = document.getElementById('victory-stats');
      stats.innerHTML = buildStatsHTML();
      document.getElementById('screen-victory').classList.remove('hidden');
    }, 2500);
  },

  restart() {
    this.clearDpadToggles();
    document.getElementById('screen-gameover').classList.add('hidden');
    document.getElementById('screen-victory').classList.add('hidden');
    document.getElementById('screen-levelup').classList.add('hidden');
    document.getElementById('pause-overlay').classList.remove('visible');
    document.getElementById('speed-bar').classList.remove('visible');
    canvas.classList.remove('active');
    _eid = 0;

    // Back to character select
    document.getElementById('screen-charselect').classList.remove('hidden');
    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
    const btn = document.getElementById('btn-play');
    btn.style.opacity = '0';
    btn.style.pointerEvents = 'none';
    this.selectedChar = null;
    this.phase = 'charselect';
    if (this.animFrameId) { cancelAnimationFrame(this.animFrameId); this.animFrameId = null; }
  }
};

function buildStatsHTML() {
  return `
    <div class="stat-row"><span>Wave Reached</span><span class="stat-val">${Game.wave} / 20</span></div>
    <div class="stat-row"><span>Level</span><span class="stat-val">${Player.level}</span></div>
    <div class="stat-row"><span>Monsters Slain</span><span class="stat-val">${Player.kills}</span></div>
    <div class="stat-row"><span>Mage</span><span class="stat-val">${Player.charConfig ? Player.charConfig.name : '—'}</span></div>
    <div class="stat-row"><span>Spells Known</span><span class="stat-val">${Player.weapons.length}</span></div>
  `;
}

// ── BOOT ──────────────────────────────────────────────────────
Game.init();
</script>

<div id="touch-controls">
  <div id="dpad">
    <div></div>
    <button class="dpad-btn" id="dpad-up">▲</button>
    <div></div>
    <button class="dpad-btn" id="dpad-left">◀</button>
    <div></div>
    <button class="dpad-btn" id="dpad-right">▶</button>
    <div></div>
    <button class="dpad-btn" id="dpad-down">▼</button>
    <div></div>
  </div>
</div>
</body>
