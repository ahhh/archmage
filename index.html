<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
// ARCHMAGE — Full Game Implementation
// Game content (characters, weapons, monsters) lives in data.js
// ═══════════════════════════════════════════════════════════════

// ── UTILITY ───────────────────────────────────────────────────

function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function lerp(a, b, t) { return a + (b - a) * t; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = rndInt(0, i);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let _eid = 0;
function mkId() { return ++_eid; }

// ── CANVAS SETUP ──────────────────────────────────────────────

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── INPUT ─────────────────────────────────────────────────────

const Input = {
  keys: {},
  mouseX: 0,   // screen coords
  mouseY: 0,
  autoAim: true,
  init() {
    window.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (e.code === 'Escape') Game.togglePause();
      if (e.code === 'KeyV' && Game.phase === 'playing') {
        this.autoAim = !this.autoAim;
      }
      if (e.code === 'KeyM') {
        Music.toggleMute();
      }
    });
    window.addEventListener('keyup', e => { this.keys[e.code] = false; });
    window.addEventListener('mousemove', e => {
      this.mouseX = e.clientX;
      this.mouseY = e.clientY;
    });
  },

  isDown(code) { return !!this.keys[code]; },
  mouseWorld() { return Camera.toWorld(this.mouseX, this.mouseY); }
};

// ── SPRITE SHEET ─────────────────────────────────────────────

const SpriteSheet = {
  img: new Image(),
  ready: false,
  load() {
    this.img.onload  = () => { this.ready = true; };
    this.img.onerror = () => { /* falls back to emoji silently */ };
    this.img.src = 'sprites.png';
  }
};

// Sprite source rects per character per direction {x, y, w, h}
const SPRITES = {
  ember_adept: {
    up:    { x: 218, y: 39,   w: 94,  h: 84 },
    right: { x: 217, y: 134,  w: 90,  h: 71 },
    down:  { x: 218, y: 216,  w: 92,  h: 74 },
    left:  { x: 211, y: 301,  w: 86,  h: 74 },
  },
  frost_seer: {
    up:    { x: 213, y: 446,  w: 102, h: 90 },
    right: { x: 219, y: 544,  w: 101, h: 75 },
    down:  { x: 219, y: 631,  w: 100, h: 80 },
    left:  { x: 200, y: 718,  w: 91,  h: 75 },
  },
  storm_caller: {
    up:    { x: 200, y: 846,  w: 131, h: 89 },
    right: { x: 211, y: 949,  w: 120, h: 81 },
    down:  { x: 204, y: 1041, w: 127, h: 85 },
    left:  { x: 200, y: 1133, w: 100, h: 77 },
  },
};

// ── CAMERA ────────────────────────────────────────────────────

const Camera = {
  x: 0, y: 0,
  apply(ctx) {
    ctx.save();
    ctx.translate(canvas.width / 2 - this.x, canvas.height / 2 - this.y);
  },
  restore(ctx) { ctx.restore(); },
  follow(target) {
    this.x = clamp(target.x, canvas.width / 2, CONFIG.WORLD_W - canvas.width / 2);
    this.y = clamp(target.y, canvas.height / 2, CONFIG.WORLD_H - canvas.height / 2);
  },
  toWorld(sx, sy) {
    return { x: sx - canvas.width / 2 + this.x, y: sy - canvas.height / 2 + this.y };
  }
};

// ── PARTICLES ─────────────────────────────────────────────────

const Particles = {
  list: [],
  emit(x, y, color, count = 4, speed = 2.5) {
    for (let i = 0; i < count; i++) {
      const a = rnd(0, Math.PI * 2);
      const s = rnd(0.5, speed);
      this.list.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rnd(0.25, 0.55), maxLife: 0, color, r: rnd(1.5, 3.5) });
      this.list[this.list.length - 1].maxLife = this.list[this.list.length - 1].life;
    }
  },
  emitText(x, y, text, color) {
    this.list.push({ x, y, vx: rnd(-0.5, 0.5), vy: -1.5, life: 0.9, maxLife: 0.9, color, text, r: 0 });
  },
  update(dt) {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const p = this.list[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= dt;
      if (p.life <= 0) this.list.splice(i, 1);
    }
  },
  draw(ctx) {
    for (const p of this.list) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      if (p.text) {
        ctx.font = '11px "Share Tech Mono", monospace';
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
};

// ── GROUND EFFECTS ────────────────────────────────────────────

const GroundEffects = {
  list: [],
  add(x, y, radius, type, duration, dps) {
    this.list.push({ x, y, radius, type, duration, dps, timer: 0, maxDuration: duration });
  },
  update(dt, enemies) {
    for (let i = this.list.length - 1; i >= 0; i--) {
      const g = this.list[i];
      g.duration -= dt;
      g.timer += dt;
      if (g.timer >= 0.5) {
        g.timer = 0;
        for (const e of enemies) {
          if (e.dead) continue;
          if (dist(e.x, e.y, g.x, g.y) < g.radius + e.radius) {
            e.hp -= g.dps * 0.5;
            if (e.hp <= 0) killEnemy(e);
          }
        }
      }
      if (g.duration <= 0) this.list.splice(i, 1);
    }
  },
  draw(ctx) {
    for (const g of this.list) {
      const alpha = 0.35 * (g.duration / g.maxDuration);
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.radius, 0, Math.PI * 2);
      ctx.fillStyle = g.type === 'burn' ? '#ff6600' : g.type === 'poison' ? '#44cc00' : g.type === 'toxic' ? '#00dd44' : '#aa00ff';
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
};

// ── PLAYER ────────────────────────────────────────────────────

const Player = {
  x: CONFIG.WORLD_W / 2,
  y: CONFIG.WORLD_H / 2,
  radius: 16,
  health: 0,
  maxHealth: 0,
  speed: 0,
  armor: 0,
  level: 1,
  xp: 0,
  xpToNext: 0,
  weapons: [],       // { weaponId, cooldownRemaining, computedStats, appliedUpgrades }
  passivesApplied: [],
  kills: 0,
  globalCDMultiplier: 1,
  charConfig: null,
  flashTimer: 0,
  iFrameTimer: 0,    // invincibility frames after taking damage
  contactTimers: {}, // tracks contact damage per enemy
  blockChance: 0,    // 0–1 probability of negating any hit
  shieldActive: false,
  shieldTimer: 0,    // counts down to next shield activation
  shieldCooldown: 0, // 0 = no Monkey Paw

  init(charConfig) {
    this.charConfig = charConfig;
    this.x = CONFIG.WORLD_W / 2;
    this.y = CONFIG.WORLD_H / 2;
    this.health = charConfig.health;
    this.maxHealth = charConfig.health;
    this.speed = charConfig.speed;
    this.armor = charConfig.armor;
    this.level = 1;
    this.xp = 0;
    this.xpToNext = this.calcXpToNext(1);
    this.kills = 0;
    this.globalCDMultiplier = 1;
    this.globalRangeMultiplier = 1;
    this.globalDamageMultiplier = 1;
    this.globalProjectileSpeedMultiplier = 1;
    this.globalAreaMultiplier = 1;
    this.globalDurationMultiplier = 1;
    this.globalPierceBonus = 0;
    this.globalChainBonus = 0;
    this.globalArmorPenetrationBonus = 0;
    this.globalKnockbackMultiplier = 1;
    this.globalPullStrengthMultiplier = 1;
    this.globalStatusDurationMultiplier = 1;
    this.globalProjectileCountBonus = 0;
    this.globalRadialCountBonus = 0;
    this.globalSplitProjectilesBonus = 0;
    this.globalOrbitSpeedMultiplier = 1;
    this.globalCurveRateMultiplier = 1;
    this.globalChronoMultiplierBonus = 0;
    this.globalTrapCountBonus = 0;
    this.globalGroundEffectDurationMultiplier = 1;
    this.globalGroundEffectDamageMultiplier = 1;
    this.globalMirrorPowerBonus = 0;
    this.globalDecoyHpBonus = 0;
    this.globalDecoyDurationBonus = 0;
    this.cycleBonus = { fire:0, ice:0, lightning:0, death:0, arcane:0, demon:0, blade:0, life:0 };
    this.cycleLifeMaxHPApplied = 0;
    this.cycleDemonArmorApplied = 0;
    this.speedBoostTimer = 0;
    this.speedBoostMult = 1;
    this.passivesApplied = [];
    this.flashTimer = 0;
    this.glowPulse = 0;
    this.iFrameTimer = 0;
    this.contactTimers = {};
    this.blockChance = 0;
    this.shieldActive = false;
    this.shieldTimer = 0;
    this.shieldCooldown = 0;
    this.moveDx = 0;
    this.moveDy = 0;
    this.jakesDir = null;
    this.killHeal = 0;
    this.unlockedCombos = new Set();
    this.facing = 'down';
    const startWeapon = CONFIG.weapons.find(w => w.id === charConfig.startingWeapon);
    this.weapons = [this.makeWeaponInstance(startWeapon)];
  },

  makeWeaponInstance(wConfig) {
    return {
      weaponId: wConfig.id,
      cooldownRemaining: 0,
      appliedUpgrades: [],
      computedStats: this.computeWeaponStats(wConfig, [])
    };
  },

  computeWeaponStats(wConfig, appliedUpgrades) {
    const s = {
      damage: wConfig.damage,
      cooldown: wConfig.cooldown,
      projectileSpeed: wConfig.projectileSpeed,
      armorPenetration: wConfig.armorPenetration,
      pierce: wConfig.pierce,
      bounce: wConfig.bounce,
      range: wConfig.range,
      targeting: wConfig.targeting,
      chainCount: wConfig.chainCount || 0,
      chainRange: wConfig.chainRange || 0,
      areaRadius: wConfig.areaRadius || 0,
      statusEffect: wConfig.statusEffect ? { ...wConfig.statusEffect } : null,
      splitProjectiles: 0,
      splitDamageMultiplier: 0,
      projectileCount: wConfig.projectileCount || 1,
      radialCount: wConfig.radialCount || 0,
      damagePerBounce: 1,
      pullRadius: 0,
      pullStrength: 0,
      finalHitDamageMultiplier: 1,
      finalHitStun: 0,
      followupMeteors: 0,
      followupDamageMultiplier: 0,
      groundEffect: wConfig.groundEffect ? { ...wConfig.groundEffect } : null,
      areaDamageMultiplier: 0.5,
      knockback: wConfig.knockback || 0,
      spreadAngle: wConfig.spreadAngle || 0.18,
      projectileAcceleration: wConfig.projectileAcceleration || 1,
      phasing: wConfig.phasing || false,
      phaseDuration: wConfig.phaseDuration || 1.6,
      curveRate: wConfig.curveRate || 0,
      angleOffset: wConfig.angleOffset || 0,
      decoyHp: wConfig.decoyHp || 70,
      decoyDuration: wConfig.decoyDuration || 10,
      decoyExplosion: wConfig.decoyExplosion || false,
      runeBlastCount: wConfig.runeBlastCount || 0,
      runeBlastDamage: wConfig.runeBlastDamage || 0,
      runeBlastRange: wConfig.runeBlastRange || 300,
      runeBlastSpeed: wConfig.runeBlastSpeed || 5.5,
      runeBlastPierce: wConfig.runeBlastPierce || 0,
      lifesteal: wConfig.lifesteal || 0,
      jakesVolley: wConfig.jakesVolley || false,
      isChrono: wConfig.isChrono || false,
      chronoDelay: wConfig.chronoDelay || 2.0,
      chronoBaseDamage: wConfig.chronoBaseDamage || 12,
      chronoMultiplierBonus: 0,
      chronoChain: false,
      harpDuration: wConfig.harpDuration || 3.5,
      harpThird: false,
      harpPulse: false,
      grimoireCharges: wConfig.grimoireCharges || 0,
      grimoireMaxCharges: wConfig.grimoireMaxCharges || 5,
      grimoireFeedOnKill: false,
      boxReverse: false,
      mirrorCount: wConfig.mirrorCount || 1,
      mirrorPower: wConfig.mirrorPower || 0.55,
      mirrorExplosion: wConfig.mirrorExplosion || false,
      riftCount: wConfig.riftCount || 2,
      riftDuration: wConfig.riftDuration || 8.0,
      riftChain: wConfig.riftChain || false,
      shellDuration: wConfig.shellDuration || 2.3,
      spikeCount: wConfig.spikeCount || 3,
      spikeRadius: wConfig.spikeRadius || 26,
      spikeDuration: wConfig.spikeDuration || 8.0,
      orbitDuration: wConfig.orbitDuration || 5.0,
      healOnExpire: wConfig.healOnExpire || 0,
      chargesUp: wConfig.chargesUp || false,
      chargeRate: wConfig.chargeRate || 0,
      returnsToPlayer: wConfig.returnsToPlayer || false,
      dashSpeedBoost: wConfig.dashSpeedBoost || 4.5,
      dashDuration: wConfig.dashDuration || 0.35,
      triadDuration: wConfig.triadDuration || 8.0,
      triadPrimaryRadius: wConfig.triadPrimaryRadius || 85,
      triadSubRadius: wConfig.triadSubRadius || 28,
      triadPrimarySpeed: wConfig.triadPrimarySpeed || 0.048,
      triadSubSpeed: wConfig.triadSubSpeed || 0.17,
      triadCount: wConfig.triadCount || 3,
      subDamage: wConfig.subDamage || 0,
      corpseBlastPercent: wConfig.corpseBlastPercent || 0.35,
      corpseBlastRadius: wConfig.corpseBlastRadius || 110,
      corpseChain: wConfig.corpseChain || false,
      gravebombPercent: wConfig.gravebombPercent || 0.25,
      gravebombRadius: wConfig.gravebombRadius || 100,
      gravebombMaxCount: wConfig.gravebombMaxCount || 5,
    };
    for (const uid of appliedUpgrades) {
      const upg = wConfig.upgrades.find(u => u.id === uid);
      if (!upg) continue;
      const c = upg.changes;
      if (c.damageMultiplier) { s.damage = Math.round(s.damage * c.damageMultiplier); if (s.subDamage > 0) s.subDamage = Math.round(s.subDamage * c.damageMultiplier); }
      if (c.projectileSpeedMultiplier) s.projectileSpeed *= c.projectileSpeedMultiplier;
      if (c.cooldownMultiplier) s.cooldown *= c.cooldownMultiplier;
      if (c.areaRadiusMultiplier) s.areaRadius *= c.areaRadiusMultiplier;
      if (c.pierce != null) s.pierce += c.pierce;
      if (c.bounce != null) s.bounce += c.bounce;
      if (c.armorPenetration != null) s.armorPenetration += c.armorPenetration;
      if (c.chainCount != null) s.chainCount += c.chainCount;
      if (c.statusEffect) s.statusEffect = { ...c.statusEffect };
      if (c.areaRadius != null) s.areaRadius = c.areaRadius;
      if (c.areaDamageMultiplier != null) s.areaDamageMultiplier = c.areaDamageMultiplier;
      if (c.splitProjectiles != null) s.splitProjectiles = c.splitProjectiles;
      if (c.splitDamageMultiplier != null) s.splitDamageMultiplier = c.splitDamageMultiplier;
      if (c.projectileCount != null) s.projectileCount += c.projectileCount;
      if (c.radialCount != null) s.radialCount += c.radialCount;
      if (c.damagePerBounce != null) s.damagePerBounce = c.damagePerBounce;
      if (c.pullRadius != null) s.pullRadius = c.pullRadius;
      if (c.pullStrength != null) s.pullStrength = c.pullStrength;
      if (c.finalHitDamageMultiplier != null) s.finalHitDamageMultiplier = c.finalHitDamageMultiplier;
      if (c.finalHitStun != null) s.finalHitStun = c.finalHitStun;
      if (c.followupMeteors != null) s.followupMeteors = c.followupMeteors;
      if (c.followupDamageMultiplier != null) s.followupDamageMultiplier = c.followupDamageMultiplier;
      if (c.groundEffect != null) s.groundEffect = { ...c.groundEffect };
      if (c.rangeMultiplier != null) s.range *= c.rangeMultiplier;
      if (c.knockbackMultiplier != null) s.knockback *= c.knockbackMultiplier;
      if (c.spreadAngle != null) s.spreadAngle += c.spreadAngle;
      if (c.projectileAccelerationMultiplier != null) s.projectileAcceleration = 1 + (s.projectileAcceleration - 1) * c.projectileAccelerationMultiplier;
      if (c.orbitSpeedMultiplier != null) s.orbitSpeed = (s.orbitSpeed || wConfig.orbitSpeed || 0.065) * c.orbitSpeedMultiplier;
      if (c.curveRateMultiplier != null) s.curveRate *= c.curveRateMultiplier;
      if (c.decoyHpBonus != null) s.decoyHp += c.decoyHpBonus;
      if (c.decoyDurationBonus != null) s.decoyDuration += c.decoyDurationBonus;
      if (c.decoyExplosion) s.decoyExplosion = true;
      if (c.runeBlastCount != null) s.runeBlastCount += c.runeBlastCount;
      if (c.runeBlastDamageMultiplier != null) s.runeBlastDamage = Math.round(s.runeBlastDamage * c.runeBlastDamageMultiplier);
      if (c.runeBlastRangeMultiplier != null) s.runeBlastRange *= c.runeBlastRangeMultiplier;
      if (c.runeBlastPierce != null) s.runeBlastPierce += c.runeBlastPierce;
      if (c.lifesteal != null) s.lifesteal = (s.lifesteal || 0) + c.lifesteal;
      if (c.jakesVolley) s.jakesVolley = true;
      if (c.chronoMultiplierBonus != null) s.chronoMultiplierBonus += c.chronoMultiplierBonus;
      if (c.chronoChain) s.chronoChain = true;
      if (c.harpThird) s.harpThird = true;
      if (c.harpPulse) s.harpPulse = true;
      if (c.grimoireFeedOnKill) s.grimoireFeedOnKill = true;
      if (c.mirrorCount != null) s.mirrorCount += c.mirrorCount;
      if (c.mirrorPower != null) s.mirrorPower = c.mirrorPower;
      if (c.mirrorExplosion) s.mirrorExplosion = true;
      if (c.riftCount != null) s.riftCount += c.riftCount;
      if (c.riftChain) s.riftChain = true;
      if (c.shellDurationBonus != null) s.shellDuration += c.shellDurationBonus;
      if (c.spikeCount != null) s.spikeCount += c.spikeCount;
      if (c.damageOverride != null) s.damage = c.damageOverride;
      if (c.runeBlastDamage != null) s.runeBlastDamage = c.runeBlastDamage;
      if (c.riftDuration != null)  s.riftDuration += c.riftDuration;
      if (c.healOnExpire != null)  s.healOnExpire += c.healOnExpire;
      if (c.chargeRate != null)    s.chargeRate = c.chargeRate;
      if (c.dashDurationMult != null)        s.dashDuration *= c.dashDurationMult;
      if (c.triadPrimaryRadiusMult != null)  s.triadPrimaryRadius *= c.triadPrimaryRadiusMult;
      if (c.triadCount != null)              s.triadCount += c.triadCount;
      if (c.corpseBlastPercentBonus != null) s.corpseBlastPercent += c.corpseBlastPercentBonus;
      if (c.corpseChain)                     s.corpseChain = true;
      if (c.gravebombPercentBonus != null)   s.gravebombPercent += c.gravebombPercentBonus;
      if (c.gravebombMaxCount != null)       s.gravebombMaxCount += c.gravebombMaxCount;
      if (c.gravebombRadius != null)         s.gravebombRadius += c.gravebombRadius;
    }
    // Apply active combo boosts (same change format as upgrades)
    if (this.unlockedCombos) {
      for (const comboId of this.unlockedCombos) {
        const combo = CONFIG.combos?.find(c => c.id === comboId);
        if (!combo) continue;
        const boost = combo.weaponBoosts?.find(b => b.weaponId === wConfig.id);
        if (!boost) continue;
        const c = boost;
        if (c.damageMultiplier)           { s.damage = Math.round(s.damage * c.damageMultiplier); if (s.subDamage > 0) s.subDamage = Math.round(s.subDamage * c.damageMultiplier); }
        if (c.damageOverride != null)     s.damage = c.damageOverride;
        if (c.projectileSpeedMultiplier)  s.projectileSpeed *= c.projectileSpeedMultiplier;
        if (c.cooldownMultiplier)         s.cooldown *= c.cooldownMultiplier;
        if (c.areaRadiusMultiplier)       s.areaRadius *= c.areaRadiusMultiplier;
        if (c.pierce != null)             s.pierce += c.pierce;
        if (c.bounce != null)             s.bounce += c.bounce;
        if (c.armorPenetration != null)   s.armorPenetration += c.armorPenetration;
        if (c.chainCount != null)         s.chainCount += c.chainCount;
        if (c.statusEffect)               s.statusEffect = { ...c.statusEffect };
        if (c.areaRadius != null)         s.areaRadius = c.areaRadius;
        if (c.areaDamageMultiplier != null) s.areaDamageMultiplier = c.areaDamageMultiplier;
        if (c.splitProjectiles != null)   s.splitProjectiles = c.splitProjectiles;
        if (c.splitDamageMultiplier != null) s.splitDamageMultiplier = c.splitDamageMultiplier;
        if (c.projectileCount != null)    s.projectileCount += c.projectileCount;
        if (c.radialCount != null)        s.radialCount += c.radialCount;
        if (c.groundEffect != null)       s.groundEffect = { ...c.groundEffect };
        if (c.rangeMultiplier != null)    s.range *= c.rangeMultiplier;
        if (c.pullRadius != null)         s.pullRadius = c.pullRadius;
        if (c.pullStrength != null)       s.pullStrength = c.pullStrength;
        if (c.orbitSpeedMultiplier != null) s.orbitSpeed = (s.orbitSpeed || wConfig.orbitSpeed || 0.065) * c.orbitSpeedMultiplier;
        if (c.curveRateMultiplier != null)  s.curveRate *= c.curveRateMultiplier;
        if (c.decoyHpBonus != null)       s.decoyHp += c.decoyHpBonus;
        if (c.decoyDurationBonus != null) s.decoyDuration += c.decoyDurationBonus;
        if (c.decoyExplosion)             s.decoyExplosion = true;
        if (c.runeBlastCount != null)     s.runeBlastCount += c.runeBlastCount;
        if (c.runeBlastDamage != null)    s.runeBlastDamage = c.runeBlastDamage;
        if (c.lifesteal != null)          s.lifesteal = (s.lifesteal || 0) + c.lifesteal;
        if (c.chronoMultiplierBonus != null) s.chronoMultiplierBonus += c.chronoMultiplierBonus;
        if (c.chronoChain)                s.chronoChain = true;
        if (c.harpThird)                  s.harpThird = true;
        if (c.harpPulse)                  s.harpPulse = true;
        if (c.grimoireFeedOnKill)         s.grimoireFeedOnKill = true;
        if (c.mirrorCount != null)        s.mirrorCount += c.mirrorCount;
        if (c.mirrorPower != null)        s.mirrorPower = c.mirrorPower;
        if (c.riftCount != null)          s.riftCount += c.riftCount;
        if (c.riftChain)                  s.riftChain = true;
        if (c.shellDurationBonus != null) s.shellDuration += c.shellDurationBonus;
        if (c.spikeCount != null)         s.spikeCount += c.spikeCount;
        if (c.riftDuration != null)       s.riftDuration += c.riftDuration;
        if (c.healOnExpire != null)            s.healOnExpire += c.healOnExpire;
        if (c.chargeRate != null)              s.chargeRate = c.chargeRate;
        if (c.dashDurationMult != null)        s.dashDuration *= c.dashDurationMult;
        if (c.triadPrimaryRadiusMult != null)  s.triadPrimaryRadius *= c.triadPrimaryRadiusMult;
        if (c.triadCount != null)              s.triadCount += c.triadCount;
        if (c.corpseBlastPercentBonus != null) s.corpseBlastPercent += c.corpseBlastPercentBonus;
        if (c.corpseChain)                     s.corpseChain = true;
        if (c.gravebombPercentBonus != null)   s.gravebombPercent += c.gravebombPercentBonus;
        if (c.gravebombMaxCount != null)       s.gravebombMaxCount += c.gravebombMaxCount;
        if (c.gravebombRadius != null)         s.gravebombRadius += c.gravebombRadius;
      }
    }
    // ── Global passive multipliers ────────────────────────────
    s.range *= (this.globalRangeMultiplier || 1);
    if ((this.globalDamageMultiplier || 1) !== 1) {
      s.damage = Math.round(s.damage * this.globalDamageMultiplier);
      if (s.subDamage > 0) s.subDamage = Math.round(s.subDamage * this.globalDamageMultiplier);
    }
    if ((this.globalProjectileSpeedMultiplier || 1) !== 1 && s.projectileSpeed > 0)
      s.projectileSpeed *= this.globalProjectileSpeedMultiplier;
    if ((this.globalAreaMultiplier || 1) !== 1 && s.areaRadius > 0)
      s.areaRadius *= this.globalAreaMultiplier;
    if (this.globalPierceBonus) s.pierce += this.globalPierceBonus;
    if (this.globalChainBonus && s.chainCount > 0) s.chainCount += this.globalChainBonus;
    if (this.globalArmorPenetrationBonus) s.armorPenetration += this.globalArmorPenetrationBonus;
    if ((this.globalKnockbackMultiplier || 1) !== 1 && s.knockback > 0)
      s.knockback *= this.globalKnockbackMultiplier;
    if ((this.globalPullStrengthMultiplier || 1) !== 1 && s.pullStrength > 0)
      s.pullStrength *= this.globalPullStrengthMultiplier;
    if ((this.globalStatusDurationMultiplier || 1) !== 1 && s.statusEffect)
      s.statusEffect = { ...s.statusEffect, duration: s.statusEffect.duration * this.globalStatusDurationMultiplier };
    if ((this.globalDurationMultiplier || 1) !== 1) {
      const dm = this.globalDurationMultiplier;
      s.harpDuration  *= dm;
      s.spikeDuration *= dm;
      s.shellDuration *= dm;
      s.decoyDuration *= dm;
      s.orbitDuration *= dm;
    }
    if (s.groundEffect) {
      const gd   = (this.globalDurationMultiplier || 1) * (this.globalGroundEffectDurationMultiplier || 1);
      const gdmg = (this.globalGroundEffectDamageMultiplier || 1);
      if (gd !== 1 || gdmg !== 1)
        s.groundEffect = { ...s.groundEffect, duration: s.groundEffect.duration * gd, dps: s.groundEffect.dps * gdmg };
    }
    if (this.globalProjectileCountBonus && wConfig.projectileCount > 1)
      s.projectileCount += this.globalProjectileCountBonus;
    if (this.globalRadialCountBonus && s.targeting === 'radial')
      s.radialCount += this.globalRadialCountBonus;
    if (this.globalSplitProjectilesBonus && s.splitProjectiles > 0)
      s.splitProjectiles += this.globalSplitProjectilesBonus;
    if ((this.globalOrbitSpeedMultiplier || 1) !== 1 && s.targeting === 'orbit')
      s.orbitSpeed = (s.orbitSpeed || wConfig.orbitSpeed || 0.065) * this.globalOrbitSpeedMultiplier;
    if ((this.globalCurveRateMultiplier || 1) !== 1 && s.curveRate > 0)
      s.curveRate *= this.globalCurveRateMultiplier;
    if (this.globalChronoMultiplierBonus && s.isChrono)
      s.chronoMultiplierBonus += this.globalChronoMultiplierBonus;
    if (this.globalTrapCountBonus) {
      if (s.targeting === 'rift')   s.riftCount  += this.globalTrapCountBonus;
      if (s.targeting === 'spikes') s.spikeCount += this.globalTrapCountBonus;
    }
    if (this.globalMirrorPowerBonus && s.targeting === 'mirror')
      s.mirrorPower = Math.min(1, s.mirrorPower + this.globalMirrorPowerBonus);
    if (s.targeting === 'decoy') {
      if (this.globalDecoyHpBonus)       s.decoyHp       += this.globalDecoyHpBonus;
      if (this.globalDecoyDurationBonus) s.decoyDuration += this.globalDecoyDurationBonus;
    }
    // Character bonus
    if (this.charConfig) {
      const b = this.charConfig.bonus;
      if (b.fireDamageMultiplier && (wConfig.id === 'firebolt' || wConfig.id === 'meteor_sigil')) {
        s.damage = Math.round(s.damage * b.fireDamageMultiplier);
      }
    }
    // ── Cycle set bonuses ─────────────────────────────────────────
    const cb = this.cycleBonus || {};
    // Fire: +1 extra projectile per stack (any projectile-firing weapon)
    if (cb.fire > 0 && s.projectileSpeed > 0)
      s.projectileCount += cb.fire;
    // Ice: +10% status effect duration per stack
    if (cb.ice > 0 && s.statusEffect)
      s.statusEffect = { ...s.statusEffect, duration: s.statusEffect.duration * (1 + cb.ice * 0.10) };
    // Lightning: -4% cooldown per stack (floors at 75% of computed cooldown)
    if (cb.lightning > 0)
      s.cooldown = Math.max(s.cooldown * 0.75, s.cooldown * Math.pow(0.96, cb.lightning));
    // Death: +5% damage per stack
    if (cb.death > 0)
      s.damage = Math.round(s.damage * (1 + cb.death * 0.05));
    // Arcane: +6% range per stack
    if (cb.arcane > 0)
      s.range = Math.round(s.range * (1 + cb.arcane * 0.06));
    // Demon: +1 armor per stack — handled in computeCyclePassives()
    // Blade: +1.5 flat armor penetration per stack
    if (cb.blade > 0)
      s.armorPenetration += cb.blade * 1.5;
    // Life: max HP handled in computeCyclePassives()

    // Mark weapon as combo-empowered if any active combo boosts it
    s.empowered = false;
    if (this.unlockedCombos) {
      for (const comboId of this.unlockedCombos) {
        const combo = CONFIG.combos?.find(c => c.id === comboId);
        if (combo?.weaponBoosts?.some(b => b.weaponId === wConfig.id)) {
          s.empowered = true;
          break;
        }
      }
    }
    return s;
  },

  recomputeWeapon(wi) {
    const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
    wi.computedStats = this.computeWeaponStats(wConfig, wi.appliedUpgrades);
  },

  calcXpToNext(level) {
    return Math.floor(20 + level * 12 + Math.pow(level, 1.4) * 4);
  },

  addXp(amount) {
    this.xp += amount;
    while (this.xp >= this.xpToNext) {
      this.xp -= this.xpToNext;
      this.level++;
      this.xpToNext = this.calcXpToNext(this.level);
      Game.triggerLevelUp();
    }
  },

  hasWeapon(id) { return this.weapons.some(w => w.weaponId === id); },
  hasUpgrade(weaponId, upgradeId) {
    const w = this.weapons.find(wi => wi.weaponId === weaponId);
    return w ? w.appliedUpgrades.includes(upgradeId) : false;
  },

  addWeapon(weaponId) {
    const wConfig = CONFIG.weapons.find(w => w.id === weaponId);
    if (!wConfig) return;
    this.weapons.push(this.makeWeaponInstance(wConfig));
    computeCyclePassives();
  },

  applyUpgrade(weaponId, upgradeId) {
    const wi = this.weapons.find(w => w.weaponId === weaponId);
    if (!wi) return;
    wi.appliedUpgrades.push(upgradeId);
    this.recomputeWeapon(wi);
    // Orbit weapons: kill existing blades and fire immediately so new count takes effect now
    if (wi.computedStats.targeting === 'orbit') {
      for (const p of Projectiles) {
        if (p.isOrbit && p.weaponId === weaponId) p.dead = true;
      }
      wi.cooldownRemaining = 0;
    }
  },

  update(dt, enemies) {
    // Movement + direction tracking (keyboard + touch joystick combined)
    const goUp    = Input.isDown('KeyW') || Input.isDown('ArrowUp');
    const goDown  = Input.isDown('KeyS') || Input.isDown('ArrowDown');
    const goLeft  = Input.isDown('KeyA') || Input.isDown('ArrowLeft');
    const goRight = Input.isDown('KeyD') || Input.isDown('ArrowRight');
    let dx = (goRight ? 1 : 0) - (goLeft ? 1 : 0);
    let dy = (goDown  ? 1 : 0) - (goUp   ? 1 : 0);
    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
    this.moveDx = dx;
    this.moveDy = dy;
    let effectiveSpeed = this.speed;
    if (this.speedBoostTimer > 0) {
      this.speedBoostTimer -= dt;
      effectiveSpeed *= this.speedBoostMult;
      if (this.speedBoostTimer <= 0) { this.speedBoostTimer = 0; this.speedBoostMult = 1; }
    }
    this.x = clamp(this.x + dx * effectiveSpeed, this.radius, CONFIG.WORLD_W - this.radius);
    this.y = clamp(this.y + dy * effectiveSpeed, this.radius, CONFIG.WORLD_H - this.radius);
    // Update Jake's Lament compass direction every frame
    if (this.weapons.some(w => w.weaponId === 'jakes_lament')) {
      this.jakesDir = findDenseDirection(this, enemies);
    }

    // Facing direction (vertical takes priority in diagonals)
    if (goUp   && !goDown)  this.facing = 'up';
    else if (goDown  && !goUp)   this.facing = 'down';
    else if (goLeft  && !goRight) this.facing = 'left';
    else if (goRight && !goLeft)  this.facing = 'right';

    // Flash
    if (this.flashTimer > 0) this.flashTimer -= dt;
    if (this.iFrameTimer > 0) this.iFrameTimer -= dt;

    // Monkey Paw shield recharge
    if (this.shieldCooldown > 0 && !this.shieldActive) {
      this.shieldTimer -= dt;
      if (this.shieldTimer <= 0) {
        this.shieldActive = true;
        Particles.emit(this.x, this.y, '#ffd700', 16, 5);
      }
    }

    // Contact damage
    for (const e of enemies) {
      if (e.dead) continue;
      const d = dist(this.x, this.y, e.x, e.y);
      if (d < this.radius + e.radius) {
        const key = e.id;
        if (!this.contactTimers[key]) this.contactTimers[key] = 0;
        this.contactTimers[key] += dt;
        if (this.contactTimers[key] >= CONFIG.CONTACT_DAMAGE_INTERVAL) {
          this.contactTimers[key] = 0;
          if (this.iFrameTimer <= 0) {
            if (this.shieldActive) {
              this.shieldActive = false;
              this.shieldTimer = this.shieldCooldown;
              Particles.emit(this.x, this.y, '#ffd700', 20, 6);
            } else if (this.blockChance > 0 && Math.random() < this.blockChance) {
              Particles.emit(this.x, this.y, '#ffd700', 10, 4);
              this.iFrameTimer = 0.15;
            } else {
              const dmg = Math.max(1, e.strength - this.armor);
              this.health -= dmg;
              this.flashTimer = 0.15;
              Particles.emit(this.x, this.y, '#ff4136', 6, 3);
              if (this.health <= 0) Game.gameOver();
            }
          }
        }
      } else {
        this.contactTimers[e.id] = 0;
      }
    }

    // Weapon cooldowns and firing
    const cdMult = this.globalCDMultiplier * (this.charConfig.bonus.cooldownMultiplier || 1);
    for (const wi of this.weapons) {
      if (wi.cooldownRemaining > 0) {
        wi.cooldownRemaining -= dt;
        continue;
      }
      const fired = WeaponSystem.fire(wi, this, enemies);
      if (fired) {
        wi.cooldownRemaining = wi.computedStats.cooldown * cdMult;
      }
    }
  },

  draw(ctx) {
    this.glowPulse = (this.glowPulse || 0) + 0.04;
    const pulse = Math.sin(this.glowPulse) * 0.5 + 0.5; // 0..1

    // Outer ambient halo (large, faint, pulsing)
    const haloR = this.radius + 18 + pulse * 8;
    const halo = ctx.createRadialGradient(this.x, this.y, this.radius, this.x, this.y, haloR);
    halo.addColorStop(0, `rgba(0,255,65,${0.18 + pulse * 0.12})`);
    halo.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, haloR, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    // Inner rim glow
    const rimR = this.radius + 5 + pulse * 3;
    const rim = ctx.createRadialGradient(this.x, this.y, this.radius - 2, this.x, this.y, rimR);
    rim.addColorStop(0, `rgba(0,255,65,${0.35 + pulse * 0.2})`);
    rim.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, rimR, 0, Math.PI * 2);
    ctx.fillStyle = rim;
    ctx.fill();

    // ── Cycle set aura rings ─────────────────────────────────────
    const CYCLE_COLORS = { fire:'#ff7733', ice:'#66ddff', lightning:'#ffee44', death:'#cc66ff', arcane:'#44ffbb', demon:'#ff4466', blade:'#cccccc', life:'#66ff99' };
    const activeCycles = Object.entries(this.cycleBonus || {}).filter(([,stk]) => stk > 0);
    for (let ci = 0; ci < activeCycles.length; ci++) {
      const [key, stacks] = activeCycles[ci];
      const col = CYCLE_COLORS[key];
      const baseR = this.radius + 28 + ci * 11;
      const p2 = Math.sin(this.glowPulse * 1.3 + ci * 1.05) * 0.5 + 0.5;
      // Thin pulsing ring
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, baseR + p2 * 4, 0, Math.PI * 2);
      ctx.strokeStyle = col;
      ctx.globalAlpha = 0.22 + stacks * 0.09 + p2 * 0.08;
      ctx.lineWidth = 1.2 + stacks * 0.55;
      ctx.shadowBlur = 6 + stacks * 4;
      ctx.shadowColor = col;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
      // Orbiting dots — one per stack beyond zero
      const dotCount = stacks + 1;
      const orbitR = baseR + 5;
      const baseAngle = this.glowPulse * (0.75 + ci * 0.18);
      for (let di = 0; di < dotCount; di++) {
        const da = baseAngle + (Math.PI * 2 / dotCount) * di;
        ctx.beginPath();
        ctx.arc(this.x + Math.cos(da) * orbitR, this.y + Math.sin(da) * orbitR, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = col;
        ctx.globalAlpha = 0.55 + p2 * 0.35;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // Monkey Paw shield ring
    if (this.shieldActive) {
      const sp = Math.sin(this.glowPulse * 3) * 0.5 + 0.5;
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 10 + sp * 4, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,215,0,${0.7 + sp * 0.3})`;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 18;
      ctx.shadowColor = '#ffd700';
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();
    } else if (this.shieldCooldown > 0) {
      // Dim arc showing recharge progress
      const progress = 1 - (this.shieldTimer / this.shieldCooldown);
      ctx.save();
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius + 10, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,215,0,0.25)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    if (SpriteSheet.ready) {
      const spr = SPRITES[this.charConfig.id][this.facing];
      const dh = this.radius * 3.2;
      const dw = dh * (spr.w / spr.h);
      const dx = this.x - dw / 2;
      const dy = this.y - dh * 0.72;  // anchor toward feet

      if (this.flashTimer > 0) {
        ctx.save();
        ctx.globalAlpha = 0.7;
        ctx.filter = 'brightness(3) saturate(0) sepia(1) hue-rotate(320deg)';
      }
      ctx.drawImage(SpriteSheet.img, spr.x, spr.y, spr.w, spr.h, dx, dy, dw, dh);
      if (this.flashTimer > 0) { ctx.restore(); }
    } else {
      // Fallback: coloured circle + emoji
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.flashTimer > 0 ? '#ff4136' : '#001a06';
      ctx.fill();
      ctx.strokeStyle = this.flashTimer > 0 ? '#ff4136' : `rgba(0,255,65,${0.7 + pulse * 0.3})`;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = `${this.radius * 1.3}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.charConfig.icon, this.x, this.y);
    }
  }
};

// ── BEAMS (Jake's Lament visual) ──────────────────────────────

let Beams = [];

function updateBeams(dt) {
  for (let i = Beams.length - 1; i >= 0; i--) {
    Beams[i].life -= dt;
    if (Beams[i].life <= 0) Beams.splice(i, 1);
  }
}

// Direction toward densest enemy cluster (weighted by proximity)
function findDenseDirection(player, enemies) {
  const alive = enemies.filter(e => !e.dead);
  if (alive.length === 0) return null;
  let wx = 0, wy = 0;
  for (const e of alive) {
    const ddx = e.x - player.x, ddy = e.y - player.y;
    const d = Math.hypot(ddx, ddy) || 1;
    const w = 280 / (d + 40);
    wx += (ddx / d) * w;
    wy += (ddy / d) * w;
  }
  const len = Math.hypot(wx, wy);
  return len < 0.001 ? null : { x: wx / len, y: wy / len };
}

// Perpendicular distance from point (px,py) to ray from (ox,oy) in direction (dx,dy) up to range
function distToRay(px, py, ox, oy, dx, dy, range) {
  const ex = px - ox, ey = py - oy;
  const t = Math.max(0, Math.min(range, ex * dx + ey * dy));
  return Math.hypot(px - (ox + dx * t), py - (oy + dy * t));
}

function fireJakesBeam(player, dir, s, powerMult) {
  const beamWidth = 22;
  let totalDmg = 0;
  for (const e of Enemies) {
    if (e.dead) continue;
    if (distToRay(e.x, e.y, player.x, player.y, dir.x, dir.y, s.range) < beamWidth + e.radius) {
      const dmg = Math.round(s.damage * powerMult);
      applyDamage(e, dmg, s.armorPenetration, s.statusEffect, 0);
      totalDmg += dmg;
      Particles.emit(e.x, e.y, s.empowered ? '#ff44ff' : (powerMult < 1 ? '#ff9900' : '#ffee44'), 8, 3);
    }
  }
  if (s.lifesteal > 0 && totalDmg > 0) {
    player.health = Math.min(player.maxHealth, player.health + Math.round(totalDmg * s.lifesteal));
  }
  const color = s.empowered ? '#ff88ff' : (powerMult < 1 ? '#ff7700' : '#ffe066');
  const width = s.empowered ? 18 : (powerMult < 1 ? 6 : 10);
  Beams.push({
    x1: player.x, y1: player.y,
    x2: player.x + dir.x * s.range,
    y2: player.y + dir.y * s.range,
    life: 0.45, maxLife: 0.45,
    color, width, empowered: s.empowered || false,
  });
  // Empowered: burst of particles at the far endpoint
  if (s.empowered) {
    const ex = player.x + dir.x * s.range;
    const ey = player.y + dir.y * s.range;
    Particles.emit(ex, ey, '#ff44ff', 20, 6);
    Particles.emit(ex, ey, '#ffaaff', 10, 4);
  }
}

// ── CHRONO NEEDLES ────────────────────────────────────────────

let ChronoMarks = []; // { enemy, timer, maxTimer, baseDamage, startX, startY, multBonus, chain, statusEffect }

function updateChronoMarks(dt, enemies) {
  for (let i = ChronoMarks.length - 1; i >= 0; i--) {
    const m = ChronoMarks[i];
    m.timer -= dt;
    if (m.timer <= 0 || m.enemy.dead) {
      if (!m.enemy.dead) {
        const moved = Math.hypot(m.enemy.x - m.startX, m.enemy.y - m.startY);
        const mult = 1 + moved * (0.15 + (m.multBonus || 0));
        const dmg = Math.round(m.baseDamage * mult);
        applyDamage(m.enemy, dmg, 2, null, 0);
        Particles.emit(m.enemy.x, m.enemy.y, '#cc88ff', 20, 5);
        Beams.push({ x1: m.startX, y1: m.startY, x2: m.enemy.x, y2: m.enemy.y, life: 0.4, maxLife: 0.4, color: '#cc88ff', width: 4 });
        if (m.chain) {
          for (const e of enemies) {
            if (e.dead || e === m.enemy) continue;
            if (dist(e.x, e.y, m.enemy.x, m.enemy.y) < 80) {
              ChronoMarks.push({ enemy: e, timer: 2.0, maxTimer: 2.0, baseDamage: m.baseDamage, startX: e.x, startY: e.y, multBonus: m.multBonus, chain: false, statusEffect: m.statusEffect });
              if (m.statusEffect) applyStatusEffect(e, m.statusEffect);
            }
          }
        }
      }
      ChronoMarks.splice(i, 1);
    }
  }
}

// ── LEYLINE HARPS ─────────────────────────────────────────────

let HarpBeams = []; // { x1,y1, x2,y2, x3,y3, timer, maxTimer, damage, armorPen, statusEffect, pulse, pulseTimer, third, hitIds }

function updateHarpBeams(dt, enemies) {
  for (let i = HarpBeams.length - 1; i >= 0; i--) {
    const h = HarpBeams[i];
    h.timer -= dt;
    if (h.timer <= 0) { HarpBeams.splice(i, 1); continue; }

    const pairs = [[h.x1, h.y1, h.x2, h.y2]];
    if (h.third) {
      pairs.push([h.x2, h.y2, h.x3, h.y3]);
      pairs.push([h.x3, h.y3, h.x1, h.y1]);
    }

    // Pulse extra damage every second
    if (h.pulse) {
      h.pulseTimer -= dt;
      if (h.pulseTimer <= 0) {
        h.pulseTimer = 1.0;
        h.hitIds.clear();
        Particles.emit((h.x1 + h.x2) / 2, (h.y1 + h.y2) / 2, '#ffdd88', 8, 3);
      }
    }

    for (const e of enemies) {
      if (e.dead || h.hitIds.has(e.id)) continue;
      for (const [ax, ay, bx, by] of pairs) {
        if (distToSegment(e.x, e.y, ax, ay, bx, by) < e.radius + 10) {
          applyDamage(e, h.damage, h.armorPen, h.statusEffect, 0);
          h.hitIds.add(e.id);
          Particles.emit(e.x, e.y, '#ffdd44', 5, 2.5);
          break;
        }
      }
    }
  }
}

function distToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

// ── HUNGRY GRIMOIRES ──────────────────────────────────────────

let Grimoires = []; // { x, y, angle, speed, charges, maxCharges, orbitRadius, timer, feedOnKill, ... }

function updateGrimoires(dt, enemies, s) {
  for (const g of Grimoires) {
    if (g.dead) continue;
    g.angle += g.orbitSpeed;
    g.x = Player.x + Math.cos(g.angle) * g.orbitRadius;
    g.y = Player.y + Math.sin(g.angle) * g.orbitRadius;

    // Absorb enemy projectiles nearby
    for (let i = Projectiles.length - 1; i >= 0; i--) {
      const p = Projectiles[i];
      if (!p.isEnemyProjectile || p.dead) continue;
      if (dist(g.x, g.y, p.x, p.y) < 28) {
        p.dead = true;
        g.charges = Math.min(g.maxCharges, g.charges + 1);
        Particles.emit(g.x, g.y, '#ffaa44', 6, 2);
      }
    }

    // Feed on kills if upgraded (checked in killEnemy via grimoireKill hook)
    // Blast when fully charged
    if (g.charges >= g.maxCharges) {
      g.charges = 0;
      for (const e of enemies) {
        if (e.dead) continue;
        if (dist(g.x, g.y, e.x, e.y) < g.blastRadius + e.radius) {
          applyDamage(e, g.damage, g.armorPen, g.statusEffect, 0);
        }
        else if (dist(g.x, g.y, e.x, e.y) < g.blastRadius * 2 + e.radius) {
          applyDamage(e, Math.round(g.damage * 0.5), g.armorPen, null, 0);
        }
      }
      Particles.emit(g.x, g.y, '#ffaa44', 40, 8);
      Beams.push({ x1: g.x, y1: g.y, x2: g.x, y2: g.y, life: 0.4, maxLife: 0.4, color: '#ffaa44', width: 0 });
    }
  }
  Grimoires = Grimoires.filter(g => !g.dead);
}

// ── MIRROR GLYPHS ─────────────────────────────────────────────

let Mirrors = [];
let MirrorEchoTemplate = null; // { projectileSpeed, damage, armorPen, pierce, statusEffect, acceleration }

function updateMirrors(dt, enemies) {
  for (const m of Mirrors) {
    if (m.dead) continue;
    m.angle += m.orbitSpeed;
    m.x = Player.x + Math.cos(m.angle) * m.orbitRadius;
    m.y = Player.y + Math.sin(m.angle) * m.orbitRadius;

    m.cooldownRemaining -= dt;
    if (m.cooldownRemaining <= 0 && MirrorEchoTemplate) {
      const alive = enemies.filter(e => !e.dead);
      if (alive.length > 0) {
        m.cooldownRemaining = m.cooldown;
        const tpl = MirrorEchoTemplate;
        let closest = null, closestSq = Infinity;
        for (const e of alive) {
          const dx = e.x - m.x, dy = e.y - m.y;
          const sq = dx * dx + dy * dy;
          if (sq < closestSq) { closestSq = sq; closest = e; }
        }
        const angle = Math.atan2(closest.y - m.y, closest.x - m.x);
        const spd = tpl.projectileSpeed || 7;
        const dmg = Math.round(tpl.damage * m.power);
        Particles.emit(m.x, m.y, '#aaddff', 8, 3);
        Projectiles.push({
          id: mkId(),
          x: m.x, y: m.y,
          vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
          damage: dmg, armorPen: tpl.armorPen || 0,
          pierce: tpl.pierce || 0, pierceLeft: tpl.pierce || 0,
          bounce: 0, bounceLeft: 0, bounceCount: 0,
          range: tpl.range || 600, traveledSq: 0,
          chainCount: 0, chainRange: 0,
          areaRadius: 0, areaDamageMultiplier: 0,
          pullRadius: 0, pullStrength: 0,
          weaponId: 'mirror_glyph',
          statusEffect: tpl.statusEffect ? { ...tpl.statusEffect } : null,
          hitIds: new Set(), dead: false,
          icon: '🪞',
          splitProjectiles: 0, splitDamageMultiplier: 0,
          damagePerBounce: 1, finalHitDamageMultiplier: 1, finalHitStun: 0,
          groundEffect: null, followupMeteors: 0, followupDamageMultiplier: 0,
          isMeteor: false, isSpiral: false,
          isOrbit: false, isBox: false, isWhirl: false,
          isShadowBolt: false, isMagicMissile: false, isBoneSpear: false, pierceHitCount: 0,
          wobblePhase: 0, acceleration: tpl.acceleration || 1,
          runeBlastCount: 0, runeBlastDamage: 0,
          isChrono: false, chronoDelay: 0, chronoBaseDamage: 0, chronoMultiplierBonus: 0, chronoChain: false,
          targetEnemy: closest, targetX: closest.x, targetY: closest.y,
          boxReverse: false,
        });
      }
    }
  }
  Mirrors = Mirrors.filter(m => {
    if (m.dead) { _killMirror(m); return false; }
    return true;
  });
}

function _killMirror(m) {
  if (m.explosion) {
    for (const e of Enemies) {
      if (!e.dead && dist(m.x, m.y, e.x, e.y) < 70 + e.radius) {
        applyDamage(e, 50, 2, null, 0);
      }
    }
    Particles.emit(m.x, m.y, '#aaddff', 28, 7);
  } else {
    Particles.emit(m.x, m.y, '#aaddff', 12, 3);
  }
}

// ── ARCANE RIFTS ──────────────────────────────────────────────

let Rifts = [];

function makeRiftPoints(cx, cy) {
  const len = 55 + Math.random() * 45;
  const angle = Math.random() * Math.PI;
  const steps = 5 + Math.floor(Math.random() * 4);
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = (i / steps) - 0.5;
    const jitter = (Math.random() - 0.5) * 22;
    pts.push({
      x: cx + Math.cos(angle) * t * len + Math.sin(angle) * jitter,
      y: cy + Math.sin(angle) * t * len - Math.cos(angle) * jitter,
    });
  }
  return pts;
}

function updateRifts(dt, enemies) {
  for (const r of Rifts) {
    if (r.dead) continue;
    r.timer -= dt;
    if (r.timer <= 0) {
      if (r.healOnExpire > 0) {
        Player.health = Math.min(Player.maxHealth, Player.health + r.healOnExpire);
        Particles.emit(r.x, r.y, '#88ff88', 10, 4);
      }
      r.dead = true; continue;
    }
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist(r.x, r.y, e.x, e.y) < 26 + e.radius) {
        _detonateRift(r, enemies);
        break;
      }
    }
  }
  Rifts = Rifts.filter(r => !r.dead);
}

function _detonateRift(r, enemies) {
  if (r.dead) return;
  r.dead = true;
  for (const e of enemies) {
    if (e.dead) continue;
    if (dist(r.x, r.y, e.x, e.y) < r.areaRadius + e.radius) {
      applyDamage(e, r.damage, r.armorPen, r.statusEffect, 0);
    }
  }
  Particles.emit(r.x, r.y, '#aaddff', 32, 8);
  Beams.push({ x1: r.x - 40, y1: r.y, x2: r.x + 40, y2: r.y, life: 0.3, maxLife: 0.3, color: '#88ccff', width: 3 });
  if (r.chain) {
    for (const other of Rifts) {
      if (!other.dead && other !== r && dist(r.x, r.y, other.x, other.y) < 220) {
        _detonateRift(other, enemies);
      }
    }
  }
}

// ── WARD SHELLS ───────────────────────────────────────────────

let WardShells = [];

function updateWardShells(dt, enemies) {
  for (const sh of WardShells) {
    if (sh.dead) continue;
    sh.x = Player.x;
    sh.y = Player.y;
    sh.timer -= dt;
    if (sh.timer <= 0) { sh.dead = true; continue; }

    // Destroy enemy projectiles inside the shell
    for (const p of Projectiles) {
      if (p.dead || !p.isEnemyProjectile) continue;
      if (dist(sh.x, sh.y, p.x, p.y) < sh.radius) {
        p.dead = true;
        Particles.emit(p.x, p.y, '#66bbff', 5, 2);
      }
    }

    // Hit-refresh so enemies can be re-hit while in the shell
    sh.hitRefreshTimer -= dt;
    if (sh.hitRefreshTimer <= 0) { sh.hitIds.clear(); sh.hitRefreshTimer = 0.45; }

    // Damage and repel enemies that touch the shell
    for (const e of enemies) {
      if (e.dead || sh.hitIds.has(e.id)) continue;
      const d = dist(sh.x, sh.y, e.x, e.y);
      if (d < sh.radius + e.radius) {
        sh.hitIds.add(e.id);
        applyDamage(e, sh.damage, sh.armorPen, sh.statusEffect, 0);
        Particles.emit(e.x, e.y, '#66bbff', 6, 2.5);
        // Push outward
        const dx = e.x - sh.x, dy = e.y - sh.y;
        const len = Math.hypot(dx, dy) || 1;
        e.x = clamp(sh.x + (dx / len) * (sh.radius + e.radius + 8), e.radius, CONFIG.WORLD_W - e.radius);
        e.y = clamp(sh.y + (dy / len) * (sh.radius + e.radius + 8), e.radius, CONFIG.WORLD_H - e.radius);
      }
    }
  }
  WardShells = WardShells.filter(sh => !sh.dead);
}

// ── ARCANE SPIKES ─────────────────────────────────────────────

let Spikes = [];

function updateSpikes(dt, enemies) {
  for (const sp of Spikes) {
    if (sp.dead) continue;
    sp.timer -= dt;
    if (sp.timer <= 0) { sp.dead = true; continue; }

    sp.hitRefreshTimer -= dt;
    if (sp.hitRefreshTimer <= 0) { sp.hitIds.clear(); sp.hitRefreshTimer = 0.5; }

    for (const e of enemies) {
      if (e.dead || sp.hitIds.has(e.id)) continue;
      if (dist(sp.x, sp.y, e.x, e.y) < sp.radius + e.radius) {
        sp.hitIds.add(e.id);
        applyDamage(e, sp.damage, sp.armorPen, sp.statusEffect, 0);
        Particles.emit(sp.x, sp.y, '#ff5533', 6, 3);
      }
    }
  }
  Spikes = Spikes.filter(sp => !sp.dead);
}

function updateTriadOrbs(dt, enemies) {
  for (let i = TriadOrbs.length - 1; i >= 0; i--) {
    const t = TriadOrbs[i];
    t.timer -= dt;
    if (t.timer <= 0) { TriadOrbs.splice(i, 1); continue; }
    for (const orb of t.orbs) {
      orb.angle += t.primarySpeed;
      const px = Player.x + Math.cos(orb.angle) * t.primaryRadius;
      const py = Player.y + Math.sin(orb.angle) * t.primaryRadius;
      orb.hitRefreshTimer -= dt;
      if (orb.hitRefreshTimer <= 0) { orb.hitIds.clear(); orb.hitRefreshTimer = 0.5; }
      for (const e of enemies) {
        if (e.dead || orb.hitIds.has(e.id)) continue;
        if (dist(px, py, e.x, e.y) < e.radius + 12) {
          orb.hitIds.add(e.id);
          applyDamage(e, t.damage, t.armorPen, t.statusEffect, 0);
          Particles.emit(px, py, t.empowered ? '#ffdd88' : '#44ffbb', 6, 3);
        }
      }
      for (const sub of orb.subs) {
        sub.angle += t.subSpeed;
        const sx = px + Math.cos(sub.angle) * t.subRadius;
        const sy = py + Math.sin(sub.angle) * t.subRadius;
        sub.hitRefreshTimer -= dt;
        if (sub.hitRefreshTimer <= 0) { sub.hitIds.clear(); sub.hitRefreshTimer = 0.5; }
        for (const e of enemies) {
          if (e.dead || sub.hitIds.has(e.id)) continue;
          if (dist(sx, sy, e.x, e.y) < e.radius + 7) {
            sub.hitIds.add(e.id);
            applyDamage(e, t.subDamage, t.armorPen, t.statusEffect, 0);
            Particles.emit(sx, sy, t.empowered ? '#ffaa44' : '#88ffdd', 3, 2);
          }
        }
      }
    }
  }
}

// ── WEAPON SYSTEM ─────────────────────────────────────────────

const WeaponSystem = {
  fire(wi, player, enemies) {
    const s = wi.computedStats;
    const alive = enemies.filter(e => !e.dead);

    // Save echo template for Mirror Glyph (from any projectile-firing weapon)
    if (wi.weaponId !== 'mirror_glyph' && s.projectileSpeed > 0 &&
        !['orbit', 'box', 'trail', 'pulse', 'grimoire', 'harp', 'mirror', 'decoy', 'nova', 'rift', 'sauce', 'shell', 'spikes', 'furthest', 'hackcircle', 'triad', 'corpseblast', 'gravebomb'].includes(s.targeting)) {
      MirrorEchoTemplate = {
        projectileSpeed: s.projectileSpeed,
        damage: s.damage,
        armorPen: s.armorPenetration,
        pierce: s.pierce,
        range: s.range,
        statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
        acceleration: s.projectileAcceleration || 1,
      };
    }

    // Mirror: spawns orbiting mirror(s) that echo the last projectile fired.
    // Mirrors persist continuously (full orbit); only respawn when count changes.
    if (s.targeting === 'mirror') {
      const count = s.mirrorCount || 1;
      const existing = Mirrors.filter(m => !m.dead && m.weaponId === wi.weaponId);
      if (existing.length !== count) {
        for (const m of Mirrors) { if (m.weaponId === wi.weaponId) { m.dead = true; } }
        for (let i = 0; i < count; i++) {
          Mirrors.push({
            x: player.x, y: player.y,
            angle: (Math.PI * 2 / count) * i,
            orbitRadius: s.range,
            orbitSpeed: 0.042 + i * 0.015,
            cooldown: s.cooldown || 1.2,
            cooldownRemaining: 0.3,
            power: s.mirrorPower,
            explosion: s.mirrorExplosion,
            weaponId: wi.weaponId,
            dead: false,
          });
        }
      } else {
        // Keep existing mirrors alive; just sync stats that upgrades may have changed
        for (const m of existing) {
          m.power = s.mirrorPower;
          m.cooldown = s.cooldown || 1.2;
          m.orbitRadius = s.range;
          m.explosion = s.mirrorExplosion;
        }
      }
      return true;
    }

    // Radial: always fires a ring in all directions regardless of aim mode
    if (s.targeting === 'radial') {
      const count = s.radialCount || 8;
      const offset = s.angleOffset || 0;
      for (let i = 0; i < count; i++) {
        this.spawnProjectile(player, offset + (Math.PI * 2 / count) * i, wi, s, null);
      }
      return true;
    }

    // Box: 4 walls sweep simultaneously around the player (direction alternates each cast)
    if (s.targeting === 'box') {
      s.boxReverse = !s.boxReverse;
      for (let i = 0; i < 4; i++) {
        this.spawnBoxProjectile(player, i, s.range, wi, s);
      }
      return true;
    }

    // Trail: drops a ground effect sphere at player position
    if (s.targeting === 'trail') {
      if (s.groundEffect) {
        GroundEffects.add(player.x, player.y, s.areaRadius, s.groundEffect.type, s.groundEffect.duration, s.groundEffect.dps);
        if (s.empowered) Particles.emit(player.x, player.y, '#ffaa00', 8, 3);
      }
      return true;
    }

    // Pulse: single expanding ring that pushes enemies outward
    if (s.targeting === 'pulse') {
      Projectiles.push({
        id: mkId(), x: player.x, y: player.y, vx: 0, vy: 0,
        damage: s.damage, armorPen: s.armorPenetration,
        pierce: 99, pierceLeft: 99, bounce: 0, bounceLeft: 0, bounceCount: 0,
        range: s.range, traveledSq: 0,
        chainCount: 0, chainRange: 0, areaRadius: 0, areaDamageMultiplier: 0,
        pullRadius: 0, pullStrength: 0, weaponId: wi.weaponId,
        statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
        hitIds: new Set(), dead: false,
        icon: CONFIG.weapons.find(w => w.id === wi.weaponId).icon,
        splitProjectiles: 0, splitDamageMultiplier: 0,
        damagePerBounce: 1, finalHitDamageMultiplier: 1, finalHitStun: 0,
        groundEffect: null, followupMeteors: 0, followupDamageMultiplier: 0,
        isMeteor: false, isSpiral: false, isBox: false,
        isPulse: true, pulseRadius: 0, pulseSpeed: s.projectileSpeed, knockback: s.knockback,
        empowered: s.empowered || false,
        targetEnemy: null, targetX: player.x, targetY: player.y,
      });
      return true;
    }

    // Wings: fires bolts perpendicular to enemy direction (sideways from both sides)
    if (s.targeting === 'wings') {
      let aimAngle;
      if (!Input.autoAim) {
        const mw = Input.mouseWorld();
        aimAngle = Math.atan2(mw.y - player.y, mw.x - player.x);
      } else {
        if (alive.length === 0) return false;
        let closest = null, closestSq = Infinity;
        for (const e of alive) {
          const dx = e.x - player.x, dy = e.y - player.y;
          const sq = dx * dx + dy * dy;
          if (sq < closestSq) { closestSq = sq; closest = e; }
        }
        aimAngle = Math.atan2(closest.y - player.y, closest.x - player.x);
      }
      const leftBase  = aimAngle + Math.PI / 2;
      const rightBase = aimAngle - Math.PI / 2;
      const n = s.projectileCount || 3;
      for (let t = 0; t < n; t++) {
        const spread = (t - (n - 1) / 2) * s.spreadAngle;
        this.spawnProjectile(player, leftBase  + spread, wi, s, null);
        this.spawnProjectile(player, rightBase + spread, wi, s, null);
      }
      return true;
    }

    // Orbit: one or more blades circling the player
    if (s.targeting === 'orbit') {
      const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
      const count = s.projectileCount || 1;
      const icon  = wConfig.icon;
      for (let i = 0; i < count; i++) {
        const startAngle = (Math.PI * 2 / count) * i;
        const baseOrbitSpeed = s.orbitSpeed || wConfig.orbitSpeed || 0.12;
        const speed = i % 2 === 0 ? baseOrbitSpeed : -baseOrbitSpeed;
        Projectiles.push({
          id: mkId(),
          x: player.x + Math.cos(startAngle) * s.range,
          y: player.y + Math.sin(startAngle) * s.range,
          vx: 0, vy: 0,
          damage: s.damage, armorPen: s.armorPenetration,
          pierce: 99, pierceLeft: 99, bounce: 0, bounceLeft: 0, bounceCount: 0,
          range: s.range, traveledSq: 0,
          chainCount: 0, chainRange: 0,
          areaRadius: s.areaRadius, areaDamageMultiplier: s.areaDamageMultiplier,
          pullRadius: 0, pullStrength: 0, weaponId: wi.weaponId,
          statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
          hitIds: new Set(), dead: false, icon,
          splitProjectiles: 0, splitDamageMultiplier: 0,
          damagePerBounce: 1, finalHitDamageMultiplier: 1, finalHitStun: 0,
          groundEffect: null, followupMeteors: 0, followupDamageMultiplier: 0,
          isMeteor: false, acceleration: 1, isBox: false,
          isOrbit: true,
          orbitAngle: startAngle,
          orbitRadius: s.range,
          orbitSpeed: speed,
          lifetimer: s.orbitDuration || 5.0,
          hitRefreshTimer: 0.5,
          isPhasing: s.phasing,
          phased: false,
          phaseTimer: s.phaseDuration,
          phaseDuration: s.phaseDuration,
          chargesUp: s.chargesUp || false,
          chargeRate: s.chargeRate || 0,
          chargeAccumTimer: 0,
          empowered: s.empowered || false,
          targetEnemy: null, targetX: player.x, targetY: player.y,
        });
      }
      return true;
    }

    // Starfall: rain mini-meteors at random locations within range
    if (s.targeting === 'starfall') {
      const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
      const count = s.projectileCount || 6;
      for (let i = 0; i < count; i++) {
        const ang = Math.random() * Math.PI * 2;
        const r   = (0.25 + Math.random() * 0.75) * s.range;
        const tx  = clamp(player.x + Math.cos(ang) * r, 0, CONFIG.WORLD_W);
        const ty  = clamp(player.y + Math.sin(ang) * r, 0, CONFIG.WORLD_H);
        const ba  = Math.atan2(ty - player.y, tx - player.x);
        Projectiles.push({
          id: mkId(), x: player.x, y: player.y,
          vx: Math.cos(ba) * s.projectileSpeed, vy: Math.sin(ba) * s.projectileSpeed,
          damage: s.damage, armorPen: s.armorPenetration,
          pierce: s.pierce, pierceLeft: s.pierce, bounce: 0, bounceLeft: 0, bounceCount: 0,
          range: r * 3, traveledSq: 0,
          chainCount: 0, chainRange: 0,
          areaRadius: s.areaRadius, areaDamageMultiplier: s.areaDamageMultiplier,
          pullRadius: 0, pullStrength: 0, weaponId: wi.weaponId,
          statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
          hitIds: new Set(), dead: false, icon: wConfig.icon,
          splitProjectiles: 0, splitDamageMultiplier: 0,
          damagePerBounce: 1, finalHitDamageMultiplier: 1, finalHitStun: 0,
          groundEffect: s.groundEffect || null, followupMeteors: 0, followupDamageMultiplier: 0,
          isMeteor: true, acceleration: 1, isOrbit: false, isBox: false,
          empowered: s.empowered || false,
          targetEnemy: null, targetX: tx, targetY: ty,
        });

    // Jake's Lament: beam toward densest cluster, only fires while moving toward it

    // Arcane Spikes: plant static spike traps at far range
    if (s.targeting === 'spikes') {

      for (let t = 0; t < count; t++) {

    if (s.targeting === 'furthest') {

        if (sq > maxSq) { maxSq = sq; target = e; }
      }
      const baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
      for (let t = 0; t < s.projectileCount; t++) {
        const spread = s.projectileCount > 1 ? (t - (s.projectileCount - 1) / 2) * s.spreadAngle : 0;
        this.spawnProjectile(player, baseAngle + spread, wi, s, target);
      }
      return true;
    }

    if (s.targeting === 'highestThreat') {
      if (alive.length === 0) return false;
      let closest = null, closestSq = Infinity;
      for (const e of alive) {
        const dx = e.x - player.x, dy = e.y - player.y;
        const sq = dx * dx + dy * dy;
        if (sq < closestSq) { closestSq = sq; closest = e; }
      }
      const baseAngle = Math.atan2(closest.y - player.y, closest.x - player.x);
      for (let t = 0; t < s.projectileCount; t++) {
        const spread = s.projectileCount > 1 ? (t - (s.projectileCount - 1) / 2) * s.spreadAngle : 0;
        this.spawnProjectile(player, baseAngle + spread, wi, s, closest);
      }
      return true;
    }

    // Mouse-aim mode: fire toward cursor regardless of enemy presence
    if (!Input.autoAim) {
      const mw = Input.mouseWorld();
      const angle = Math.atan2(mw.y - player.y, mw.x - player.x);
      for (let t = 0; t < s.projectileCount; t++) {
        const spread = s.projectileCount > 1 ? (t - (s.projectileCount - 1) / 2) * s.spreadAngle : 0;
        this.spawnProjectile(player, angle + spread, wi, s, null);
      }
      return true;
    }

    if (alive.length === 0) return false;

    // Auto-aim: closest enemy by squared distance — no sqrt needed
    const px = player.x, py = player.y;
    let closest = null, closestSq = Infinity;
    for (const e of alive) {
      const dx = e.x - px, dy = e.y - py;
      const sq = dx * dx + dy * dy;
      if (sq < closestSq) { closestSq = sq; closest = e; }
    }
    if (!closest) return false;

    const baseAngle = Math.atan2(closest.y - py, closest.x - px);
    for (let t = 0; t < s.projectileCount; t++) {
      const spread = s.projectileCount > 1 ? (t - (s.projectileCount - 1) / 2) * s.spreadAngle : 0;
      this.spawnProjectile(player, baseAngle + spread, wi, s, closest);
    }
    return true;
  },

  spawnProjectile(player, angle, wi, s, target) {
    Projectiles.push({
      id: mkId(),
      x: player.x,
      y: player.y,
      vx: Math.cos(angle) * s.projectileSpeed,
      vy: Math.sin(angle) * s.projectileSpeed,
      damage: s.damage,
      armorPen: s.armorPenetration,
      pierce: s.pierce,
      pierceLeft: s.pierce,
      bounce: s.bounce,
      bounceLeft: s.bounce,
      bounceCount: 0,
      range: s.range,
      traveledSq: 0,
      chainCount: s.chainCount,
      chainRange: s.chainRange,
      areaRadius: s.areaRadius,
      areaDamageMultiplier: s.areaDamageMultiplier,
      pullRadius: s.pullRadius || 0,
      pullStrength: s.pullStrength || 0,
      weaponId: wi.weaponId,
      statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
      hitIds: new Set(),
      dead: false,
      icon: CONFIG.weapons.find(w => w.id === wi.weaponId).icon,
      splitProjectiles: s.splitProjectiles || 0,
      splitDamageMultiplier: s.splitDamageMultiplier || 0,
      damagePerBounce: s.damagePerBounce || 1,
      finalHitDamageMultiplier: s.finalHitDamageMultiplier || 1,
      finalHitStun: s.finalHitStun || 0,
      groundEffect: s.groundEffect || null,
      followupMeteors: s.followupMeteors || 0,
      followupDamageMultiplier: s.followupDamageMultiplier || 0,
      isMeteor: wi.weaponId === 'meteor_sigil',
      isShadowBolt: wi.weaponId === 'shadow_bolt',
      isMagicMissile: wi.weaponId === 'magic_missiles',
      isBoneSpear: wi.weaponId === 'bone_spear',
      isMagmaOrb: wi.weaponId === 'magma_orb',
      isViceroyMissile: wi.weaponId === 'viceroy_missile',
      isBlackSauce: wi.weaponId === 'stax_black_sauce',
      isSlash: wi.weaponId === 'afro_samurai_blade',
      isHammer: wi.weaponId === 'hammer_toss',
      isBoltgunShell: wi.weaponId === 'boltgunz',
      empowered: s.empowered || false,
      pierceHitCount: 0,
      wobblePhase: Math.random() * Math.PI * 2,
      acceleration: s.projectileAcceleration || 1,
      isWhirl: false, curveRate: 0,
      runeBlastCount: s.runeBlastCount || 0,
      runeBlastDamage: s.runeBlastDamage || 0,
      runeBlastRange: s.runeBlastRange || 300,
      runeBlastSpeed: s.runeBlastSpeed || 5.5,
      runeBlastPierce: s.runeBlastPierce || 0,
      isChrono: s.isChrono || false,
      chronoDelay: s.chronoDelay || 2.0,
      chronoBaseDamage: s.chronoBaseDamage || 12,
      chronoMultiplierBonus: s.chronoMultiplierBonus || 0,
      chronoChain: s.chronoChain || false,
      lifesteal: s.lifesteal || 0,
      returning: false,
      targetEnemy: target,
      targetX: target ? target.x : player.x,
      targetY: target ? target.y : player.y,
      isRecall: false, isDashBlade: wi.weaponId === 'void_stride', isCorpse: false,
    });
  },

  spawnBoxProjectile(player, wall, boxSize, wi, s) {
    const wConfig = CONFIG.weapons.find(w => w.id === wi.weaponId);
    const totalDist = boxSize * 2;
    // Each wall starts at one corner and sweeps to the next, all simultaneously
    // Wall 0: top,    left→right  (-bs,-bs) → (+bs,-bs)
    // Wall 1: right,  top→bottom  (+bs,-bs) → (+bs,+bs)
    // Wall 2: bottom, right→left  (+bs,+bs) → (-bs,+bs)
    // Wall 3: left,   bottom→top  (-bs,+bs) → (-bs,-bs)
    const bs = boxSize;
    const corners = [[-bs,-bs],[bs,-bs],[bs,bs],[-bs,bs]];
    const [cx, cy] = corners[wall];
    Projectiles.push({
      id: mkId(),
      x: player.x + cx, y: player.y + cy,
      vx: 0, vy: 0,
      damage: s.damage, armorPen: s.armorPenetration,
      pierce: s.pierce, pierceLeft: s.pierce,
      bounce: 0, bounceLeft: 0, bounceCount: 0,
      range: totalDist, traveledSq: 0,
      chainCount: 0, chainRange: 0,
      areaRadius: s.areaRadius, areaDamageMultiplier: s.areaDamageMultiplier,
      pullRadius: 0, pullStrength: 0,
      weaponId: wi.weaponId,
      statusEffect: s.statusEffect ? { ...s.statusEffect } : null,
      hitIds: new Set(), dead: false,
      icon: wConfig.icon,
      splitProjectiles: 0, splitDamageMultiplier: 0,
      damagePerBounce: 1, finalHitDamageMultiplier: 1, finalHitStun: 0,
      groundEffect: null,
      followupMeteors: 0, followupDamageMultiplier: 0,
      isMeteor: false, isSpiral: false,
      isBox: true,
      boxWall: wall,
      boxSize: bs,
      boxProgress: 0,
      boxSpeed: s.projectileSpeed / totalDist,
      boxReverse: s.boxReverse || false,
      empowered: s.empowered || false,
      targetEnemy: null, targetX: player.x, targetY: player.y,
    });
  }
};

// ── PROJECTILES ───────────────────────────────────────────────

let Projectiles = [];
let TriadOrbs = []; // { weaponId, damage, subDamage, armorPen, statusEffect, primaryRadius, subRadius, primarySpeed, subSpeed, triadCount, orbs, timer, empowered }

// ── DECOYS ────────────────────────────────────────────────────

let Decoys = [];

function updateDecoys(dt, enemies) {
  for (const d of Decoys) {
    if (d.dead) continue;
    d.timer -= dt;
    if (d.flashTimer > 0) d.flashTimer -= dt;
    if (d.timer <= 0) { _killDecoy(d); continue; }
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist(d.x, d.y, e.x, e.y) < d.radius + e.radius) {
        d.contactTimers[e.id] = (d.contactTimers[e.id] || 0) + dt;
        if (d.contactTimers[e.id] >= CONFIG.CONTACT_DAMAGE_INTERVAL) {
          d.contactTimers[e.id] = 0;
          d.hp -= e.strength;
          d.flashTimer = 0.15;
          Particles.emit(d.x, d.y, '#ff4136', 4, 2);
          if (d.hp <= 0) { _killDecoy(d); break; }
        }
      } else {
        d.contactTimers[e.id] = 0;
      }
    }
  }
  Decoys = Decoys.filter(d => !d.dead);
}

function _killDecoy(d) {
  d.dead = true;
  if (d.explosive) {
    const exDmg = d.explosionDamage || 60;
    const exRad = d.explosionRadius || 120;
    for (const e of Enemies) {
      if (!e.dead && dist(d.x, d.y, e.x, e.y) < exRad) {
        applyDamage(e, exDmg, 2, null, 0);
      }
    }
    Particles.emit(d.x, d.y, '#ff8800', 30, 7);
  } else {
    Particles.emit(d.x, d.y, '#88ccff', 16, 4);
  }
}

function getDecoyTarget() {
  return Decoys.find(d => !d.dead) || null;
}

function updateProjectiles(dt, enemies) {
  const toAdd = [];

  for (let i = Projectiles.length - 1; i >= 0; i--) {
    const p = Projectiles[i];
    if (p.dead) { Projectiles.splice(i, 1); continue; }

    // Pulse: expanding ring — handles all its own logic then skips normal collision
    if (p.isPulse) {
      const prevR = p.pulseRadius;
      p.pulseRadius += p.pulseSpeed;
      p.x = Player.x;
      p.y = Player.y;
      if (p.pulseRadius >= p.range) { p.dead = true; Projectiles.splice(i, 1); continue; }
      for (const e of enemies) {
        if (e.dead || p.hitIds.has(e.id)) continue;
        const d = dist(Player.x, Player.y, e.x, e.y);
        if (d <= p.pulseRadius && d > prevR) {
          p.hitIds.add(e.id);
          if (p.damage > 0) applyDamage(e, p.damage, p.armorPen, p.statusEffect, 0);
          else if (p.statusEffect) applyDamage(e, 0, 0, p.statusEffect, 0);
          const dx = e.x - Player.x, dy = e.y - Player.y;
          const len = Math.hypot(dx, dy) || 1;
          e.x = clamp(e.x + (dx / len) * p.knockback, e.radius, CONFIG.WORLD_W - e.radius);
          e.y = clamp(e.y + (dy / len) * p.knockback, e.radius, CONFIG.WORLD_H - e.radius);
          Particles.emit(e.x, e.y, '#88ccff', 4, 3);
        }
      }
      continue;
    }

    // Pull effect
    if (p.pullRadius > 0) {
      for (const e of enemies) {
        if (e.dead) continue;
        const d = dist(p.x, p.y, e.x, e.y);
        if (d < p.pullRadius && d > 1) {
          const pull = p.pullStrength;
          e.x += ((p.x - e.x) / d) * pull;
          e.y += ((p.y - e.y) / d) * pull;
        }
      }
    }

    // Meteor homing phase — track target X/Y
    if (p.isMeteor && p.targetEnemy && !p.targetEnemy.dead) {
      p.targetX = p.targetEnemy.x;
      p.targetY = p.targetEnemy.y;
    }

    if (p.isBox) {
      p.boxProgress += p.boxSpeed;
      if (p.boxProgress >= 1) {
        // Volatile Corners: explode at the endpoint
        if (p.areaRadius > 0) {
          Particles.emit(p.x, p.y, '#88ccff', 14, 5);
          for (const e of enemies) {
            if (!e.dead && dist(p.x, p.y, e.x, e.y) < p.areaRadius + e.radius) {
              applyDamage(e, Math.round(p.damage * p.areaDamageMultiplier), p.armorPen, null, 0);
            }
          }
        }
        p.dead = true; continue;
      }
      // Map progress (0→1) to position along each wall; direction alternates each cast
      const t = p.boxProgress * 2 - 1; // -1 to +1
      const rt = p.boxReverse ? -t : t;
      const bs = p.boxSize;
      if      (p.boxWall === 0) { p.x = Player.x + rt * bs; p.y = Player.y - bs; }
      else if (p.boxWall === 1) { p.x = Player.x - bs;      p.y = Player.y + rt * bs; }
      else if (p.boxWall === 2) { p.x = Player.x + rt * bs; p.y = Player.y + bs; }
      else                      { p.x = Player.x + bs;      p.y = Player.y + rt * bs; }
    } else if (p.isOrbit) {
      p.lifetimer -= dt;
      if (p.lifetimer <= 0) { p.dead = true; continue; }
      p.hitRefreshTimer -= dt;
      if (p.hitRefreshTimer <= 0) { p.hitIds.clear(); p.hitRefreshTimer = 0.5; }
      if (p.chargesUp) p.chargeAccumTimer += dt;
      p.orbitAngle += p.orbitSpeed;
      p.x = Player.x + Math.cos(p.orbitAngle) * p.orbitRadius;
      p.y = Player.y + Math.sin(p.orbitAngle) * p.orbitRadius;
      // Phasing: cycle solid ↔ ethereal
      if (p.isPhasing) {
        p.phaseTimer -= dt;
        if (p.phaseTimer <= 0) {
          p.phased = !p.phased;
          p.phaseTimer = p.phaseDuration;
          if (!p.phased) Particles.emit(p.x, p.y, '#aa88ff', 8, 3);
        }
        if (p.phased) continue; // ethereal: skip collision
      }
    } else {
      // Soul Whirl: continuously curve the velocity vector
      if (p.isWhirl) {
        if (p.returnsToPlayer && !p.returning && p.traveledSq > p.range * 0.5) {
          p.returning = true;
          p.curveRate = -p.curveRate;
          p.hitIds.clear();
        }
        const spd = Math.hypot(p.vx, p.vy);
        const a = Math.atan2(p.vy, p.vx) + p.curveRate;
        p.vx = Math.cos(a) * spd; p.vy = Math.sin(a) * spd;
      }
      // Shadow Bolt: sinusoidal wobble perpendicular to travel
      if (p.isShadowBolt) {
        const spd = Math.hypot(p.vx, p.vy);
        const fwd = Math.atan2(p.vy, p.vx);
        const wobble = Math.sin(p.wobblePhase + p.traveledSq * 0.045) * 0.07;
        const a = fwd + wobble;
        p.vx = Math.cos(a) * spd; p.vy = Math.sin(a) * spd;
      }
      // Viceroy Missile: chaotic random wobble
      if (p.isViceroyMissile && Math.random() < 0.12) {
        const jolt = (Math.random() - 0.5) * 0.55;
        const spd = Math.hypot(p.vx, p.vy);
        const a = Math.atan2(p.vy, p.vx) + jolt;
        p.vx = Math.cos(a) * spd; p.vy = Math.sin(a) * spd;
      }
      // Magma Orb: slow but persistent homing toward nearest alive enemy
      if (p.isMagmaOrb && enemies.length > 0) {
        let nearestE = null, nearestSq = Infinity;
        for (const e of enemies) {
          if (e.dead) continue;
          const sq = (e.x - p.x) ** 2 + (e.y - p.y) ** 2;
          if (sq < nearestSq) { nearestSq = sq; nearestE = e; }
        }
        if (nearestE) {
          const desired = Math.atan2(nearestE.y - p.y, nearestE.x - p.x);
          const current = Math.atan2(p.vy, p.vx);
          let diff = desired - current;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const turn = Math.sign(diff) * Math.min(Math.abs(diff), 0.028);
          const spd = Math.hypot(p.vx, p.vy);
          const a = current + turn;
          p.vx = Math.cos(a) * spd; p.vy = Math.sin(a) * spd;
        }
      }
      // Magic Missiles: slight homing toward nearest alive enemy
      if (p.isMagicMissile && enemies.length > 0) {
        let nearestE = null, nearestSq = Infinity;
        for (const e of enemies) {
          if (e.dead) continue;
          const sq = (e.x - p.x) ** 2 + (e.y - p.y) ** 2;
          if (sq < nearestSq) { nearestSq = sq; nearestE = e; }
        }
        if (nearestE) {
          const desired = Math.atan2(nearestE.y - p.y, nearestE.x - p.x);
          const current = Math.atan2(p.vy, p.vx);
          let diff = desired - current;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const turn = Math.sign(diff) * Math.min(Math.abs(diff), 0.035);
          const spd = Math.hypot(p.vx, p.vy);
          const a = current + turn;
          p.vx = Math.cos(a) * spd; p.vy = Math.sin(a) * spd;
        }
      }
      if (p.acceleration > 1) { p.vx *= p.acceleration; p.vy *= p.acceleration; }
      p.x += p.vx;
      p.y += p.vy;
      p.traveledSq += Math.hypot(p.vx, p.vy);

      // Arcane Recall: die when it reaches the caster
      if (p.isRecall && dist(p.x, p.y, Player.x, Player.y) < 22) {
        p.dead = true; continue;
      }

      // World bounds / bounce
      let bounced = false;
      if (p.x < 0 || p.x > CONFIG.WORLD_W) {
        p.vx = -p.vx; p.x = clamp(p.x, 0, CONFIG.WORLD_W); bounced = true;
      }
      if (p.y < 0 || p.y > CONFIG.WORLD_H) {
        p.vy = -p.vy; p.y = clamp(p.y, 0, CONFIG.WORLD_H); bounced = true;
      }
      if (bounced) {
        p.bounceCount++;
        p.damage = Math.round(p.damage * p.damagePerBounce);
        if (p.bounceLeft > 0) { p.bounceLeft--; }
        else { p.dead = true; continue; }
      }

      // Range check
      if (p.traveledSq > p.range && !p.isMeteor) {
        if (p.isSlash && !p.returning) {
          // Turn around: redirect toward the caster and re-enable hit detection
          p.returning = true;
          p.traveledSq = 0;
          p.hitIds.clear();
          const dx = Player.x - p.x, dy = Player.y - p.y;
          const len = Math.hypot(dx, dy) || 1;
          const spd = Math.hypot(p.vx, p.vy);
          p.vx = (dx / len) * spd;
          p.vy = (dy / len) * spd;
        } else {
          p.dead = true; continue;
        }
      }

      // Returning slash: steer toward caster and die on arrival
      if (p.isSlash && p.returning) {
        const dx = Player.x - p.x, dy = Player.y - p.y;
        const d = Math.hypot(dx, dy);
        if (d < 20) { p.dead = true; continue; }
        // Gently steer toward player (max 0.08 rad/frame turn)
        const desiredAngle = Math.atan2(dy, dx);
        const currentAngle = Math.atan2(p.vy, p.vx);
        let diff = desiredAngle - currentAngle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = Math.max(-0.08, Math.min(0.08, diff));
        const newAngle = currentAngle + turn;
        const spd = Math.hypot(p.vx, p.vy);
        p.vx = Math.cos(newAngle) * spd;
        p.vy = Math.sin(newAngle) * spd;
      }
    }

    // Collision with enemies
    for (const e of enemies) {
      if (e.dead || p.hitIds.has(e.id)) continue;
      if (dist(p.x, p.y, e.x, e.y) < e.radius + 8) {
        p.hitIds.add(e.id);
        if (p.isBoneSpear) p.pierceHitCount = (p.pierceHitCount || 0) + 1;
        if (p.isChrono) {
          ChronoMarks.push({ enemy: e, timer: p.chronoDelay, maxTimer: p.chronoDelay, baseDamage: p.chronoBaseDamage, startX: e.x, startY: e.y, multBonus: p.chronoMultiplierBonus, chain: p.chronoChain, statusEffect: p.statusEffect ? { ...p.statusEffect } : null });
          if (p.statusEffect) applyStatusEffect(e, p.statusEffect);
          Particles.emit(e.x, e.y, '#cc88ff', 8, 2);
        }

        // Damage
        let dmg = p.damage;
        if (p.chargesUp && p.chargeAccumTimer > 0) {
          dmg = Math.round(dmg * (1 + p.chargeAccumTimer * p.chargeRate));
          p.chargeAccumTimer = 0;
        }
        const chainIdx = (p.chainCount - (p.chainCount)) ; // resolved per-chain
        applyDamage(e, dmg, p.armorPen, p.statusEffect, p.finalHitStun && p.chainCount === 0 ? p.finalHitStun : 0);
        if (p.lifesteal > 0 && dmg > 0) {
          const effArmor = Math.max(0, (e.armor || 0) - (p.armorPen || 0));
          const finalDmg = Math.max(1, dmg - effArmor);
